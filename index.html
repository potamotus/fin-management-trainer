<script id="engine">
/* ============================================================
   Тренажёр ФинМен - движок генераторов задач (Темы 1–9).
   Чистая логика, без DOM. Тестируется через Node.
   Формулы в решениях - LaTeX (рендер KaTeX на стороне UI),
   плюс Excel-формулы. Ответы считаются в коде.
   ============================================================ */
(function (root) {
'use strict';

/* ---------- математика ---------- */
function AF(r, n) { return (1 - Math.pow(1 + r, -n)) / r; }
function npvOf(cf, r) { let s = 0; for (let i = 0; i < cf.length; i++) s += cf[i] / Math.pow(1 + r, i); return s; }
function irr(cf) {
  let lo = -0.99, hi = 2.0;
  if (npvOf(cf, lo) * npvOf(cf, hi) > 0) hi = 10;
  for (let k = 0; k < 300; k++) { const mid = (lo + hi) / 2; if (npvOf(cf, lo) * npvOf(cf, mid) <= 0) hi = mid; else lo = mid; }
  return (lo + hi) / 2;
}

/* ---------- случайные числа ---------- */
function makeR(seed) { let s = seed >>> 0 || 123456789; return function () { s = (s * 1664525 + 1013904223) >>> 0; return s / 4294967296; }; }
function ri(R, a, b) { return a + Math.floor(R() * (b - a + 1)); }
function rstep(R, a, b, step) { const n = Math.round((b - a) / step); return +(a + ri(R, 0, n) * step).toFixed(6); }
function pick(R, arr) { return arr[Math.floor(R() * arr.length)]; }

/* ---------- форматирование ---------- */
function f(x, d) { return Number(x).toLocaleString('ru-RU', { minimumFractionDigits: d, maximumFractionDigits: d }); }
function money(x) { return Number(x).toLocaleString('ru-RU'); }
function pc(x, d) { return f(x * 100, d == null ? 1 : d) + '%'; }
/* число для LaTeX: точка-десятичная, тонкий пробел в разрядах, без кириллицы */
function q(x, d) {
  d = (d == null) ? 2 : d;
  if (!isFinite(x)) return String(x);
  const neg = x < 0; let s = Math.abs(x).toFixed(d); const p = s.split('.');
  p[0] = p[0].replace(/\B(?=(\d{3})+(?!\d))/g, '\\,');
  return (neg ? '-' : '') + p[0] + (p[1] ? ('.' + p[1]) : '');
}
function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
function tex(s) { return '<div class="fx tex" data-tex="' + esc(s) + '"></div>'; }  // выключная формула

function field(key, label, unit, val, dec, tol) { return { key: key, label: label, unit: unit || '', val: val, dec: dec, tol: tol }; }

const G = [];

/* ===== ТЕМА 2 · Деньги во времени и рост ===== */

G.push({ id: 'fv', topic: 't2', title: 'Будущая стоимость (FV)',
  rand: R => ({ PV: ri(R, 100, 900) * 1000, r: rstep(R, 0.05, 0.16, 0.01), t: ri(R, 2, 6) }),
  build: p => {
    const fv = p.PV * Math.pow(1 + p.r, p.t);
    return {
      given: [['Вклад (PV)', money(p.PV) + ' руб'], ['Ставка (r)', pc(p.r, 0)], ['Срок (t)', p.t + ' лет']],
      q: 'Найдите будущую стоимость вклада при ежегодном начислении процентов.',
      fields: [field('fv', 'FV', 'руб', fv, 2)], vals: { fv },
      fmt: 'FV в рублях, до сотых',
      steps: [
        'Обозначения: FV — будущая стоимость (Future Value); PV — текущая (приведённая) стоимость вклада (Present Value); r — годовая процентная ставка; t — срок в годах.',
        'Ежегодное сложное начисление:',
        tex('\\mathrm{FV} = \\mathrm{PV}\\,(1+r)^{t}'),
        tex('\\mathrm{FV} = ' + q(p.PV, 0) + '\\,(1+' + p.r + ')^{' + p.t + '} = \\mathbf{' + q(fv, 2) + '}'),
      ],
      excel: [['=' + p.PV + '*(1+' + p.r + ')^' + p.t, 'будущая стоимость FV'], ['=БС(' + p.r + ';' + p.t + ';0;-' + p.PV + ')', 'через функцию БС (FV): вклад со знаком −']],
    };
  } });

G.push({ id: 'fv_m', topic: 't2', title: 'FV с начислением m раз в год',
  rand: R => ({ PV: ri(R, 100, 900) * 1000, r: rstep(R, 0.06, 0.16, 0.01), t: ri(R, 2, 6), m: pick(R, [2, 4, 12]) }),
  build: p => {
    const fv = p.PV * Math.pow(1 + p.r / p.m, p.t * p.m);
    const mn = { 2: 'полугодовое', 4: 'ежеквартальное', 12: 'ежемесячное' }[p.m];
    return {
      given: [['Вклад (PV)', money(p.PV) + ' руб'], ['Годовая ставка (r)', pc(p.r, 0)], ['Срок (t)', p.t + ' лет'], ['Начисление', mn + ' (m=' + p.m + ')']],
      q: 'Найдите FV при начислении процентов m раз в год.',
      fields: [field('fv', 'FV', 'руб', fv, 2)], vals: { fv },
      fmt: 'FV в рублях, до сотых',
      steps: [
        'Обозначения: FV — будущая стоимость (Future Value); PV — текущая стоимость вклада (Present Value); r — годовая номинальная ставка; t — срок в годах; m — число начислений процентов в году.',
        tex('\\mathrm{FV} = \\mathrm{PV}\\,\\left(1+\\dfrac{r}{m}\\right)^{t\\,m}'),
        tex('\\mathrm{FV} = ' + q(p.PV, 0) + '\\left(1+\\dfrac{' + p.r + '}{' + p.m + '}\\right)^{' + p.t + '\\cdot' + p.m + '} = \\mathbf{' + q(fv, 2) + '}'),
        'Чем чаще начисление, тем больше FV (эффективная ставка выше номинальной).',
      ],
      excel: [['=' + p.PV + '*(1+' + p.r + '/' + p.m + ')^(' + p.t + '*' + p.m + ')', 'FV при m начислениях'], ['=БС(' + p.r + '/' + p.m + ';' + p.t + '*' + p.m + ';0;-' + p.PV + ')', 'через БС (вклад −)']],
    };
  } });

G.push({ id: 'pv_m', topic: 't2', title: 'Текущая стоимость (PV)',
  rand: R => ({ FV: ri(R, 5, 20) * 100000, r: rstep(R, 0.05, 0.12, 0.005), t: ri(R, 3, 7), m: pick(R, [1, 2, 4]) }),
  build: p => {
    const pv = p.FV / Math.pow(1 + p.r / p.m, p.t * p.m);
    return {
      given: [['Нужная сумма (FV)', money(p.FV) + ' руб'], ['Годовая ставка (r)', pc(p.r, 1)], ['Срок (t)', p.t + ' лет'], ['Начислений в год (m)', p.m]],
      q: 'На какую сумму открыть вклад сегодня, чтобы накопить FV?',
      fields: [field('pv', 'PV', 'руб', pv, 2)], vals: { pv },
      fmt: 'PV в рублях, до сотых',
      steps: [

G.push({ id: 'pnl', topic: 't3', title: 'Чистая прибыль из P&L (агрег. модель)',
  rand: R => { const S = ri(R, 50, 200) * 10, zVC = rstep(R, 0.45, 0.7, 0.05); const M = S * (1 - zVC); const FC = Math.max(10, Math.round(M * rstep(R, 0.20, 0.40, 0.05) / 10) * 10); const am = Math.max(10, Math.round(M * rstep(R, 0.10, 0.25, 0.05) / 10) * 10); return { S, zVC, FC, am, t: pick(R, [0.2, 0.25]) }; },

    return {
      given: [['Выручка (S)', money(p.S) + ' млн'], ['Затратоёмкость z = VC/S (z)', pc(p.zVC, 0)], ['Постоянные затраты (FC)', money(p.FC) + ' млн'], ['Амортизация (DA)', money(p.am) + ' млн'], ['Налог (TAX)', pc(p.t, 0)]],
      q: 'Найдите чистую прибыль (ЧП).',
      fields: [field('ni', 'ЧП', 'млн', NI, 2)], vals: { EBITDA, EBIT, NI },
      fmt: 'ЧП в млн, до сотых',
      steps: [
        'Обозначения: S — выручка (Sales/Revenue); z — затратоёмкость, доля переменных затрат в выручке z = VC/S; VC — переменные затраты (Variable Costs); FC — постоянные затраты (Fixed Costs); DA (A) — амортизация (Depreciation & Amortization); TAX (tau, τ) — ставка налога на прибыль (tax rate); EBITDA — прибыль до вычета процентов, налогов и амортизации; EBIT — операционная прибыль до процентов и налогов; NI (ЧП) — чистая прибыль (Net Income).',
        'Маржинальный доход = S·(1−z), далее вычитаем постоянные затраты и амортизацию:',
        tex('\\mathrm{EBITDA} = S(1-z) - \\mathrm{FC} = ' + q(p.S, 0) + '(1-' + p.zVC + ') - ' + q(p.FC, 0) + ' = ' + q(EBITDA, 2)),
        tex('\\mathrm{EBIT} = \\mathrm{EBITDA} - A = ' + q(EBITDA, 2) + ' - ' + q(p.am, 0) + ' = ' + q(EBIT, 2)),
        tex('\\mathrm{NI} = \\mathrm{EBIT}(1-\\tau) = ' + q(EBIT, 2) + '(1-' + p.t + ') = \\mathbf{' + q(NI, 2) + '}'),
      ],
      excel: [['=(' + p.S + '*(1-' + p.zVC + ')-' + p.FC + '-' + p.am + ')*(1-' + p.t + ')', 'чистая прибыль NI']],
    };
  } });

G.push({ id: 'npv_irr_pi', topic: 't4', title: 'NPV, IRR, PI базового проекта',
  rand: R => ({ I: ri(R, 8, 20) * 100, CF: ri(R, 25, 60) * 10, n: ri(R, 4, 6), r: rstep(R, 0.08, 0.14, 0.01) }),
  build: p => {
    const npv = -p.I + p.CF * AF(p.r, p.n);
    const cf = [-p.I]; for (let i = 0; i < p.n; i++) cf.push(p.CF);
    const ir = irr(cf), pi = 1 + npv / p.I;
    return {
      given: [['Инвестиции в год 0 (I₀)', '−' + money(p.I) + ' руб'], ['Денежный поток в годы 1…' + p.n + ' (CF)', money(p.CF) + ' руб'], ['Ставка (r)', pc(p.r, 0)]],
      q: 'Найдите NPV, IRR и PI проекта.',
      fields: [field('npv', 'NPV', 'руб', npv, 2), field('irr', 'IRR', '%', ir * 100, 1), field('pi', 'PI', '', pi, 3)], vals: { npv, irr: ir, pi },
      fmt: 'NPV (руб, до сотых), IRR (%, до десятых), PI (до тысячных)',
      steps: [
        'Обозначения: I (I₀) — инвестиции в год 0 (initial Investment); CF — годовой денежный поток (Cash Flow); r — ставка дисконтирования (discount rate); n — число периодов/лет (number of periods); AF — аннуитетный (дисконтный) множитель AF = (1−(1+r)⁻ⁿ)/r (Annuity Factor); NPV — чистая приведённая стоимость (Net Present Value); IRR — внутренняя норма доходности (Internal Rate of Return); PI — индекс рентабельности PI = 1 + NPV/I (Profitability Index); ВСД — функция Excel «Внутренняя ставка доходности» (IRR).',
        tex('\\mathrm{NPV} = -I + \\mathrm{CF}\\cdot \\mathrm{AF},\\quad \\mathrm{AF}=\\dfrac{1-(1+r)^{-n}}{r} = ' + q(AF(p.r, p.n), 4)),
        tex('\\mathrm{NPV} = -' + q(p.I, 0) + ' + ' + q(p.CF, 0) + '\\cdot' + q(AF(p.r, p.n), 4) + ' = \\mathbf{' + q(npv, 2) + '}'),
        'IRR - ставка, при которой NPV = 0 (численно): IRR ≈ <b>' + f(ir * 100, 1) + '%</b>. ' + (ir > p.r ? 'Так как IRR > r (' + pc(p.r, 0) + ') - проект эффективен, NPV > 0.' : 'Так как IRR < r (' + pc(p.r, 0) + ') - проект неэффективен, NPV < 0.'),
        tex('\\mathrm{PI} = 1 + \\dfrac{\\mathrm{NPV}}{I} = 1 + \\dfrac{' + q(npv, 2) + '}{' + q(p.I, 0) + '} = \\mathbf{' + q(pi, 3) + '}'),
      ],
      excel: [['=-' + p.I + '+' + p.CF + '*(1-(1+' + p.r + ')^-' + p.n + ')/' + p.r, 'NPV'], ['=ВСД({-' + p.I + ';' + Array(p.n).fill(p.CF).join(';') + '})', 'IRR (ВСД)'], ['=1+NPV/' + p.I, 'PI']],
    };
  } });

G.push({ id: 'pb_dpb', topic: 't4', title: 'Срок окупаемости PB и DPB',
  rand: R => {
    const CF = ri(R, 30, 60) * 10, n = ri(R, 5, 8), r = rstep(R, 0.08, 0.14, 0.01);
    const maxI = CF * AF(r, n) * 0.85;
    const I = Math.round(rstep(R, 0.45, 0.8, 0.05) * maxI / 100) * 100 || 100;
    return { I, CF, n, r };
  },
  build: p => {
    const pb = p.I / p.CF;
    let cum = 0, dpb = null;
    for (let y = 1; y <= p.n; y++) { const d = p.CF / Math.pow(1 + p.r, y); if (cum + d >= p.I) { dpb = (y - 1) + (p.I - cum) / d; break; } cum += d; }
    return {
      given: [['Инвестиции (I₀)', money(p.I) + ' руб'], ['Денежный поток в год (CF)', money(p.CF) + ' руб'], ['Горизонт (n)', p.n + ' лет'], ['Ставка (r)', pc(p.r, 0)]],
      q: 'Найдите простой (PB) и дисконтированный (DPB) срок окупаемости.',
      fields: [field('pb', 'PB', 'лет', pb, 2), field('dpb', 'DPB', 'лет', dpb, 2)], vals: { pb, dpb },
      fmt: 'годы, до сотых',
      steps: [
        'Обозначения: I (I₀) — инвестиции в год 0 (initial Investment); CF — годовой денежный поток (Cash Flow); n — горизонт/число лет (number of years); r — ставка дисконтирования (discount rate); t — номер года в формуле дисконтирования (period index); PB — простой срок окупаемости (Payback Period); DPB — дисконтированный срок окупаемости (Discounted Payback Period).',
        tex('\\mathrm{PB} = \\dfrac{I}{\\mathrm{CF}} = \\dfrac{' + q(p.I, 0) + '}{' + q(p.CF, 0) + '} = \\mathbf{' + q(pb, 2) + '}'),
        'DPB: накапливаем дисконтированные потоки CF/(1+r)ᵗ, пока сумма не покроет инвестиции.',
        tex('\\sum \\dfrac{\\mathrm{CF}}{(1+r)^{t}} \\ge I \\;\\Rightarrow\\; \\mathrm{DPB} \\approx \\mathbf{' + q(dpb, 2) + '}'),
        'Дисконтированные потоки меньше номинальных → всегда DPB > PB.',
      ],
      excel: [['=' + p.I + '/' + p.CF, 'PB'], ['DPB: добавляй ' + p.CF + '/(1+' + p.r + ')^год накопительно, пока не покроет ' + p.I, '']],
    };
  } });

G.push({ id: 'mirr', topic: 't4', title: 'MIRR проекта',

G.push({ id: 'fin_bep', topic: 't4', title: 'Финансовая точка безубыточности (КР-3)',

G.push({ id: 'gordon_stock', topic: 't6', title: 'Цена акции - модель Гордона',

G.push({ id: 'amort_ytm', topic: 't5', title: 'YTM амортизируемой облигации (КР-16)',

    const bep = FC / (price - v), Q = Math.round(bep * rstep(R, 1.3, 2.5, 0.1));
    return { price, v, FC, Q };
  },
  build: p => {
    const m = p.price - p.v, bep = p.FC / m, ebit = m * p.Q - p.FC, dol = 1 + p.FC / ebit;
    return {
      given: [['Цена за единицу (P)', money(p.price) + ' руб'], ['Переменные затраты на единицу (VC)', money(p.v) + ' руб'], ['Постоянные затраты (FC)', money(p.FC) + ' руб'], ['Текущий объём (Q)', money(p.Q) + ' шт']],
      q: 'Найдите операционную точку безубыточности и силу операционного рычага (DOL).',
      fields: [field('bep', 'Q безуб.', 'шт', bep, 0, 2), field('dol', 'DOL', '', dol, 2)], vals: { bep, dol, ebit },
      fmt: 'Q безуб. (шт), DOL (до сотых)',
      steps: [
        'Обозначения: DOL — сила операционного рычага (Degree of Operating Leverage); BEP — точка безубыточности (Break-Even Point); Q_BEP — безубыточный объём (шт); Q — текущий объём продаж (шт); P (p) — цена за единицу (Price); VC (v) — переменные затраты на единицу (Variable Cost); FC — постоянные затраты (Fixed Costs); EBIT — операционная прибыль (прибыль до процентов и налогов).',
        tex('Q_{BEP}=\\dfrac{FC}{p-v}=\\dfrac{' + q(p.FC, 0) + '}{' + p.price + '-' + p.v + '} = \\mathbf{' + q(bep, 0) + '}'),
        tex('\\mathrm{EBIT}=(p-v)Q-FC=' + q(m, 0) + '\\cdot' + q(p.Q, 0) + '-' + q(p.FC, 0) + '=' + q(ebit, 0)),
        tex('\\mathrm{DOL}=1+\\dfrac{FC}{\\mathrm{EBIT}}=1+\\dfrac{' + q(p.FC, 0) + '}{' + q(ebit, 0) + '} = \\mathbf{' + q(dol, 2) + '}'),
        'DOL: во сколько раз сильнее меняется прибыль при изменении выручки на 1%. Выше доля FC → выше риск.',
      ],
      excel: [['=' + p.FC + '/(' + p.price + '-' + p.v + ')', 'Q безубыточности'], ['=1+' + p.FC + '/((' + p.price + '-' + p.v + ')*' + p.Q + '-' + p.FC + ')', 'DOL']],
    };
  } });

G.push({ id: 'scenario', topic: 't4', title: 'Сценарный анализ: E[NPV] и σ',
  rand: R => {
    const pess = ri(R, -40, -5) / 10, base = ri(R, 10, 40) / 10, opt = ri(R, 45, 90) / 10;
    const pp = pick(R, [0.2, 0.25, 0.3]), po = pick(R, [0.2, 0.25, 0.3]), pb = +(1 - pp - po).toFixed(2);
    return { pess, base, opt, pp, pb, po };
  },
  build: p => {
    const sc = [[p.pess, p.pp], [p.base, p.pb], [p.opt, p.po]];
    const E = sc.reduce((a, s) => a + s[0] * s[1], 0);
    const varr = sc.reduce((a, s) => a + s[1] * (s[0] - E) * (s[0] - E), 0), sd = Math.sqrt(varr);
    return {
      given: [['NPV пессимистический / вероятность (Pᵢ)', f(p.pess, 1) + ' млн / ' + pc(p.pp, 0)], ['NPV базовый / вероятность (Pᵢ)', f(p.base, 1) + ' млн / ' + pc(p.pb, 0)], ['NPV оптимистический / вероятность (Pᵢ)', f(p.opt, 1) + ' млн / ' + pc(p.po, 0)]],
      q: 'Найдите ожидаемый NPV и его риск (σ).',
      fields: [field('E', 'E[NPV]', 'млн', E, 3), field('sd', 'σ(NPV)', 'млн', sd, 3)], vals: { E, sd },
      fmt: 'E и σ в млн, до тысячных',
      steps: [
        'Обозначения: NPV — чистая приведённая стоимость (Net Present Value); E[NPV] (E) — ожидаемый NPV (математическое ожидание); NPVᵢ — NPV i-го сценария; Pᵢ — вероятность i-го сценария; σ — стандартное отклонение (риск, разброс исходов); σ² (varr) — дисперсия NPV.',
        tex('E[\\mathrm{NPV}]=\\sum \\mathrm{NPV}_i\\,P_i = \\mathbf{' + q(E, 3) + '}'),
        tex('\\sigma^2=\\sum P_i(\\mathrm{NPV}_i-E)^2=' + q(varr, 3)),
        tex('\\sigma=\\sqrt{\\sigma^2}=\\mathbf{' + q(sd, 3) + '}'),
        'Принять проект при E[NPV] ≥ 0; σ - мера риска (разброс возможных исходов).',
      ],
      excel: [['=СУММПРОИЗВ(диап_NPV;диап_вероятн)', 'E[NPV]'], ['=КОРЕНЬ(СУММПРОИЗВ(вероятн;(NPV-E)^2))', 'σ (формула массива)']],
    };
  } });

G.push({ id: 'sensitivity', topic: 't4', title: 'Коэффициент чувствительности NPV',
  rand: R => {
    const NPV0 = ri(R, 80, 200), dx = pick(R, [5, 10, 20]);
    let k = rstep(R, -3, 3, 0.5); if (Math.abs(k) < 0.5) k = 1.5;
    const NPV1 = +(NPV0 * (1 + k * dx / 100)).toFixed(2);
    return { NPV0, NPV1, dx };
  },
  build: p => {
    const coef = ((p.NPV1 - p.NPV0) / p.NPV0) / (p.dx / 100);
    return {
      given: [['Базовый NPV', money(p.NPV0) + ' млн'], ['Фактор X изменился на', '+' + p.dx + '%'], ['Новый NPV', f(p.NPV1, 2) + ' млн']],
      q: 'Найдите коэффициент чувствительности NPV к фактору X.',
      fields: [field('coef', 'Коэф. чувствительности', '', coef, 2)], vals: { coef },
      fmt: 'коэффициент, до сотых (знак важен)',
      steps: [
        'Обозначения: NPV — чистая приведённая стоимость (Net Present Value); K — коэффициент чувствительности; ΔNPV % — относительное изменение NPV в процентах; ΔX % — относительное изменение фактора X в процентах; X — варьируемый фактор (входной параметр модели).',
        tex('K=\\dfrac{\\Delta \\mathrm{NPV}\\,\\%}{\\Delta X\\,\\%}'),
        tex('K=\\dfrac{(' + f(p.NPV1, 2) + '-' + p.NPV0 + ')/' + p.NPV0 + '}{' + p.dx + '/100} = \\mathbf{' + q(coef, 2) + '}'),
        'Чем больше |K|, тем сильнее NPV зависит от фактора X. K < 0 - обратная связь (рост X снижает NPV).',
      ],
      excel: [['=((' + p.NPV1 + '-' + p.NPV0 + ')/' + p.NPV0 + ')/(' + p.dx + '/100)', 'коэф. чувствительности']],
    };
  } });

G.push({ id: 'cap_ration', topic: 't4', title: 'Рационирование капитала (выбор по PI)',
  rand: R => {
    const budget = ri(R, 10, 16) * 100, projs = [];
    for (let i = 0; i < 4; i++) projs.push({ I: ri(R, 3, 7) * 100, npv: ri(R, 5, 30) * 10 });
    return { budget, projs };
  },
  build: p => {
    const ranked = p.projs.map((x, i) => ({ I: x.I, npv: x.npv, pi: 1 + x.npv / x.I, name: 'ABCD'[i] })).sort((a, b) => b.pi - a.pi);
    let left = p.budget, total = 0, partial = false;
    for (const pr of ranked) { if (left <= 0) break; const frac = Math.min(1, left / pr.I); if (frac > 0 && frac < 1) partial = true; total += pr.npv * frac; left -= pr.I * frac; }
    const sumI = ranked.reduce((s, r) => s + r.I, 0), allFunded = p.budget >= sumI;
    return {
      given: [['Бюджет', money(p.budget) + ' млн']].concat(p.projs.map((x, i) => ['Проект ' + 'ABCD'[i] + ': инвестиции (I₀) / NPV', money(x.I) + ' / ' + money(x.npv) + ' млн'])),
      q: 'Проекты делимы (можно финансировать частично). Максимальный суммарный NPV в рамках бюджета?',
      fields: [field('total', 'Σ NPV', 'млн', total, 2)], vals: { total },
      fmt: 'суммарный NPV в млн, до сотых',
      steps: [
        'Обозначения: PI — индекс рентабельности (Profitability Index), PI = 1 + NPV/I; NPV — чистая приведённая стоимость (Net Present Value); I₀ — первоначальные инвестиции в проект (Initial Investment); I — инвестиции в проект; Σ — суммарное значение (сумма); ABCD — буквенные имена проектов A, B, C, D.',
        'Считаем PI = 1 + NPV/I и ранжируем по убыванию (отдача на рубль):',
        tex(ranked.map(r => '\\mathrm{PI}_' + r.name + '=' + q(r.pi, 3)).join(',\\;\\;')),
        (allFunded ? 'Бюджета хватает на все проекты целиком - частичное финансирование не требуется:' : (partial ? 'Берём проекты сверху вниз, последний - частично на остаток бюджета:' : 'Берём проекты сверху вниз в порядке PI целиком, пока хватает бюджета:')),
        tex('\\textstyle\\sum \\mathrm{NPV} = \\mathbf{' + q(total, 2) + '}'),
      ],
      excel: [['=1+NPV/I для каждого проекта', 'индекс PI'], ['сортируй по PI ↓, заполняй бюджет жадно', 'последний проект - на остаток']],
    };
  } });

G.push({ id: 'igr', topic: 't2', title: 'Внутренний темп роста (IGR)',

G.push({ id: 'sgr_full', topic: 't2', title: 'Темп устойчивого роста SGR (через DuPont)',

G.push({ id: 'npv_uneven', topic: 't4', title: 'NPV неравномерного денежного потока',

G.push({ id: 'duration', topic: 't5', title: 'Дюрация Маколея',
  rand: R => ({ F: 1000, c: rstep(R, 0.05, 0.08, 0.01), n: ri(R, 3, 6), ytm: rstep(R, 0.05, 0.09, 0.01) }),
  build: p => {
    const cpn = p.F * p.c; let P = 0, wsum = 0;
    for (let t = 1; t <= p.n; t++) { const cf = (t === p.n) ? cpn + p.F : cpn; const pv = cf / Math.pow(1 + p.ytm, t); P += pv; wsum += t * pv; }
    const dur = wsum / P;
    return {
      given: [['Номинал (F)', money(p.F) + ' руб'], ['Годовая купонная ставка (c)', pc(p.c, 0)], ['Срок (n)', p.n + ' лет'], ['Доходность к погашению (YTM)', pc(p.ytm, 0)]],

      fields: [field('dur', 'Дюрация', 'лет', dur, 3)], vals: { dur, P }, fmt: 'лет, до тысячных',
      steps: [
        'Обозначения: F — номинал облигации (face value); C — годовой купонный платёж в рублях; c — купонная ставка (coupon rate); t — номер периода / срок в годах; n — число периодов до погашения; YTM — доходность к погашению (Yield to Maturity); CF_t — денежный поток в период t (cash flow); P — текущая цена облигации (приведённая сумма потоков); D — дюрация Маколея (Macaulay duration), средневзвешенный срок и мера процентного риска.',
        'Цена P = Σ приведённых потоков = ' + f(P, 2) + ' руб.',
        tex('D = \\dfrac{1}{P}\\sum_{t=1}^{n} t\\cdot\\dfrac{CF_t}{(1+\\mathrm{YTM})^{t}} = \\mathbf{' + q(dur, 3) + '}'),

      ],
      excel: [['=ДЛИТ(дата_согл;дата_погаш;' + p.c + ';' + p.ytm + ';1)', 'дюрация (ДЛИТ / DURATION)'], ['вручную: Σ t·PV(CFt) / P', '']],
    };
  } });

G.push({ id: 'ddm_from_earnings', topic: 't6', title: 'Цена акции из прибыли (рост g = ROE·b)',

      fields: [field('g', 'g', '%', g * 100, 2), field('P', 'Цена (P)', '$', P, 2)], vals: { g, P, D1 }, fmt: 'g (%, до сотых), цена ($, до сотых)',
      steps: [
        'Обозначения: EPS₁ — ожидаемая прибыль на акцию следующего года (Earnings Per Share); payout — доля прибыли, выплачиваемая дивидендами (коэффициент выплат); ROE — рентабельность собственного капитала (Return on Equity); r — требуемая доходность; b — норма реинвестирования прибыли (b = 1 − payout); g — темп роста (growth rate, g = ROE·b); D₁ — ожидаемый дивиденд следующего года (D₁ = EPS₁·payout); P — цена акции по модели Гордона P = D₁/(r − g).',

        tex('P = \\dfrac{D_1}{r-g} = \\dfrac{' + f(D1, 2) + '}{' + p.r + ' - ' + q(g, 4) + '} = \\mathbf{' + q(P, 2) + '}'),
        (p.ROE > p.r ? 'Здесь ROE > r: реинвестирование создаёт стоимость → чем выше b, тем выше цена.' : (p.ROE < p.r ? 'Здесь ROE < r: реинвестирование разрушает стоимость → чем выше b, тем ниже цена.' : 'Здесь ROE ≈ r: реинвестирование нейтрально к стоимости.')),

    };
  } });

G.push({ id: 'deposit_choice', topic: 't2', title: 'Выбор варианта вложения (FV)',
  rand: R => ({ PV: ri(R, 3, 9) * 100000, rA: rstep(R, 0.1, 0.16, 0.01), rB: rstep(R, 0.09, 0.14, 0.01), m: pick(R, [4, 12]), t: ri(R, 3, 5) }),

      given: [['Сумма вложения (PV)', money(p.PV) + ' руб'], ['Срок (t)', p.t + ' лет'], ['Вариант А', pc(p.rA, 0) + ', ежегодное начисление'], ['Вариант Б', pc(p.rB, 0) + ', начисление ' + p.m + ' раз/год']],

G.push({ id: 'fcff_build', topic: 't4', title: 'Построение FCFF и NPV из прогноза',
  rand: R => ({ I: ri(R, 8, 16), S: ri(R, 9, 16), C: rstep(R, 3, 7, 0.5), A: rstep(R, 1.2, 2.4, 0.2), nwc: rstep(R, 0.5, 2, 0.5), n: ri(R, 4, 6), r: rstep(R, 0.1, 0.13, 0.01), t: 0.2 }),
  build: p => {
    const EBIT = p.S - p.C - p.A, tax = Math.max(0, EBIT) * p.t, fcff = EBIT - tax + p.A, af = AF(p.r, p.n);
    const npv = -p.I - p.nwc + fcff * af + p.nwc / Math.pow(1 + p.r, p.n);
    return {
      given: [['Инвестиции в год 0 (CAPEX)', p.I + ' млн'], ['Выручка в год (S)', p.S + ' млн'], ['Операционные расходы без амортизации', p.C + ' млн'], ['Амортизация в год (DA)', p.A + ' млн'], ['Прирост чистого оборотного капитала в год 0, возврат в конце (ΔNWC)', p.nwc + ' млн'], ['Срок (n) / Ставка (r) / Налог (T)', p.n + ' лет / ' + pc(p.r, 0) + ' / ' + pc(p.t, 0)]],
      q: 'Постройте годовой FCFF и найдите NPV проекта.',
      fields: [field('fcff', 'FCFF/год', 'млн', fcff, 2), field('npv', 'NPV', 'млн', npv, 2)], vals: { fcff, npv, EBIT },
      fmt: 'FCFF и NPV в млн, до сотых',
      steps: [
        'Обозначения: FCFF — свободный денежный поток фирмы (Free Cash Flow to Firm); NPV — чистая приведённая стоимость (Net Present Value); EBIT — операционная прибыль до процентов и налогов (Earnings Before Interest and Taxes); S — выручка за год (Sales); OpEx — операционные расходы без амортизации (Operating Expenses); A — амортизация за год; DA — амортизация (Depreciation & Amortization); ΔNWC — прирост чистого оборотного капитала (изменение Net Working Capital); ЧОК — чистый оборотный капитал; CAPEX — капитальные вложения (инвестиции в год 0); n — срок проекта в годах; r — ставка дисконтирования; T — ставка налога на прибыль; τ — ставка налога (то же, что T); AF — аннуитетный фактор (множитель приведения аннуитета).',
        tex('\\mathrm{EBIT} = S - \\mathrm{OpEx} - A = ' + p.S + ' - ' + p.C + ' - ' + p.A + ' = ' + q(EBIT, 2)),
        tex('\\mathrm{FCFF} = \\mathrm{EBIT} - \\max(\\mathrm{EBIT},0)\\cdot\\tau + A = ' + q(EBIT, 2) + ' - ' + q(tax, 2) + ' + ' + p.A + ' = \\mathbf{' + q(fcff, 2) + '}'),
        'CAPEX и ЧОК - отток в год 0; ЧОК возвращается в конце проекта:',
        tex('\\mathrm{NPV} = -' + p.I + ' - ' + q(p.nwc, 2) + ' + ' + q(fcff, 2) + '\\cdot' + q(af, 4) + ' + \\dfrac{' + q(p.nwc, 2) + '}{(1+' + p.r + ')^{' + p.n + '}} = \\mathbf{' + q(npv, 2) + '}'),
      ],
      excel: [['=(' + p.S + '-' + p.C + '-' + p.A + ')-МАКС(' + p.S + '-' + p.C + '-' + p.A + ';0)*' + p.t + '+' + p.A, 'FCFF/год (налог только с положительной EBIT)'], ['=-' + p.I + '-' + p.nwc + '+FCFF*(1-(1+' + p.r + ')^-' + p.n + ')/' + p.r + '+' + p.nwc + '/(1+' + p.r + ')^' + p.n, 'NPV']],
    };
  } });

G.push({ id: 'incremental', topic: 't4', title: 'Приростной денежный поток (sunk / opportunity)',
  rand: R => ({ I: ri(R, 8, 14), dS: ri(R, 5, 9), dC: rstep(R, 1.5, 3.5, 0.5), A: rstep(R, 1.2, 2.4, 0.2), rent: rstep(R, 0.4, 1, 0.1), sunk: rstep(R, 0.3, 1.2, 0.1), n: ri(R, 4, 6), r: rstep(R, 0.1, 0.13, 0.01), t: 0.2 }),
  build: p => {
    const dEBIT = p.dS - p.dC - p.A - p.rent, dtax = Math.max(0, dEBIT) * p.t, dFCF = dEBIT - dtax + p.A, npv = -p.I + dFCF * AF(p.r, p.n);

G.push({ id: 'chain_repeat', topic: 't4', title: 'Сравнение проектов цепным повтором (НОК сроков)',
  rand: R => {
    const nA = pick(R, [2, 3]);
    const nB = pick(R, [3, 4].filter(x => x !== nA));
    const r = rstep(R, 0.10, 0.14, 0.01);
    const IA = ri(R, 8, 14) * 100, IB = ri(R, 8, 14) * 100;
    const uA = rstep(R, 1.10, 1.25, 0.05), uB = rstep(R, 1.10, 1.25, 0.05);
    const CFA = Math.round(IA / AF(r, nA) * uA), CFB = Math.round(IB / AF(r, nB) * uB);
    return { nA, nB, r, IA, IB, CFA, CFB };
  },
  build: p => {
    const gcd = (a, b) => b ? gcd(b, a % b) : a;
    const lcm = p.nA * p.nB / gcd(p.nA, p.nB);
    const npv1A = -p.IA + p.CFA * AF(p.r, p.nA), npv1B = -p.IB + p.CFB * AF(p.r, p.nB);
    const chain = (n, npv1) => { const reps = lcm / n; let s = 0; for (let k = 0; k < reps; k++) s += Math.pow(1 + p.r, -k * n); return npv1 * s; };
    const totA = chain(p.nA, npv1A), totB = chain(p.nB, npv1B), best = totA >= totB ? 'A' : 'B';
    return {
      given: [['Проект A: инвестиции (I₀) / денежный поток (CF) / срок (n)', p.IA + ' / ' + p.CFA + ' / ' + p.nA + ' лет'], ['Проект B: инвестиции (I₀) / денежный поток (CF) / срок (n)', p.IB + ' / ' + p.CFB + ' / ' + p.nB + ' лет'], ['Ставка (r)', pc(p.r, 0)]],
      q: 'Сравните проекты с разными сроками методом цепного повтора (общий горизонт = НОК сроков). Какой выбрать?',
      fields: [field('ta', 'NPV(A) за НОК', 'млн', totA, 2), field('tb', 'NPV(B) за НОК', 'млн', totB, 2)], vals: { totA, totB, npv1A, npv1B, lcm },
      fmt: 'NPV в млн (до сотых); выбираем больший',
      steps: [
        'Обозначения: NPV — чистая приведённая стоимость (Net Present Value); I₀ — первоначальные инвестиции; CF — годовой денежный поток (Cash Flow); n, nA, nB — срок проекта (A и B) в годах; r — ставка дисконтирования; AF — аннуитетный множитель (Annuity Factor); НОК — наименьшее общее кратное сроков (общий горизонт сравнения); k — номер повтора проекта в цепном повторе.',
        'NPV одного цикла каждого проекта:',

G.push({ id: 'mod_duration', topic: 't5', title: 'Модифицированная дюрация и оценка изменения цены',
  rand: R => ({ F: 1000, c: rstep(R, 0.06, 0.10, 0.01), n: ri(R, 3, 6), y: rstep(R, 0.07, 0.12, 0.01), dy: pick(R, [0.01, 0.005, -0.01]) }),
  build: p => {
    const coup = p.c * p.F; let P = 0, wsum = 0;
    for (let t = 1; t <= p.n; t++) { const cf = (t < p.n ? coup : coup + p.F), pv = cf / Math.pow(1 + p.y, t); P += pv; wsum += t * pv; }

    return {
      given: [['Номинал (F)', money(p.F) + ' руб'], ['Годовая купонная ставка (c)', pc(p.c, 0)], ['Срок (n)', p.n + ' лет'], ['Доходность к погашению (y)', pc(p.y, 0)], ['Изменение доходности (Δy)', pc(p.dy, 1)]],

G.push({ id: 'mirr_nonconv', topic: 't4', exam: true, title: 'Кейс: норма доходности при ограниченном реинвестировании',
  rand: R => ({ co: pick(R, NM), cf0: -ri(R, 6, 10), cf1: ri(R, 3, 6), cf2: -ri(R, 1, 4), cf3: ri(R, 5, 9), cf4: ri(R, 6, 10), fin: rstep(R, 0.09, 0.13, 0.01), reinv: rstep(R, 0.06, 0.08, 0.01) }),
  build: p => {
    const cf = [p.cf0, p.cf1, p.cf2, p.cf3, p.cf4], n = cf.length - 1;
    let pvNeg = 0, fvPos = 0; const posS = [], negS = [];
    cf.forEach((c, i) => { if (c < 0) { pvNeg += c / Math.pow(1 + p.fin, i); negS.push(c + '/(1+' + p.fin + ')^' + i); } else if (c > 0) { fvPos += c * Math.pow(1 + p.reinv, n - i); posS.push(c + '*(1+' + p.reinv + ')^' + (n - i)); } });
    const mirr = Math.pow(fvPos / Math.abs(pvNeg), 1 / n) - 1;
    return { prose: true, given: [],
      q: 'Компания «' + p.co + '» рассматривает инвестиционный проект, связанный с модернизацией оборудования. Денежные потоки (в млн руб.) по проекту распределены следующим образом: ' + cf.join('; ') + '. Руководство компании принимает решение исходя из нормы доходности проекта. Выполните соответствующие расчёты. В расчётах учтите, что стоимость привлечения капитала ' + (p.fin * 100) + '%, а возможность реинвестирования прибыли ограничена ' + (p.reinv * 100) + '%.',
      fields: [field('ans', 'Ответ', '%', mirr * 100, 2)], vals: { mirr: mirr * 100 },
      fmt: 'норма доходности (MIRR), % годовых, до сотых',
      steps: [
        'Поток неординарный (знак меняется дважды) → обычная IRR неинформативна, нужна MIRR. Оттоки приводим к началу по стоимости капитала, притоки наращиваем к концу по ставке реинвестирования.',

      ],

    };
  } });

/* Т7 · Альфа - WACC и NPV */

/* Т7 · ТехноЛайн - выбор финансирования по WACC */
G.push({ id: 'wacc_financing_choice', topic: 't7', exam: true, title: 'Кейс: какое предложение банка выгоднее (WACC)',

      fields: [field('a', 'WACC Банка А', '%', waccA * 100, 2), field('b', 'WACC Банка Б', '%', waccB * 100, 2)], vals: { waccA: waccA * 100, waccB: waccB * 100 },
      fmt: 'два WACC, % годовых, до сотых',
      steps: [

        tex('\\mathrm{WACC}_B = ' + ((100 - p.wDB) / 100) + '\\cdot' + p.re + ' + ' + (p.wDB / 100) + '\\cdot' + p.rd0 + '\\cdot(1-' + t + ') = ' + q(waccB * 100, 2) + '\\%'),
        'Выгоднее предложение с меньшим WACC → Банк ' + win + '.',
      ],
      excel: [['=' + ((100 - p.wDA) / 100) + '*' + p.re + '+' + (p.wDA / 100) + '*' + q(rdA, 4) + '*(1-' + t + ')', 'WACC Банка А'], ['=' + ((100 - p.wDB) / 100) + '*' + p.re + '+' + (p.wDB / 100) + '*' + p.rd0 + '*(1-' + t + ')', 'WACC Банка Б']],
    };
  } });

G.push({ id: 'eva', topic: 't7', exam: true, title: 'Кейс: экономическая добавленная стоимость (EVA)',

      fields: [field('ans', 'Ответ', '', eva, 2)], vals: { eva },

        'EVA ' + (eva >= 0 ? '> 0 → компания создаёт стоимость сверх стоимости капитала.' : '< 0 → отдача ниже стоимости капитала, стоимость разрушается.'),

    };

/* ============================================================
   РАСПОЗНАВАНИЕ (короткие вопросы на термин) - формат экзамена.
   Свободный ввод; проверка по списку синонимов checkRecog.
   ============================================================ */
/* вопросы на распознавание термина удалены (не было на экзамене) */

/* нормализация и проверка свободного термина */
function normTerm(s) { return String(s == null ? '' : s).toLowerCase().replace(/ё/g, 'е').replace(/[«»"'().,;:!?]/g, ' ').replace(/\s+/g, ' ').trim(); }
function checkRecog(prob, raw) {
  const u = normTerm(raw); if (!u) return false;
  return (prob.accept || []).some(a => { const n = normTerm(a); return n && (u === n || u.indexOf(n) >= 0); });
}

G.push({ id: 'ex3_ni', topic: 't3', exam: true, title: 'Фабрика «Восход»: финансовый результат с учётом амортизации',
  rand: R => {

        'Прибыль до амортизации, процентов и налогов (EBITDA) = выручка минус переменные и постоянные затраты:',

      ],
      excel: [
        ['=(Выручка*(1-z)-ПостЗатр-Аморт)*(1-Налог)', 'ШАБЛОН: z - доля переменных затрат в выручке; ПостЗатр - постоянные затраты без амортизации; Аморт - амортизация; Налог - ставка налога'],

G.push({ id: 'ex4_npv_decision', topic: 't4', exam: true, title: 'Компания «Гелиос»: модернизация линии розлива',

G.push({ id: 'ex4_payback', topic: 't4', exam: true, title: 'Компания «СтройМаш»: окупаемость нового пресса',
  rand: R => {
    const CF = ri(R, 30, 60) * 10, n = ri(R, 5, 8), r = rstep(R, 0.08, 0.14, 0.01);
    const maxI = CF * AF(r, n) * 0.85;
    const I = Math.round(rstep(R, 0.45, 0.8, 0.05) * maxI / 100) * 100 || 100;
    return { I, CF, n, r };
  },
  build: p => {
    const pb = p.I / p.CF;
    let cum = 0, dpb = null;
    for (let y = 1; y <= p.n; y++) { const d = p.CF / Math.pow(1 + p.r, y); if (cum + d >= p.I) { dpb = (y - 1) + (p.I - cum) / d; break; } cum += d; }
    return {
      prose: true,
      given: [['Инвестиции (I₀)', money(p.I) + ' тыс. руб.'], ['Денежный поток в год', money(p.CF) + ' тыс. руб.'], ['Горизонт (n)', p.n + ' лет'], ['Ставка дисконтирования', pc(p.r, 0)]],
      q: 'Компания «СтройМаш» приобретает пресс за ' + money(p.I) + ' тыс. руб. Он ежегодно приносит ' + money(p.CF) + ' тыс. руб. на протяжении ' + p.n + ' лет; ставка дисконтирования ' + pc(p.r, 0) + '. Определите простой и дисконтированный сроки окупаемости.',
      fields: [field('pb', 'Простой срок', 'лет', pb, 2), field('dpb', 'Дисконт. срок', 'лет', dpb, 2)], vals: { pb, dpb },
      fmt: 'оба срока в годах, до сотых',
      steps: [
        tex('\\mathrm{PB} = \\dfrac{I}{\\mathrm{CF}} = \\dfrac{' + q(p.I, 0) + '}{' + q(p.CF, 0) + '} = \\mathbf{' + q(pb, 2) + '}'),
        'Для дисконтированного срока накапливаем CF/(1+r)ᵗ, пока сумма не покроет инвестиции:',
        tex('\\mathrm{DPB} = m + \\dfrac{I - \\sum_{t=1}^{m}\\mathrm{DCF}_t}{\\mathrm{DCF}_{m+1}} \\approx \\mathbf{' + q(dpb, 2) + '}'),
        'Дисконтированные потоки меньше номинальных, поэтому всегда DPB > PB.',
      ],
      excel: [
        ['=инвестиции / денежный_поток_в_год', 'ШАБЛОН простой срок: вложения делим на годовой поток'],
        ['=' + p.I + '/' + p.CF, 'PB с числами; DPB - накапливать ' + p.CF + '/(1+' + p.r + ')^t, пока не покроет ' + p.I],
      ],
    };
  } });

G.push({ id: 'ex4_bep_dol', topic: 't4', exam: true, title: 'Компания «АльфаПласт»: запас прочности по объёму',

      ],
    };
  } });

G.push({ id: 'ex4_npv_inflation', topic: 't4', exam: true, title: 'Компания «Восток-Агро»: проект в номинальных ценах',
  rand: R => {
    const I = ri(R, 10, 20) * 100;
    const realCF = ri(R, 30, 55) * 10;
    const n = ri(R, 4, 6);
    const rreal = rstep(R, 0.05, 0.10, 0.01);
    const infl = rstep(R, 0.04, 0.09, 0.01);
    return { I, realCF, n, rreal, infl };
  },
  build: p => {
    const rnom = (1 + p.rreal) * (1 + p.infl) - 1;
    let npv = -p.I;
    for (let t = 1; t <= p.n; t++) { const nomCF = p.realCF * Math.pow(1 + p.infl, t); npv += nomCF / Math.pow(1 + rnom, t); }
    return {
      prose: true,
      given: [['Инвестиции (I₀)', money(p.I) + ' тыс. руб.'], ['Поток года 1 в ценах года 0', money(p.realCF) + ' тыс. руб.'], ['Срок (n)', p.n + ' лет'], ['Реальная ставка (rᵣ)', pc(p.rreal, 0)], ['Инфляция (i)', pc(p.infl, 0)]],
      q: 'Компания «Восток-Агро» вкладывает ' + money(p.I) + ' тыс. руб. Проект на ' + p.n + ' лет приносит поток ' + money(p.realCF) + ' тыс. руб. в ценах года 0, который индексируется на инфляцию ' + pc(p.infl, 0) + ' ежегодно. Реальная требуемая доходность ' + pc(p.rreal, 0) + '. Определите чистый приведённый эффект проекта.',
      fields: [field('ans', 'Ответ', 'тыс. руб.', npv, 2)], vals: { npv, rnom },
      fmt: 'чистый приведённый эффект в тыс. руб., до сотых',
      steps: [
        'Реальную ставку и инфляцию связываем по Фишеру, получая номинальную ставку:',

G.push({ id: 'ex5_bond_semi', topic: 't5', exam: true, title: 'Кейс: справедливая стоимость купонной облигации',
  rand: R => ({ co: pick(R, NMB), N: ri(R, 90, 110) * 10, c: rstep(R, 0.05, 0.09, 0.01), m: 2, n: ri(R, 4, 7), ytm: rstep(R, 0.04, 0.08, 0.005) }),
  build: p => {
    const cpn = p.N * p.c / p.m, np = p.n * p.m;
    let P = 0; const terms = [];
    for (let k = 1; k <= np; k++) { P += cpn / Math.pow(1 + p.ytm, k / p.m); terms.push(cpn + '/(1+' + p.ytm + ')^' + (k / p.m)); }
    P += p.N / Math.pow(1 + p.ytm, p.n); terms.push(p.N + '/(1+' + p.ytm + ')^' + p.n);

      q: 'Компания «' + p.co + '» разместила облигации номиналом ' + money(p.N) + ' рублей со сроком обращения ' + p.n + ' лет. Купон ' + (Math.round(p.c*1e6)/1e4) + '% годовых от номинала выплачивается два раза в год. Инвестор оценивает бумагу при требуемой доходности ' + (Math.round(p.ytm*1e6)/1e4) + '% годовых. По какой цене сегодня справедливо приобрести облигацию?',
      fields: [field('ans', 'Ответ', 'руб', P, 2)], vals: { ans: P },
      fmt: 'цена облигации, руб, до сотых',
      steps: [
        'Распознать: цена облигации = приведённая стоимость всех будущих выплат (полугодовые купоны + номинал). По методу лекции (стр. 443) каждый купон C = N·c/m = ' + q(cpn, 2) + ' дисконтируется по ГОДОВОЙ доходности на свой срок в годах (k/m = 0,5; 1; 1,5; … лет), номинал - на ' + p.n + ' лет.',
        tex('P = \\sum_{k=1}^{n m}\\dfrac{C}{(1+y)^{k/m}}+\\dfrac{N}{(1+y)^{n}}'),
        tex('P = ' + q(cpn, 2) + '\\left(\\dfrac{1}{(1+' + p.ytm + ')^{0.5}}+\\dfrac{1}{(1+' + p.ytm + ')^{1}}+\\dots\\right)+\\dfrac{' + q(p.N, 0) + '}{(1+' + p.ytm + ')^{' + p.n + '}} = \\mathbf{' + q(P, 2) + '}'),

      ],
      excel: [
        ['=C/(1+y)^0,5 + C/(1+y)^1 + … + N/(1+y)^n', 'ШАБЛОН (метод лекции): купон C=N·c/m дисконтируется по ГОДОВОЙ ставке y на срок в годах (0,5; 1; 1,5 …), номинал N - на n лет'],
        ['=' + terms.join('+'), 'цена облигации с числами (метод лекции, стр. 443)'],
      ] };
  } });

/* Т5 · дюрация Маколея + модифицированная + оценка ΔP - reuse mod_duration */
G.push({ id: 'ex5_duration', topic: 't5', exam: true, title: 'Кейс: чувствительность цены облигации к ставке',
  rand: R => ({ co: pick(R, NMB), F: 1000, c: rstep(R, 0.06, 0.10, 0.01), n: ri(R, 3, 6), y: rstep(R, 0.07, 0.12, 0.01), dy: pick(R, [0.01, 0.005, -0.01]) }),
  build: p => {
    const coup = p.c * p.F; let P = 0, wsum = 0;
    for (let t = 1; t <= p.n; t++) { const cf = (t < p.n ? coup : coup + p.F), pv = cf / Math.pow(1 + p.y, t); P += pv; wsum += t * pv; }
    const mac = wsum / P, mod = mac / (1 + p.y), dPpct = -mod * p.dy, dP = dPpct * P;
    const dir = p.dy > 0 ? 'вырастет' : 'снизится';
    return { prose: true, given: [],
      q: 'Облигация компании «' + p.co + '» номиналом ' + money(p.F) + ' рублей с купоном ' + (Math.round(p.c*1e6)/1e4) + '% годовых (выплата раз в год) имеет до погашения ' + p.n + ' лет; доходность к погашению ' + (Math.round(p.y*1e6)/1e4) + '% годовых. Аналитик ожидает, что рыночная доходность ' + dir + ' на ' + Math.abs(Math.round(p.dy*1e6)/1e4) + ' п.п. На сколько рублей при этом ориентировочно изменится цена облигации?',
      fields: [field('ans', 'Ответ', 'руб', dP, 2)], vals: { ans: dP, mac: mac, mod: mod, P: P },
      fmt: 'изменение цены, руб, до сотых (знак важен)',
      steps: [
        'Распознать: оценка изменения цены при сдвиге ставки → через дюрацию. Сначала цена и дюрация Маколея (взвешенный по приведённым потокам срок): P = ' + q(P, 2) + ' руб, D_Mac = ' + q(mac, 4) + ' лет.',
        tex('D_{Mac} = \\dfrac{1}{P}\\sum_{t=1}^{n} t\\cdot\\dfrac{CF_t}{(1+y)^{t}} = ' + q(mac, 4)),
        tex('D_{mod} = \\dfrac{D_{Mac}}{1+y} = \\dfrac{' + q(mac, 4) + '}{1+' + p.y + '} = ' + q(mod, 4)),
        'Линейная оценка изменения цены при Δy = ' + pc(p.dy, 1) + ':',
        tex('\\Delta P \\approx -D_{mod}\\cdot\\Delta y\\cdot P = -' + q(mod, 4) + '\\cdot(' + p.dy + ')\\cdot' + q(P, 2) + ' = \\mathbf{' + q(dP, 2) + '}'),
        'Ставка и цена облигации движутся в противоположные стороны: ' + (p.dy > 0 ? 'доходность растёт → цена падает (ΔP < 0).' : 'доходность снижается → цена растёт (ΔP > 0).'),
      ],
      excel: [
        ['=-(дюрация_Маколея/(1+YTM))*изм_ставки*цена', 'ШАБЛОН: дюрация_Маколея = Σ t·PV(CFt)/P, YTM - доходность, изм_ставки = Δy (в долях), цена P = Σ PV(CFt)'],
        ['=-(' + q(mac, 4).replace(/\\,/g, '') + '/(1+' + p.y + '))*' + p.dy + '*' + q(P, 2).replace(/\\,/g, ''), 'оценка ΔP с числами'],
      ] };
  } });

G.push({ id: 'ex6_twostage', topic: 't6', exam: true, title: 'Биотех «ГенФарм»: оценка акции при смене фаз роста',

        tex('P_0 = \\sum_{t=1}^{' + p.th + '}\\dfrac{D_t}{(1+r)^t} + \\dfrac{\\mathrm{TV}_{' + p.th + '}}{(1+r)^{' + p.th + '}} = ' + q(pvDiv, 2) + ' + ' + q(pvTV, 2) + ' = \\mathbf{' + q(P, 2) + '}'),
      ],
      excel: [
        ['=СУММ(дисконтированные D1..Dn) + TV/(1+r)^n; где TV=Dn*(1+g_стаб)/(r-g_стаб)', 'ШАБЛОН: D1..Dn - дивиденды фазы быстрого роста; r - ставка; n - число лет фазы; g_стаб - постоянный темп после; Dn - дивиденд года n'],
        ['=' + divs.map((d, i) => d.toFixed(4) + '/(1+' + p.r + ')^' + (i + 1)).join('+') + '+' + Dn1.toFixed(4) + '/(' + p.r + '-' + p.gs + ')/(1+' + p.r + ')^' + p.th, 'цена = PV дивидендов фазы роста + PV терминальной стоимости'],

      given: [],

      excel: [
        ['=ВСД(диапазон_потоков_год_0..n)', 'ШАБЛОН: ВСД по потокам от года 0 (со знаком минус) до года n; PI =1+ЧПС(ставка;потоки_1..n)/инвестиции'],
        ['=ВСД({-' + p.I + ';' + Array(p.n).fill(p.CF).join(';') + '})', 'IRR (ВСД); PI =ЧПС(' + p.r + ';' + Array(p.n).fill(p.CF).join(';') + ')/' + p.I + ' (ЧПС уже даёт PV притоков, без +1)'],

/* NPV с оборотным капиталом (вложен в год 0, возвращён в конце) */
G.push({ id: 'ex4_npv_nwc', topic: 't4', exam: true, title: 'Компания «Бирюза»: проект с замораживанием средств в запасах',
  rand: R => ({ co: pick(R, NMT4), eq: ri(R, 15, 25), cf: ri(R, 5, 8), n: ri(R, 5, 7), r: rstep(R, 0.08, 0.12, 0.01), inv: rstep(R, 1, 2, 0.5), ar: rstep(R, 1, 2, 0.5), ap: rstep(R, 0.5, 1.5, 0.5) }),
  build: p => {
    const nwc = p.inv + p.ar - p.ap, af = AF(p.r, p.n);
    const npv = -p.eq - nwc + p.cf * af + nwc / Math.pow(1 + p.r, p.n);
    return {
      prose: true,
      given: [],
      q: 'Компания «' + p.co + '» приобретает оборудование за ' + p.eq + ' млн руб. и в течение ' + p.n + ' лет получает операционный денежный поток ' + p.cf + ' млн руб. в год. Для работы проекта в год 0 потребуется нарастить запасы на ' + p.inv + ' млн, дебиторскую задолженность на ' + p.ar + ' млн и кредиторскую задолженность на ' + p.ap + ' млн руб.; в конце проекта эти средства высвобождаются. Ставка ' + pc(p.r, 0) + '. Определите чистый приведённый эффект.',
      fields: [field('ans', 'Ответ', 'млн руб.', npv, 2)], vals: { npv, nwc },
      fmt: 'чистый приведённый эффект в млн руб., до сотых',
      steps: [
        'Прирост чистого оборотного капитала = запасы + дебиторка − кредиторка:',
        tex('\\Delta\\mathrm{NWC} = ' + p.inv + ' + ' + p.ar + ' - ' + p.ap + ' = ' + q(nwc, 2)),
        'NWC замораживается в год 0 (отток) и возвращается в последнем году (приток):',
        tex('\\mathrm{NPV} = -' + p.eq + ' - ' + q(nwc, 2) + ' + ' + p.cf + '\\cdot' + q(af, 4) + ' + \\dfrac{' + q(nwc, 2) + '}{(1+' + p.r + ')^{' + p.n + '}} = \\mathbf{' + q(npv, 2) + '}'),
      ],
      excel: [
        ['=−CAPEX−ΔNWC+OCF*B(n;r)+ΔNWC/(1+r)^n, где B(n;r)=(1−(1+r)^−n)/r', 'ШАБЛОН: вычесть оборудование и ΔNWC в год 0, дисконтировать потоки и вернуть ΔNWC в конце'],
        ['=-' + p.eq + '-(' + p.inv + '+' + p.ar + '-' + p.ap + ')+' + p.cf + '*(1-(1+' + p.r + ')^-' + p.n + ')/' + p.r + '+(' + p.inv + '+' + p.ar + '-' + p.ap + ')/(1+' + p.r + ')^' + p.n, 'NPV с числами'],
      ],
    };
  } });

/* Финансовая точка безубыточности Q* (NPV>=0) */
G.push({ id: 'ex4_fin_bep', topic: 't4', exam: true, title: 'Компания «Гелий»: минимальный объём для оправдания вложений',
  rand: R => ({ co: pick(R, NMT4), I: ri(R, 8, 16) * 1e6, n: ri(R, 5, 7), price: ri(R, 30, 40) * 10, vc: ri(R, 18, 24) * 10, FC: ri(R, 12, 18) * 1e5, am: ri(R, 20, 28) * 1e5, r: 0.1, t: 0.2 }),
  build: p => {
    const af = AF(p.r, p.n), req = p.I / af, margin = p.price - p.vc;
    const Q = Math.ceil((req + (p.FC + p.am) * (1 - p.t) - p.am) / (margin * (1 - p.t)));
    return {
      prose: true,
      given: [],
      q: 'Компания «' + p.co + '» вкладывает ' + money(p.I) + ' руб. в проект на ' + p.n + ' лет. Цена изделия ' + money(p.price) + ' руб., переменные затраты ' + money(p.vc) + ' руб./шт., постоянные затраты ' + money(p.FC) + ' руб./год, амортизация ' + money(p.am) + ' руб./год, ставка ' + pc(p.r, 0) + ', налог на прибыль ' + pc(p.t, 0) + '. Определите минимальный годовой объём продаж, при котором проект не уходит в минус по приведённому эффекту.',
      fields: [field('ans', 'Ответ', 'шт', Q, 0, 2)], vals: { Q },
      fmt: 'минимальный объём в штуках в год (округлить вверх)',
      steps: [
        'Аннуитетный эквивалент инвестиций за год:',
        tex('\\mathrm{req} = \\dfrac{I}{\\mathrm{AF}} = \\dfrac{' + q(p.I, 0) + '}{' + q(af, 4) + '} = ' + q(req, 0)),
        'Годовой поток = (маржа·Q − FC − A)(1−τ) + A. Приравниваем к req и выражаем Q:',
        tex('Q^{*} = \\dfrac{\\mathrm{req} + (\\mathrm{FC}+A)(1-\\tau) - A}{(P-V)(1-\\tau)} = \\mathbf{' + q(Q, 0) + '}'),
      ],
      excel: [
        ['=ОКРВВЕРХ((I/B(n;r)+(FC+A)*(1−налог)−A)/((цена−перем)*(1−налог));1)', 'ШАБЛОН: req делим на посленалоговую маржу с поправкой на щит, округляем вверх'],
        ['=ОКРВВЕРХ((' + p.I + '/((1-(1+' + p.r + ')^-' + p.n + ')/' + p.r + ')+(' + p.FC + '+' + p.am + ')*(1-' + p.t + ')-' + p.am + ')/((' + p.price + '-' + p.vc + ')*(1-' + p.t + '));1)', 'Q* с числами'],
      ],
    };
  } });

/* Сценарный анализ: E[NPV] и σ */
G.push({ id: 'ex4_scenario', topic: 't4', exam: true, title: 'Компания «Магнит»: ожидаемый эффект и разброс при трёх исходах',
  rand: R => {
    const pess = ri(R, -40, -5) / 10, base = ri(R, 10, 40) / 10, opt = ri(R, 45, 90) / 10;
    const pp = pick(R, [0.2, 0.25, 0.3]), po = pick(R, [0.2, 0.25, 0.3]), pb = +(1 - pp - po).toFixed(2);
    return { co: pick(R, NMT4), pess, base, opt, pp, pb, po };
  },
  build: p => {
    const sc = [[p.pess, p.pp], [p.base, p.pb], [p.opt, p.po]];
    const E = sc.reduce((a, s) => a + s[0] * s[1], 0);
    const varr = sc.reduce((a, s) => a + s[1] * (s[0] - E) * (s[0] - E), 0), sd = Math.sqrt(varr);
    return {
      prose: true,
      given: [],
      q: 'Аналитик компании «' + p.co + '» рассмотрел три исхода проекта. Пессимистический: NPV ' + f(p.pess, 1) + ' млн с вероятностью ' + pc(p.pp, 0) + '. Базовый: NPV ' + f(p.base, 1) + ' млн с вероятностью ' + pc(p.pb, 0) + '. Оптимистический: NPV ' + f(p.opt, 1) + ' млн с вероятностью ' + pc(p.po, 0) + '. Определите ожидаемое значение эффекта и меру его разброса.',
      fields: [field('E', 'Ожидаемый NPV', 'млн', E, 3), field('sd', 'Разброс (σ)', 'млн', sd, 3)], vals: { E, sd, varr },
      fmt: 'ожидаемый NPV и σ в млн руб., до тысячных',
      steps: [
        'Ожидаемый эффект - средневзвешенное по вероятностям:',
        tex('E[\\mathrm{NPV}] = \\sum \\mathrm{NPV}_i\\,P_i = ' + p.pess + '\\cdot' + p.pp + ' + ' + p.base + '\\cdot' + p.pb + ' + ' + p.opt + '\\cdot' + p.po + ' = \\mathbf{' + q(E, 3) + '}'),
        tex('\\sigma^2 = \\sum P_i(\\mathrm{NPV}_i - E)^2 = ' + q(varr, 3)),
        tex('\\sigma = \\sqrt{\\sigma^2} = \\mathbf{' + q(sd, 3) + '}'),
        'Решение принимают при E[NPV] ≥ 0; σ отражает риск (разброс исходов).',
      ],
      excel: [
        ['=СУММПРОИЗВ(диап_NPV;диап_вероятн); σ=КОРЕНЬ(СУММПРОИЗВ(вероятн;(NPV−E)^2))', 'ШАБЛОН: E - взвешенная сумма; σ - корень из взвешенной дисперсии'],
        ['=' + p.pess + '*' + p.pp + '+' + p.base + '*' + p.pb + '+' + p.opt + '*' + p.po, 'E[NPV] с числами; σ - корень из взвешенной суммы квадратов отклонений'],
      ],
    };
  } });

/* Коэффициент чувствительности NPV */
G.push({ id: 'ex4_sensitivity', topic: 't4', exam: true, title: 'Компания «Полюс»: реакция эффекта на изменение фактора',
  rand: R => {
    const NPV0 = ri(R, 80, 200), dx = pick(R, [5, 10, 20]);
    let k = rstep(R, -3, 3, 0.5); if (Math.abs(k) < 0.5) k = 1.5;
    const NPV1 = +(NPV0 * (1 + k * dx / 100)).toFixed(2);
    return { co: pick(R, NMT4), NPV0, NPV1, dx };
  },
  build: p => {
    const coef = ((p.NPV1 - p.NPV0) / p.NPV0) / (p.dx / 100);
    return {
      prose: true,
      given: [],
      q: 'У проекта компании «' + p.co + '» базовый чистый приведённый эффект ' + money(p.NPV0) + ' млн руб. При увеличении ключевого фактора X на ' + p.dx + '% эффект изменился до ' + f(p.NPV1, 2) + ' млн руб. Определите коэффициент чувствительности эффекта к фактору X.',
      fields: [field('ans', 'Ответ', '', coef, 2)], vals: { coef },
      fmt: 'коэффициент чувствительности, до сотых (знак учитывать)',
      steps: [
        'Коэффициент = относительное изменение результата на относительное изменение фактора:',
        tex('K = \\dfrac{\\Delta\\mathrm{NPV}\\,\\%}{\\Delta X\\,\\%} = \\dfrac{(' + f(p.NPV1, 2) + ' - ' + p.NPV0 + ')/' + p.NPV0 + '}{' + p.dx + '/100} = \\mathbf{' + q(coef, 2) + '}'),
        'Чем больше |K|, тем сильнее проект зависит от фактора X; K < 0 означает обратную связь.',
      ],
      excel: [
        ['=((новый_NPV−базовый_NPV)/базовый_NPV)/(изменение_фактора_в_долях)', 'ШАБЛОН: относительное изменение NPV делим на относительное изменение фактора'],
        ['=((' + p.NPV1 + '-' + p.NPV0 + ')/' + p.NPV0 + ')/(' + p.dx + '/100)', 'коэффициент с числами'],
      ],
    };
  } });

/* Рационирование капитала: выбор делимых проектов по PI в рамках бюджета */
G.push({ id: 'ex4_cap_ration', topic: 't4', exam: true, title: 'Компания «Каскад»: распределение ограниченного бюджета',
  rand: R => {
    const budget = ri(R, 10, 16) * 100, projs = [];
    for (let i = 0; i < 4; i++) projs.push({ I: ri(R, 3, 7) * 100, npv: ri(R, 5, 30) * 10 });
    return { co: pick(R, NMT4), budget, projs };
  },
  build: p => {
    const ranked = p.projs.map((x, i) => ({ I: x.I, npv: x.npv, pi: 1 + x.npv / x.I, name: 'ABCD'[i] })).sort((a, b) => b.pi - a.pi);
    let left = p.budget, total = 0, partial = false;
    for (const pr of ranked) { if (left <= 0) break; const frac = Math.min(1, left / pr.I); if (frac > 0 && frac < 1) partial = true; total += pr.npv * frac; left -= pr.I * frac; }
    const sumI = ranked.reduce((s, r) => s + r.I, 0), allFunded = p.budget >= sumI;
    const list = p.projs.map((x, i) => 'проект ' + 'ABCD'[i] + ' (вложения ' + money(x.I) + ' млн, NPV ' + money(x.npv) + ' млн)').join(', ');
    return {
      prose: true,
      given: [],
      q: 'Бюджет компании «' + p.co + '» на год ограничен суммой ' + money(p.budget) + ' млн руб. Доступны четыре делимых (можно профинансировать частично) проекта: ' + list + '. Определите максимальный суммарный чистый приведённый эффект, который можно получить в рамках бюджета.',
      fields: [field('ans', 'Ответ', 'млн', total, 2)], vals: { total },
      fmt: 'максимальный суммарный NPV в млн руб., до сотых',
      steps: [
        'Считаем индекс рентабельности PI = 1 + NPV/I и ранжируем по убыванию (отдача на рубль):',
        tex(ranked.map(r => '\\mathrm{PI}_' + r.name + ' = ' + q(r.pi, 3)).join(',\\;\\;')),
        (allFunded ? 'Бюджета хватает на все проекты целиком - частичное финансирование не требуется:' : (partial ? 'Берём проекты сверху вниз, последний - частично на остаток бюджета:' : 'Берём проекты сверху вниз в порядке PI целиком, пока хватает бюджета:')),
        tex('\\textstyle\\sum \\mathrm{NPV} = \\mathbf{' + q(total, 2) + '}'),
      ],
      excel: [
        ['=1+NPV/I для каждого проекта; сортировать по PI ↓ и заполнять бюджет', 'ШАБЛОН: ранжируем по индексу, последний проект финансируем на остаток'],
        ['PI: ' + ranked.map(r => r.name + '=' + f(r.pi, 3)).join('; '), 'жадно заполнить бюджет ' + p.budget + ' → Σ NPV =' + f(total, 2)],
      ],
    };
  } });

/* Приростной поток: альтернативные (упущенная аренда) + безвозвратные затраты */
G.push({ id: 'ex4_incr_opp', topic: 't4', exam: true, title: 'Компания «Ритм»: проект на занятой площадке с прошлыми расходами',
  rand: R => ({ co: pick(R, NMT4), I: ri(R, 8, 14), dS: ri(R, 5, 9), dC: rstep(R, 1.5, 3.5, 0.5), A: rstep(R, 1.2, 2.4, 0.2), rent: rstep(R, 0.4, 1, 0.1), sunk: rstep(R, 0.3, 1.2, 0.1), n: ri(R, 4, 6), r: rstep(R, 0.1, 0.13, 0.01), t: 0.2 }),
  build: p => {
    const dEBIT = p.dS - p.dC - p.A - p.rent, dtax = Math.max(0, dEBIT) * p.t, dFCF = dEBIT - dtax + p.A, npv = -p.I + dFCF * AF(p.r, p.n);
    return {
      prose: true,
      given: [],
      q: 'Компания «' + p.co + '» оценивает проект с вложениями ' + p.I + ' млн руб. на ' + p.n + ' лет. Он принесёт дополнительную выручку ' + p.dS + ' млн и дополнительные денежные затраты ' + p.dC + ' млн в год; амортизация ' + p.A + ' млн в год. Под проект займут помещение, которое иначе сдавалось бы в аренду за ' + p.rent + ' млн руб. в год (до налога). На предварительное маркетинговое исследование уже потрачено ' + p.sunk + ' млн руб. Ставка ' + pc(p.r, 0) + ', налог ' + pc(p.t, 0) + '. Определите чистый приведённый эффект по приростному потоку.',
      fields: [field('ans', 'Ответ', 'млн', npv, 2)], vals: { npv, dFCF },
      fmt: 'чистый приведённый эффект в млн руб., до сотых',
      steps: [
        'Уже потраченные ' + f(p.sunk, 1) + ' млн - безвозвратные, в расчёт не входят. Упущенная аренда - альтернативная затрата, входит (до налога):',
        tex('\\Delta\\mathrm{EBIT} = \\Delta S - \\Delta C - A - \\mathrm{Rent} = ' + p.dS + ' - ' + p.dC + ' - ' + p.A + ' - ' + p.rent + ' = ' + q(dEBIT, 2)),
        tex('\\Delta\\mathrm{FCF} = \\Delta\\mathrm{EBIT} - \\max(\\Delta\\mathrm{EBIT},0)\\cdot\\tau + A = ' + q(dEBIT, 2) + ' - ' + q(dtax, 2) + ' + ' + p.A + ' = ' + q(dFCF, 2)),
        tex('\\mathrm{NPV} = -' + p.I + ' + ' + q(dFCF, 2) + '\\cdot' + q(AF(p.r, p.n), 4) + ' = \\mathbf{' + q(npv, 2) + '}'),
      ],
      excel: [
        ['=−I+((ΔS−ΔC−A−аренда)−МАКС(ΔS−ΔC−A−аренда;0)*налог+A)*B(n;r)', 'ШАБЛОН: безвозвратные игнорируем, аренду вычитаем, налог только с положительной прибыли'],
        ['=-' + p.I + '+((' + p.dS + '-' + p.dC + '-' + p.A + '-' + p.rent + ')-МАКС(' + p.dS + '-' + p.dC + '-' + p.A + '-' + p.rent + ';0)*' + p.t + '+' + p.A + ')*(1-(1+' + p.r + ')^-' + p.n + ')/' + p.r, 'NPV с числами (sunk ' + p.sunk + ' млн не учитываем)'],
      ],
    };
  } });

/* Терминальная стоимость (Гордон) внутри DCF */

        ['=CF*(1+g)/(ставка−g)', 'ШАБЛОН: поток следующего года делим на разность ставки и темпа роста'],

/* ===== COVERAGE-FILL t5 ===== */
/* Т5 · приближённая YTM + сравнение двух облигаций - covers approx_ytm, compare_ytm */
G.push({ id: 'ex5_approx_ytm', topic: 't5', exam: true, title: 'Кейс: выбор более доходной облигации к погашению',
  rand: R => ({ co: pick(R, NMB), N: 1000, n: ri(R, 4, 8),
    cA: rstep(R, 0.06, 0.09, 0.01), PA: ri(R, 95, 108) * 10,
    cB: rstep(R, 0.05, 0.08, 0.01), PB: ri(R, 90, 100) * 10 }),
  build: p => {
    const couA = p.cA * p.N, couB = p.cB * p.N;
    const ytmA = (couA + (p.N - p.PA) / p.n) / ((p.N + p.PA) / 2);
    const ytmB = (couB + (p.N - p.PB) / p.n) / ((p.N + p.PB) / 2);
    const win = ytmB > ytmA ? 'Б' : 'А';

/* Т5 · YTM амортизируемой облигации (IRR потока с возвратом части номинала ежегодно) - covers amort_ytm */
G.push({ id: 'ex5_amort', topic: 't5', exam: true, title: 'Кейс: доходность облигации с амортизацией номинала',

  build: p => {
    const amort = p.N / p.n, cf = [-p.P]; let outstanding = p.N; const flows = [];

      q: 'Облигация компании «' + p.co + '» номиналом ' + money(p.N) + ' рублей погашается равными долями номинала в течение ' + p.n + ' лет (по ' + money(amort) + ' рублей в год), а купон ' + (Math.round(p.c*1e6)/1e4) + '% годовых начисляется на непогашённый остаток номинала. Инвестор покупает бумагу по ' + money(p.P) + ' рублей. Какую доходность годовых он получит, удерживая её до полного погашения?',

        'Распознать: доходность = ставка, уравнивающая цену с приведённой стоимостью всех выплат (внутренняя норма доходности денежного потока, стр. 446). Номинал возвращается частями, поэтому база начисления купона ежегодно уменьшается.',
        'Годовое погашение тела = N/n = ' + q(amort, 2) + ' руб. Выплата года t = купон на остаток + ' + q(amort, 2) + '. Поток: ' + flows.join('; ') + ' руб.',
        tex('-P + \\sum_{t=1}^{n}\\dfrac{C_t + A}{(1+y)^{t}} = 0'),
        tex('\\mathrm{YTM} = \\mathbf{' + q(ytm * 100, 2) + '\\%}'),

  } });

/* Т3 · изменение потребности в оборотном капитале при росте DPO */
G.push({ id: 'ex3_nwc_dpo', topic: 't3', exam: true, title: 'Кейс: высвобождает ли средства рост отсрочки поставщикам',
  rand: R => ({ co: pick(R, NM), S0: ri(R, 30, 50) * 10, g: rstep(R, 0.10, 0.20, 0.05), cog: rstep(R, 0.55, 0.70, 0.05), dso: ri(R, 35, 50), dio: ri(R, 25, 40), dpo0: ri(R, 35, 45), dpoN: ri(R, 50, 60), bump: rstep(R, 0.02, 0.04, 0.01) }),
  build: p => {
    const cog0 = p.S0 * p.cog, ar0 = p.S0 * p.dso / 365, inv0 = cog0 * p.dio / 365, ap0 = cog0 * p.dpo0 / 365, nwc0 = ar0 + inv0 - ap0;
    const S1 = p.S0 * (1 + p.g), cogP = p.cog * (1 + p.bump), cog1 = S1 * cogP, ar1 = S1 * p.dso / 365, inv1 = cog1 * p.dio / 365, ap1 = cog1 * p.dpoN / 365, nwc1 = ar1 + inv1 - ap1;
    const d = nwc1 - nwc0;
    return { prose: true, given: [],
      q: 'Компания «' + p.co + '» планирует рост выручки с ' + money(p.S0) + ' до ' + money(Math.round(S1)) + ' млн рублей (на ' + (Math.round(p.g*1e6)/1e4) + '%). Себестоимость — ' + (Math.round(p.cog*1e6)/1e4) + '% выручки. Оборачиваемость текущего года: период дебиторки DSO = ' + p.dso + ' дн., период запасов DIO = ' + p.dio + ' дн., период кредиторки DPO = ' + p.dpo0 + ' дн. Финансовый директор предлагает договориться с поставщиками об увеличении отсрочки до DPO = ' + p.dpoN + ' дн., но из-за этого закупочные цены вырастут на ' + (Math.round(p.bump*1e6)/1e4) + '%, что пропорционально увеличит себестоимость (её доля в выручке вырастет относительно текущей на ' + (Math.round(p.bump*1e6)/1e4) + '%). Политика по запасам и дебиторке не меняется. Как изменится потребность в оборотном капитале (ΔNWC) по сравнению с текущим уровнем? Выгодно ли это (минус = высвобождение средств)?',
      fields: [field('ans', 'ΔNWC', 'млн руб', d, 2)], vals: { nwc0, nwc1, d },
      fmt: 'изменение NWC, млн руб, до сотых; минус = высвобождение (выгодно)',
      steps: [
        'NWC = ДЗ + Запасы − КЗ, где ДЗ = Выручка·DSO/365, Запасы = Себестоимость·DIO/365, КЗ = Себестоимость·DPO/365 (год = 365 дней).',
        tex('\\mathrm{NWC}_0 = \\tfrac{S_0\\cdot DSO}{365} + \\tfrac{COGS_0\\cdot DIO}{365} - \\tfrac{COGS_0\\cdot DPO_0}{365} = ' + q(nwc0, 2)),
        'В новом году: S₁ = ' + q(S1, 1) + ', доля себестоимости ' + q(cogP * 100, 2) + '%, COGS₁ = ' + q(cog1, 2) + ', DPO = ' + p.dpoN + '.',
        tex('\\mathrm{NWC}_1 = ' + q(nwc1, 2) + ' \\;\\Rightarrow\\; \\Delta\\mathrm{NWC} = ' + q(nwc1, 2) + ' - ' + q(nwc0, 2) + ' = \\mathbf{' + q(d, 2) + '}'),
        d < 0 ? 'ΔNWC < 0 — потребность в финансировании снижается, средства высвобождаются: выгодно.' : 'ΔNWC > 0 — потребность в финансировании растёт: рост отсрочки не перекрывает эффект роста выручки и удорожания.',
      ],
      excel: [['=(S1*DSO+COGS1*DIO-COGS1*DPOn)/365 - (S0*DSO+COGS0*DIO-COGS0*DPO0)/365', 'ШАБЛОН: NWC нового года минус текущего; COGS = выручка·доля себестоимости (амортизация дней /365)'], ['=(' + S1 + '*' + p.dso + '+' + cog1 + '*' + p.dio + '-' + cog1 + '*' + p.dpoN + ')/365-(' + p.S0 + '*' + p.dso + '+' + cog0 + '*' + p.dio + '-' + cog0 + '*' + p.dpo0 + ')/365', 'ΔNWC с числами условия']],
    };
  } });

/* Т4 · NPV с амортизационным налоговым щитом */
G.push({ id: 'ex4_npv_taxshield', topic: 't4', exam: true, title: 'Кейс: NPV проекта с амортизационным налоговым щитом',

      fields: [field('ans', 'NPV', 'млн руб', npv, 2)], vals: { dep, ebit, cf, npv },

/* Т4 · PV растущего аннуитета против ошибочного среднего арифметического */
G.push({ id: 'ex4_grow_vs_avg', topic: 't4', exam: true, title: 'Кейс: растущая аренда — нельзя считать по среднему',

    return { prose: true, given: [],
      q: 'Владелец сдаёт ' + p.asset + ' в аренду на ' + p.n + ' лет. Платёж первого года — ' + money(p.C1) + ' рублей, далее индексируется на ' + (Math.round(p.g*1e6)/1e4) + '% ежегодно. Стоимость денег во времени — ' + (Math.round(p.r*1e6)/1e4) + '%. Бухгалтер для оценки берёт средний арифметический платёж за ' + p.n + ' лет и считает как обычный аннуитет. Экономист возражает: платежи неравномерны, нужен метод растущего аннуитета. На сколько рублей расходятся две оценки приведённой стоимости?',
      fields: [field('ans', 'Расхождение', 'руб', diff, 0)], vals: { pvGrow, pvAvg, mean, diff },
      fmt: 'расхождение двух подходов, руб, до целых; точен метод растущего аннуитета (экономиста)',
      steps: [
        'Распознать: платежи растут с темпом g → приведённая стоимость считается как растущий аннуитет, а не через среднее арифметическое (среднее завышает PV, так как игнорирует более поздний приход крупных платежей).',

      excel: [['=СрПлатёж*AF − C1*(1-((1+g)/(1+r))^n)/(r-g)', 'ШАБЛОН: PV по среднему минус PV растущего аннуитета'], ['=' + mean + '*((1-(1+' + p.r + ')^-' + p.n + ')/' + p.r + ')-' + p.C1 + '*(1-((1+' + p.g + ')/(1+' + p.r + '))^' + p.n + ')/(' + p.r + '-' + p.g + ')', 'расхождение с числами условия']],
    };
  } });

/* Т6 · трёхэтапная (трёхфазная) дивидендная модель (Часть 2, экзамен) */
G.push({ id: 'ex6_three_stage', topic: 't6', exam: true, title: 'Кейс: трёхфазная модель оценки акции', added: ADD2,
  rand: R => { let g1, g2, gL, r; do { g1 = rstep(R, 0.15, 0.22, 0.01); g2 = rstep(R, 0.08, 0.12, 0.01); gL = rstep(R, 0.03, 0.05, 0.01); r = rstep(R, 0.11, 0.14, 0.01); } while (!(g1 > g2 && g2 > gL && r > gL + 0.02)); return { co: pick(R, NMB || NM), D0: rstep(R, 2, 5, 0.5), g1, n1: ri(R, 2, 3), g2, n2: ri(R, 2, 3), gL, r }; },
  build: p => {
    let D = p.D0, pv = 0, k = 0;
    for (let i = 0; i < p.n1; i++) { k++; D *= (1 + p.g1); pv += D / Math.pow(1 + p.r, k); }
    for (let i = 0; i < p.n2; i++) { k++; D *= (1 + p.g2); pv += D / Math.pow(1 + p.r, k); }
    const Dterm = D * (1 + p.gL), TV = Dterm / (p.r - p.gL), pvTV = TV / Math.pow(1 + p.r, k), P0 = pv + pvTV;
    return { prose: true, given: [],
      q: 'Дивиденд компании «' + p.co + '» сейчас ' + q(p.D0, 1) + ' руб. Ожидается рост ' + (Math.round(p.g1*1e6)/1e4) + '% в течение ' + p.n1 + ' лет, затем ' + (Math.round(p.g2*1e6)/1e4) + '% ещё ' + p.n2 + ' лет, далее устойчиво ' + (Math.round(p.gL*1e6)/1e4) + '% бессрочно. Требуемая доходность ' + (Math.round(p.r*1e6)/1e4) + '%. Найдите справедливую цену акции.',
      fields: [field('ans', 'Цена акции', 'руб', P0, 2)], vals: { P0, pvTV, TV },
      fmt: 'цена акции в руб, до сотых',
      steps: [
        'Распознать: три фазы роста → дисконтируем дивиденды по годам, последнюю фазу сворачиваем в терминальную стоимость (Гордон) на конце ' + (p.n1 + p.n2) + '-го года.',
        'Сумма приведённых дивидендов за ' + (p.n1 + p.n2) + ' лет = ' + q(pv, 2) + '.',
        tex('TV = \\dfrac{D_{' + (p.n1 + p.n2) + '}(1+g_L)}{r-g_L} = ' + q(TV, 2) + ',\\;\\; PV(TV) = \\dfrac{' + q(TV, 2) + '}{(1+' + p.r + ')^{' + (p.n1 + p.n2) + '}} = ' + q(pvTV, 2)),
        tex('P_0 = ' + q(pv, 2) + ' + ' + q(pvTV, 2) + ' = \\mathbf{' + q(P0, 2) + '}'),
      ],
      excel: [['=ЧПС(r; дивиденды по годам) + ТерминальнаяСтоимость/(1+r)^N', 'ШАБЛОН трёхфазной модели'], ['TV=' + q(TV, 2) + '; P0=PV(дивиденды)+' + q(pvTV, 2), 'итог']],
    };
  } });

G.push({ id: 'ex4_depr_method', topic: 't4', exam: true, title: 'Кейс: ускоренная амортизация против линейной', added: ADD3,

      q: 'Компания «' + p.co + '» покупает оборудование за ' + money(p.I) + ' млн руб. (срок ' + p.n + ' лет, остаточная стоимость 0). Ставка налога ' + (Math.round(p.t*1e6)/1e4) + '%, дисконт ' + (Math.round(p.r*1e6)/1e4) + '%. Финансист предлагает вместо линейной амортизации использовать ускоренную (метод суммы чисел лет). На сколько вырастет приведённая стоимость амортизационного налогового щита (и, значит, NPV проекта) при переходе на ускоренную амортизацию?',
      fields: [field('ans', 'Прирост PV щита', 'млн руб', diff, 3)], vals: { pvLin, pvAcc, diff },
      fmt: 'прирост приведённой стоимости налогового щита, млн руб, до тысячных',
      steps: [
        'Распознать: и линейная, и ускоренная амортизация дают одинаковую СУММУ щита, но ускоренная сдвигает его на ранние годы → выше приведённая стоимость. Считаем PV налогового щита (амортизация·налог) при каждом методе и берём разницу.',
        tex('\\mathrm{PV}_{\\text{лин}} = \\dfrac{I}{n}\\cdot\\tau\\cdot AF(r,n) = ' + q(pvLin, 3)),
        'Ускоренная (сумма чисел лет, делитель ' + syd + '): амортизация года k = I·(n−k+1)/' + syd + ', щит дисконтируем по годам → PV = ' + q(pvAcc, 3) + '.',
        tex('\\Delta = \\mathrm{PV}_{\\text{уск}} - \\mathrm{PV}_{\\text{лин}} = ' + q(pvAcc, 3) + ' - ' + q(pvLin, 3) + ' = \\mathbf{' + q(diff, 3) + '}'),
      ],
      excel: [['PV щита = Σ (Аморт_k·Налог)/(1+r)^k для каждого метода, затем разница', 'ШАБЛОН: ускоренная сдвигает щит влево'], ['=' + p.t + '*(сумма ускор. щитов) - ' + q(pvLin, 4) + '', 'разница PV щитов']],
    };
  } });

G.push({ id: 'ex2_loan_balance', topic: 't2', exam: true, title: 'Кейс: остаток долга по кредиту', added: ADD4,
  rand: R => ({ co: pick(R, NM), PV: ri(R, 12, 28) * 100000, r: rstep(R, 0.10, 0.16, 0.01), n: ri(R, 5, 8), k: ri(R, 2, 4) }),
  build: p => { const pmt = p.PV / AF(p.r, p.n), bal = pmt * AF(p.r, p.n - p.k);
    return { prose: true, given: [], q: 'Компания «' + p.co + '» взяла кредит ' + money(p.PV) + ' рублей на ' + p.n + ' лет под ' + (Math.round(p.r*1e6)/1e4) + '% с равными (аннуитетными) платежами. Какой остаток задолженности после ' + p.k + ' платежей?',
      fields: [field('ans', 'Остаток долга', 'руб', bal, 2)], vals: { bal, pmt }, fmt: 'остаток долга в руб, до сотых',
      steps: ['Распознать: остаток долга = приведённая стоимость оставшихся (n−k) платежей.', tex('\\mathrm{PMT} = \\dfrac{PV}{AF(r,n)} = ' + q(pmt, 2) + ',\\;\\; \\text{Остаток} = \\mathrm{PMT}\\cdot AF(r, n-k) = \\mathbf{' + q(bal, 2) + '}')],
      excel: [['=ПС(r; n-k; -PMT)', 'остаток'], ['=ПС(' + p.r + ';' + (p.n - p.k) + ';-' + p.PV + '/((1-(1+' + p.r + ')^-' + p.n + ')/' + p.r + '))', 'с числами']] }; } });

G.push({ id: 'ex2_loan_diff', topic: 't2', exam: true, title: 'Кейс: дифференцированный платёж по кредиту', added: ADD4,
  rand: R => ({ co: pick(R, NM), PV: ri(R, 12, 28) * 100000, r: rstep(R, 0.10, 0.17, 0.01), n: ri(R, 4, 8), k: ri(R, 1, 4) }),
  build: p => { const principal = p.PV / p.n, balStart = p.PV * (p.n - (p.k - 1)) / p.n, pay = principal + p.r * balStart;
    return { prose: true, given: [], q: 'Компания «' + p.co + '» гасит кредит ' + money(p.PV) + ' рублей (' + p.n + ' лет, ' + (Math.round(p.r*1e6)/1e4) + '%) ДИФФЕРЕНЦИРОВАННЫМИ платежами: тело равными долями плюс проценты на остаток. Каков платёж в год ' + p.k + '?',
      fields: [field('ans', 'Платёж года ' + p.k, 'руб', pay, 2)], vals: { pay, principal }, fmt: 'платёж года k в руб, до сотых',
      steps: ['Тело гасится равными долями PV/n; проценты — на остаток долга на начало года.', tex('\\text{Платёж}_{' + p.k + '} = \\dfrac{PV}{n} + r\\cdot PV\\cdot\\dfrac{n-(k-1)}{n} = ' + q(principal, 2) + ' + ' + p.r + '\\cdot' + q(balStart, 2) + ' = \\mathbf{' + q(pay, 2) + '}')],
      excel: [['=PV/n + r*PV*(n-(k-1))/n', 'дифференцированный платёж года k'], ['=' + p.PV + '/' + p.n + '+' + p.r + '*' + p.PV + '*(' + p.n + '-(' + p.k + '-1))/' + p.n, 'с числами']] }; } });

G.push({ id: 'ex3_crqr', topic: 't3', exam: true, title: 'Кейс: текущая и быстрая ликвидность по балансу', added: ADD4,

G.push({ id: 'ex3_roic', topic: 't3', exam: true, title: 'Кейс: рентабельность инвестированного капитала ROIC', added: ADD4,

G.push({ id: 'ex3_tie', topic: 't3', exam: true, title: 'Кейс: коэффициент покрытия процентов', added: ADD4,

G.push({ id: 'ex3_turnover', topic: 't3', exam: true, title: 'Кейс: оборачиваемость запасов и дебиторки (в разах)', added: ADD4,

G.push({ id: 'ex3_trade_credit', topic: 't3', exam: true, title: 'Кейс: стоимость отказа от скидки', added: ADD4,

      fields: [field('ans', 'Стоимость кредита', '%', cost, 2)], vals: { cost }, fmt: 'годовая стоимость в %, до сотых',
      steps: [tex('\\text{Cost} = \\dfrac{d}{1-d}\\cdot\\dfrac{365}{N-t_1} = \\dfrac{' + d + '}{1-' + d + '}\\cdot\\dfrac{365}{' + p.net + '-' + p.dDays + '} = \\mathbf{' + q(cost, 2) + '\\%}'), 'Дорогой источник — обычно выгоднее оплатить со скидкой.'],
      excel: [['=(d/(1-d))*(365/(N-t1))', 'стоимость отказа от скидки'], ['=(' + d + '/(1-' + d + '))*(365/(' + p.net + '-' + p.dDays + '))', 'с числами (×100 для %)']] }; } });

G.push({ id: 'ex3_roa', topic: 't3', exam: true, title: 'Кейс: рентабельность активов ROA', added: ADD4,

G.push({ id: 'ex3_lev_ratios', topic: 't3', exam: true, title: 'Кейс: коэффициенты финансового рычага', added: ADD4,

G.push({ id: 'ex3_dupont5', topic: 't3', exam: true, title: 'Кейс: ROE по пятифакторной модели DuPont', added: ADD4,
  rand: R => { const S = ri(R, 800, 2000), A = ri(R, 600, 1800), E = ri(R, Math.round(A * 0.4), Math.round(A * 0.8)), ebit = ri(R, 80, 300), interest = ri(R, 10, Math.floor(ebit * 0.5)), t = pick(R, [0.20, 0.25]); return { co: pick(R, NM), S, A, E, ebit, interest, t }; },
  build: p => { const ebt = p.ebit - p.interest, ni = ebt * (1 - p.t), roe = (ni / ebt) * (ebt / p.ebit) * (p.ebit / p.S) * (p.S / p.A) * (p.A / p.E) * 100;
    return { prose: true, given: [], q: 'У компании «' + p.co + '»: выручка ' + p.S + ', EBIT ' + p.ebit + ', проценты ' + p.interest + ' (млн руб), налог ' + Math.round(p.t*100) + '%, активы ' + p.A + ', собственный капитал ' + p.E + '. Найдите ROE по пятифакторной модели DuPont.',
      fields: [field('ans', 'ROE', '%', roe, 2)], vals: { roe }, fmt: 'ROE в %, до сотых',
      steps: ['ROE = налоговое бремя · процентное бремя · опер. маржа · оборачиваемость активов · фин. рычаг.', tex('\\mathrm{ROE} = \\tfrac{NI}{EBT}\\cdot\\tfrac{EBT}{EBIT}\\cdot\\tfrac{EBIT}{S}\\cdot\\tfrac{S}{A}\\cdot\\tfrac{A}{E} = \\mathbf{' + q(roe, 2) + '\\%}')],
      excel: [['=(NI/EBT)*(EBT/EBIT)*(EBIT/Выручка)*(Выручка/Активы)*(Активы/СК)', '5-факторный DuPont'], ['=(' + q(ni / ebt, 4) + ')*(' + q(ebt / p.ebit, 4) + ')*(' + q(p.ebit / p.S, 4) + ')*(' + q(p.S / p.A, 4) + ')*(' + q(p.A / p.E, 4) + ')', 'с числами']] }; } });

G.push({ id: 'ex3_cf_statement', topic: 't3', exam: true, title: 'Кейс: денежные потоки OCF/CFI/CFF', added: ADD4,
  rand: R => ({ co: pick(R, NM), NI: ri(R, 40, 150), dep: ri(R, 20, 80), dnwc: ri(R, -20, 40), capex: ri(R, 30, 120), borrow: ri(R, -40, 60), div: ri(R, 0, 50) }),

      fields: [field('ocf', 'OCF', 'млн', ocf, 2), field('net', 'Δ Денег', 'млн', net, 2)], vals: { ocf, cfi, cff, net }, fmt: 'OCF и Δ денег в млн, до сотых',
      steps: [tex('\\mathrm{OCF} = NI + DA - \\Delta NWC = ' + p.NI + '+' + p.dep + '-(' + p.dnwc + ') = ' + q(ocf, 2)), tex('\\mathrm{CFI} = ' + q(cfi, 2) + ',\\;\\mathrm{CFF} = ' + q(cff, 2) + ',\\;\\Delta\\text{Cash} = \\mathbf{' + q(net, 2) + '}')],
      excel: [['=NI+Аморт-ПриростЧОК', 'OCF'], ['=OCF-Капзатраты+(ЧистоеЗаимствование-Дивиденды)', 'Δ денег']] }; } });

G.push({ id: 'ex4_compare_npv', topic: 't4', exam: true, title: 'Кейс: выбор из двух равносрочных проектов по NPV', added: ADD4,
  rand: R => ({ co: pick(R, NM), IA: ri(R, 8, 14) * 100, cfA: ri(R, 30, 50) * 10, IB: ri(R, 6, 12) * 100, cfB: ri(R, 25, 45) * 10, n: ri(R, 4, 6), r: rstep(R, 0.10, 0.14, 0.01) }),
  build: p => { const af = AF(p.r, p.n), npvA = -p.IA + p.cfA * af, npvB = -p.IB + p.cfB * af, win = npvA > npvB ? 'А' : 'Б';
    return { prose: true, given: [], q: 'Компания «' + p.co + '» выбирает один из двух взаимоисключающих проектов на ' + p.n + ' лет (ставка ' + (Math.round(p.r*1e6)/1e4) + '%). Проект А: вложения ' + money(p.IA) + ', поток ' + money(p.cfA) + '/год. Проект Б: вложения ' + money(p.IB) + ', поток ' + money(p.cfB) + '/год. Какой проект выгоднее и каковы их NPV?',
      fields: [field('npvA', 'NPV А', 'тыс', npvA, 2), field('npvB', 'NPV Б', 'тыс', npvB, 2)], vals: { npvA, npvB, win }, fmt: 'два NPV в тыс. руб, до сотых; выгоднее ' + win,
      steps: [tex('\\mathrm{NPV}_A = -' + p.IA + ' + ' + p.cfA + '\\cdot' + q(af, 4) + ' = \\mathbf{' + q(npvA, 2) + '}'), tex('\\mathrm{NPV}_Б = -' + p.IB + ' + ' + p.cfB + '\\cdot' + q(af, 4) + ' = \\mathbf{' + q(npvB, 2) + '}'), 'Выше NPV у проекта ' + win + '.'],
      excel: [['=-Инвестиции+Поток*((1-(1+r)^-n)/r)', 'NPV каждого проекта'], ['=-' + p.IA + '+' + p.cfA + '*((1-(1+' + p.r + ')^-' + p.n + ')/' + p.r + ')', 'NPV А с числами']] }; } });

G.push({ id: 'ex4_choose_npv', topic: 't4', exam: true, title: 'Кейс: выбор станка по NPV (через маржу)', added: ADD4,
  rand: R => ({ co: pick(R, NM), price: ri(R, 150, 300), IA: ri(R, 4, 7), volA: ri(R, 8, 14) * 1000, vcA: ri(R, 40, 90), nA: ri(R, 4, 6), IB: ri(R, 6, 10), volB: ri(R, 12, 18) * 1000, vcB: ri(R, 35, 80), nB: ri(R, 5, 7), r: rstep(R, 0.10, 0.14, 0.01) }),
  build: p => { const mA = (p.price - p.vcA) * p.volA / 1e6, mB = (p.price - p.vcB) * p.volB / 1e6, npvA = -p.IA + mA * AF(p.r, p.nA), npvB = -p.IB + mB * AF(p.r, p.nB), win = npvA > npvB ? 'А' : 'Б';
    return { prose: true, given: [], q: 'Компания «' + p.co + '» выбирает станок (цена продукции ' + p.price + ' руб/ед, ставка ' + (Math.round(p.r*1e6)/1e4) + '%, налоги не учитываем). Станок А: цена ' + p.IA + ' млн, объём ' + money(p.volA) + ' ед/год, перем. затраты ' + p.vcA + ' руб/ед, срок ' + p.nA + ' лет. Станок Б: цена ' + p.IB + ' млн, объём ' + money(p.volB) + ' ед/год, перем. ' + p.vcB + ' руб/ед, срок ' + p.nB + ' лет. Какой выгоднее по NPV?',
      fields: [field('npvA', 'NPV А', 'млн', npvA, 2), field('npvB', 'NPV Б', 'млн', npvB, 2)], vals: { npvA, npvB, win }, fmt: 'два NPV в млн, до сотых; выгоднее ' + win,
      steps: ['Годовая маржа = (цена − перем.)·объём.', tex('\\mathrm{NPV}_A = -' + p.IA + ' + ' + q(mA, 3) + '\\cdot AF = \\mathbf{' + q(npvA, 2) + '},\\;\\; \\mathrm{NPV}_Б = -' + p.IB + ' + ' + q(mB, 3) + '\\cdot AF = \\mathbf{' + q(npvB, 2) + '}'), 'Выбираем ' + win + '.'],
      excel: [['=-Цена_станка+(ЦенаЕд-ПеремЕд)*Объём*AF(r,n)', 'NPV станка'], ['=-' + p.IA + '+(' + p.price + '-' + p.vcA + ')*' + p.volA + '/1000000*((1-(1+' + p.r + ')^-' + p.nA + ')/' + p.r + ')', 'NPV А']] }; } });

G.push({ id: 'ex5_duration_mac', topic: 't5', exam: true, title: 'Кейс: дюрация Маколея облигации', added: ADD4,
  rand: R => ({ co: pick(R, NMB || NM), N: 1000, c: rstep(R, 0.06, 0.10, 0.01), n: ri(R, 3, 6), y: rstep(R, 0.07, 0.12, 0.01) }),
  build: p => { const coup = p.c * p.N; let P = 0, w = 0; for (let t = 1; t <= p.n; t++) { const cf = t < p.n ? coup : coup + p.N, pv = cf / Math.pow(1 + p.y, t); P += pv; w += t * pv; } const mac = w / P;

G.push({ id: 'grow_annuity', topic: 't2', title: 'Растущий аннуитет: PV и FV', added: ADD5,
  rand: R => { let r, g; do { r = rstep(R, 0.10, 0.16, 0.01); g = rstep(R, 0.03, 0.07, 0.01); } while (r <= g + 0.03); return { C1: ri(R, 20, 60) * 10000, g, r, n: ri(R, 4, 7) }; },
  build: p => { const pv = p.C1 * (1 - Math.pow((1 + p.g) / (1 + p.r), p.n)) / (p.r - p.g), fv = p.C1 * (Math.pow(1 + p.r, p.n) - Math.pow(1 + p.g, p.n)) / (p.r - p.g);
    return { given: [['Платёж года 1 (C₁)', money(p.C1) + ' руб'], ['Темп роста (g)', pc(p.g, 0)], ['Ставка (r)', pc(p.r, 0)], ['Срок (n)', p.n + ' лет']],
      q: 'Платёж растёт на g% в год. Найдите приведённую (PV) и будущую (FV) стоимость растущего аннуитета.',
      fields: [field('pv', 'PV', 'руб', pv, 2), field('fv', 'FV', 'руб', fv, 2)], vals: { pv, fv }, fmt: 'PV и FV в руб, до сотых',
      steps: ['Обозначения: C₁ — первый платёж; g — темп роста платежа; r — ставка (r>g); n — число платежей. Растущий аннуитет: каждый следующий платёж в (1+g) раз больше.',
        tex('\\mathrm{PV} = C_1\\dfrac{1-\\left(\\frac{1+g}{1+r}\\right)^{n}}{r-g} = \\mathbf{' + q(pv, 2) + '}'),

  opts = opts || {};
  const o = { id: id, topic: topic, title: title, rand: R => ({}), build: p => ({ recog: true, given: [], q: q, accept: accept, fmt: 'термин/показатель (одним словом или словосочетанием)', steps: steps }) };

}
