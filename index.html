 {cat:"infl", q:"Для оценки финансовой реализуемости проекта и потребности в финансировании (включая ΔNWC) корректнее использовать:", o:["Номинальные (прогнозные) цены","Реальные (фиксированные) цены","Цены базового года без индексации","Любые, результат одинаков"], c:0, e:"Потребность в деньгах и финансовая реализуемость оцениваются в номинальных ценах, так как платить придётся деньгами каждого будущего года; в реальных ценах это оценить нельзя."},
 {cat:"risk", q:"Чем отличается сценарный анализ от однофакторного анализа чувствительности?", o:["В сценарном анализе меняют сразу группу параметров согласованно, а при анализе чувствительности по одному","В сценарном анализе меняют только один параметр, а при анализе чувствительности сразу несколько","Сценарный анализ не использует вероятности, а анализ чувствительности использует","Анализ чувствительности применяется только к бесконечным проектам"], c:0, e:"Анализ чувствительности однофакторный (меняем один параметр на плюс-минус процент), а сценарный анализ меняет согласованно целую группу параметров (оптимистичный, нормальный, пессимистичный)."},
 {cat:"risk", q:"Какой метод оценки риска НЕОБХОДИМ, когда решения по проекту принимаются поэтапно и зависят от предыдущих исходов?", o:["Дерево решений","Однофакторный анализ чувствительности","Расчёт точки безубыточности","Расчёт операционного рычага DOL"], c:0, e:"Дерево решений применяют при поэтапных решениях: оно работает с условными вероятностями и учитывает управленческую гибкость (реальные опционы)."},
 {cat:"risk", q:"У проекта высокая доля постоянных затрат (FC). Как это влияет на операционный рычаг (DOL) и риск?", o:["DOL выше, прибыль сильнее реагирует на колебания выручки, операционный риск выше","DOL ниже, прибыль почти не реагирует на выручку, риск ниже","DOL не зависит от структуры затрат","DOL становится отрицательным, риск исчезает"], c:0, e:"DOL = 1 + FC/Прибыль: чем больше доля постоянных затрат, тем выше рычаг и тем сильнее прибыль скачет при изменении выручки, то есть выше операционный риск."},
 {cat:"risk", q:"Постоянные затраты проекта 200, цена единицы 10, переменные затраты на единицу 6. Сколько единиц надо продать для операционной безубыточности?", o:["50","20","33","80"], c:0, e:"Q = FC/(p-c) = 200/(10-6) = 200/4 = 50 единиц: маржа 4 на единицу покрывает постоянные затраты."},
 {cat:"risk", q:"Что из перечисленного является НЕДОСТАТКОМ метода Монте-Карло?", o:["Он не учитывает связи между параметрами и действия менеджера, чувствителен к входным распределениям","Он даёт только одно значение NPV без распределения","Он применим лишь к ординарным денежным потокам","Он не позволяет задавать распределения входных параметров"], c:0, e:"Монте-Карло строит распределение NPV, но чувствителен к входным распределениям и в базовом виде не учитывает корреляции между параметрами и управленческую гибкость."},
 {cat:"risk", q:"В чём смысл NPV-безубыточности (самого глубокого уровня точки безубыточности) по сравнению с операционной?", o:["Объём продаж покрывает не только текущие расходы и возврат инвестиций, но и требуемую доходность капитала (NPV = 0)","Объём продаж покрывает только текущие расходы, прибыль равна нулю","Это объём, при котором постоянные затраты равны нулю","Это объём, при котором операционный рычаг равен единице"], c:0, e:"Операционная BEP даёт прибыль 0, а NPV-безубыточность требует покрыть ещё и требуемую доходность капитала, то есть условие NPV = 0."},
 {cat:"misc", q:"Что означает термин рационирование капитала?", o:["Ситуация, когда бюджет ограничен и приходится отказывать даже проектам с положительным NPV","Запрет на использование заёмных средств в проекте","Распределение амортизации по годам жизненного цикла","Требование считать поток только в номинальных ценах"], c:0, e:"Рационирование капитала возникает, когда денег не хватает на все проекты с NPV больше нуля, и цель смещается на максимизацию суммарного NPV в рамках лимита."},
 {cat:"misc", q:"При ограниченном бюджете и ДЕЛИМЫХ проектах последний проект, на который не хватает полного бюджета:", o:["Полностью отбрасывается, бюджет остаётся недоиспользованным","Финансируется частично, а его NPV берут пропорционально доле вложенных инвестиций","Заменяется на проект с наибольшим IRR","Финансируется за счёт обязательного выпуска новых акций"], c:1, e:"Для делимых проектов последний в ранжировании по PI добивают остатком бюджета, а его NPV учитывают пропорционально профинансированной доле инвестиций."},
 {cat:"misc", q:"Если денежный поток после прогнозного горизонта постоянный (без роста), терминальная стоимость считается как:", o:["NCF, умноженное на ставку дисконтирования d","NCF, делённое на ставку дисконтирования d","NCF, делённое на разность (d минус g)","NCF, умноженное на коэффициент аннуитета"], c:1, e:"Постоянный бесконечный поток - это обычный перпетуитет, его стоимость равна NCF делить на d; формула с (d минус g) нужна только при росте g."},
 {cat:"misc", q:"Терминальная стоимость TV(n), рассчитанная на конец прогнозного периода (год n), для включения в NPV проекта должна быть:", o:["Прибавлена к NPV прогнозного периода как есть, без дисконтирования","Продисконтирована к нулевому моменту делением на (1+d) в степени n","Умножена на (1+d) в степени n","Вычтена из суммы дисконтированных потоков прогнозного периода"], c:1, e:"TV(n) выражена в деньгах года n, поэтому её приводят к началу делением на (1+d) в степени n и затем прибавляют к NPV прогнозных лет."},
 {cat:"misc", q:"В какой фазе жизненного цикла проекта появляются первые денежные притоки и проект проходит точку окупаемости?", o:["Предынвестиционная","Инвестиционная","Эксплуатационная","Ликвидационная"], c:2, e:"В эксплуатационной фазе идёт выпуск и продажи: появляются притоки, проект возвращает вложенный капитал и пересекает ноль (точка окупаемости)."},
 {cat:"misc", q:"По классификации начальных условий проект, создаваемый с нуля на новом месте, называется:", o:["Greenfield","Brownfield","Ординарный","Альтернативный"], c:0, e:"Greenfield - проект с нуля, тогда как Brownfield строится на базе уже существующего предприятия; ординарный и альтернативный относятся к другим признакам классификации."},

 {cat:"form", q:"Два проекта с разными сроками. Нужно сравнить их на бесконечном горизонте, повторяя каждый до бесконечности. Какую формулу применить?",
  o:["Беск. цепной повтор","EAA (ежегодная рента)","PI = NPV / I₀","TV (терминальная стоимость)"],
  fl:["NPV_\\infty = NPV_n \\cdot \\frac{(1+r)^n}{(1+r)^n - 1}","EAA = \\frac{NPV}{B(n;r)}","PI = \\frac{NPV}{I_0}","TV = \\frac{CF_{n+1}}{r - g}"],
  c:0, e:"Бесконечный цепной повтор — для горизонта ∞ при неравных сроках. EAA даёт то же при сравнении рент."},
 {cat:"form", q:"Поток CF₁ начинается через год и растёт с постоянным темпом g вечно. Нужна текущая стоимость. Какая формула?",
  o:["PV растущего перпетуитета","PV простого перпетуитета (g=0)","PVA аннуитета (конечный горизонт)","TV в конце периода n"],
  fl:["PV = \\frac{CF_1}{r - g}","PV = \\frac{CF}{r}","PVA = C \\cdot B(n;r)","TV_n = \\frac{CF_n(1+g)}{r-g}"],
  c:0, e:"PV = CF₁/(r−g) — растущий перпетуитет. PV = CF/r только при g=0. TV применяется в конкретный момент n."},
 {cat:"form", q:"Есть NPV и срок проекта. Нужна ежегодная «рента», эквивалентная NPV, для сравнения проектов разной длительности. Какая формула?",
  o:["EAA (равная ежегодная рента)","Беск. цепной повтор","EAA ≈ NPV × r","EAA = NPV − I₀"],
  fl:["EAA = \\frac{NPV}{B(n;r)}","NPV_\\infty = NPV_n \\cdot \\frac{(1+r)^n}{(1+r)^n - 1}","NPV \\cdot r","NPV - I_0"],
  c:0, e:"EAA = NPV/B(n;r) — NPV делится на фактор аннуитета. Беск.цепной повтор — другая формула сравнения."},
 {cat:"form", q:"Известна номинальная ставка rном и инфляция π. Нужна реальная ставка. Какую формулу использовать?",
  o:["Фишер (точная формула)","Приближение: rном − π","EAY (частота начисления)","WACC"],
  fl:["r_{real} = \\frac{1+r_{nom}}{1+\\pi} - 1","r_{real} \\approx r_{nom} - \\pi","EAY = (1 + \\frac{r}{m})^m - 1","WACC = w_d k_d(1-T) + w_e k_e"],
  c:0, e:"Точная формула Фишера нужна при высокой инфляции. EAY — для пересчёта частоты начисления, не инфляции."},
 {cat:"form", q:"Нужен свободный денежный поток фирмы для DCF-оценки бизнеса без учёта структуры финансирования. Какая формула?",
  o:["FCFF (до долга)","FCFE (доступен акционерам)","OCF (без CAPEX и NWC)","NPV всего проекта"],
  fl:["FCFF = EBIT(1-T) + DA - CAPEX - \\Delta NWC","FCFE = FCFF - Int(1-T) + \\Delta D","OCF = EBIT(1-T) + DA","NPV = \\sum \\frac{CF_i}{(1+r)^i} - I_0"],
  c:0, e:"FCFF — до влияния долга, используется при дисконтировании по WACC. FCFE — для дисконтирования по ke."},
 {cat:"form", q:"Нужен денежный поток, доступный АКЦИОНЕРАМ после обслуживания долга и изменения долговой нагрузки. Какая формула?",
  o:["FCFE (акционеры)","FCFF (вся фирма, до долга)","OCF (операционный)","EFN (внешнее финансирование)"],
  fl:["FCFE = FCFF - Int(1-T) + \\Delta D","FCFF = EBIT(1-T) + DA - CAPEX - \\Delta NWC","OCF = EBIT(1-T) + DA","EFN = \\frac{A}{S}\\Delta S - \\frac{L^*}{S}\\Delta S - \\frac{NI}{S}S_1 b"],
  c:0, e:"FCFE = FCFF минус после-налоговые проценты плюс новый долг. FCFF — без влияния финансирования."},
 {cat:"form", q:"Проект со стоимостью I генерирует первый поток CF₁ и далее растёт с темпом g вечно. Нужна аналитическая IRR. Какая формула?",
  o:["IRR растущего перпетуитета","IRR простого перпетуитета (g=0)","IRR числово из NPV=0","EAY (для облигаций)"],
  fl:["IRR = g + \\frac{CF_1}{I}","IRR = \\frac{CF_1}{I}","\\sum \\frac{CF_t}{(1+IRR)^t} = 0","EAY = (1 + \\frac{r}{m})^m - 1"],
  c:0, e:"IRR = g + CF/I — аналитика для растущего перпетуитета. При g=0 IRR = CF/I. Числовой метод — всегда, но медленнее."},
 {cat:"form", q:"Нужно найти ставку дисконтирования, при которой NPV проекта A равен NPV проекта B. Какой метод?",
  o:["Точка Фишера","Сравнить IRR напрямую","EAA при разных ставках","MIRR"],
  fl:["r^* = IRR(CF_A - CF_B)","IRR_A > IRR_B","EAA_A = EAA_B","MIRR = (\\frac{FV_{pos}}{|PV_{neg}|})^{1/n} - 1"],
  c:0, e:"Точка Фишера = IRR разностного потока. При ставках ниже неё ранжирование одно, выше — другое."},
 {cat:"form", q:"Номинальная ставка rном, начисление m раз в год. Нужна эффективная годовая ставка. Какая формула?",
  o:["EAY (эффективная годовая)","Фишер (инфляционная корректировка)","Простое умножение rном×m","WACC"],
  fl:["EAY = (1 + \\frac{r_{nom}}{m})^m - 1","r_{real} = \\frac{1+r_{nom}}{1+\\pi} - 1","r_{nom} \\cdot m","WACC = w_d k_d(1-T) + w_e k_e"],
  c:0, e:"EAY = (1+r/m)^m−1 — пересчёт номинальной в эффективную. Фишер нужен для инфляции, не частоты начисления."},
 {cat:"form", q:"Нестандартный поток: знак меняется несколько раз. IRR даёт несколько значений. Какую меру доходности применить?",
  o:["MIRR (модифицированная IRR)","IRR — просто взять подходящее значение","PI = NPV/I₀","DPP (срок окупаемости)"],
  fl:["MIRR = (\\frac{FV_{pos}}{|PV_{neg}|})^{1/n} - 1","0 = \\sum \\frac{CF_t}{(1+IRR)^t}","PI = \\frac{NPV}{I_0}","DPP: \\sum \\frac{CF_t}{(1+r)^t} \\ge I_0"],
  c:0, e:"MIRR разделяет оттоки (PV) и притоки (FV) — даёт единственное значение при нестандартных потоках."},
 {cat:"form", q:"Ограниченный бюджет. Нужно ранжировать проекты для максимальной суммарной NPV. Какой показатель?",
  o:["PI (индекс доходности)","IRR (максимальная ставка)","EAA (при разных сроках)","NPV (наибольший абсолютный)"],
  fl:["PI = \\frac{NPV}{I_0}","max(IRR)","EAA = \\frac{NPV}{B(n;r)}","NPV = \\sum \\frac{CF_t}{(1+r)^t} - I_0"],
  c:0, e:"PI ранжирует по NPV на рубль инвестиций — именно это нужно при ограниченном бюджете."},
 {cat:"form", q:"Нужен срок, за который накопленные ДИСКОНТИРОВАННЫЕ потоки возместят инвестиции. Какая формула?",
  o:["DPP (с дисконтированием)","PP (без дисконтирования)","IRR (ставка при NPV=0)","NPV (абсолютная стоимость)"],
  fl:["DPP: \\sum_{t=1}^{T} \\frac{CF_t}{(1+r)^t} \\ge I_0","PP: \\sum_{t=1}^{T} CF_t \\ge I_0","0 = \\sum \\frac{CF_t}{(1+IRR)^t}","NPV = \\sum \\frac{CF_t}{(1+r)^t} - I_0"],
  c:0, e:"DPP учитывает стоимость денег. PP проще, но не учитывает дисконтирование."},
 {cat:"form", q:"После n-летнего прогноза бизнес продолжает расти с темпом g. Нужна терминальная стоимость НА КОНЕЦ периода n. Какая формула?",
  o:["TV в момент n (для DCF)","PV₀ (уже дисконтировано, не на конец n)","TV без роста (g=0)","EAA"],
  fl:["TV_n = \\frac{CF_{n+1}}{r - g}","PV_0 = \\frac{CF_1}{r - g}","TV_n = \\frac{CF_n}{r}","EAA = \\frac{NPV}{B(n;r)}"],
  c:0, e:"TV_n — стоимость в момент n, потом дисконтируем: TV_n/(1+r)^n. PV₀ — уже дисконтирована на сегодня."},
 {cat:"form", q:"Нужно измерить, на сколько % изменится EBIT при изменении выручки на 1%. Какой показатель?",
  o:["DOL (операционный рычаг)","Точка безубыточности Q","CV (коэф. вариации)","DPP"],
  fl:["DOL = \\frac{S - VC}{EBIT}","Q_{BE} = \\frac{FC}{P - VC}","CV = \\frac{\\sigma(NPV)}{E(NPV)}","DPP"],
  c:0, e:"DOL = (S−VC)/EBIT — показывает эластичность EBIT по выручке. Точка безубыточности — Q при EBIT=0."},
 {cat:"form", q:"Нужно найти объём продаж (штуки), при котором EBIT = 0. Какая формула?",
  o:["Точка безубыточности Q","DOL (чувствительность прибыли)","NPV-безубыточность","PI = 1"],
  fl:["Q_{BE} = \\frac{FC}{P - VC}","DOL = \\frac{S - VC}{EBIT}","NPV = 0","PI = 1"],
  c:0, e:"Q = FC/(P−VC). DOL — мера чувствительности, не сам объём. NPV-безубыточность — другой показатель."},
 {cat:"form", q:"Инвестиция приносит постоянный поток CF без роста (g = 0) бесконечно. Нужна PV. Какая формула?",
  o:["Простой перпетуитет (g=0)","Растущий перпетуитет (g>0)","PVA (конечный аннуитет)","TV (в конце периода)"],
  fl:["PV = \\frac{CF}{r}","PV = \\frac{CF_1}{r - g}","PVA = C \\cdot B(n;r)","TV_n = \\frac{CF}{r}"],
  c:0, e:"PV = CF/r — простой перпетуитет. При g=0 формула растущего тоже даст CF/r, но явная форма нагляднее."},
 {cat:"form", q:"Компания хочет расти максимально быстро, сохраняя текущую структуру капитала и не выпуская новые акции. Какая формула?",
  o:["SGR (устойчивый рост)","IGR (внутренний рост, без нового долга)","EFN (объём доп. финансирования)","g ≈ ROE × b"],
  fl:["SGR = \\frac{ROE \\cdot b}{1 - ROE \\cdot b}","IGR = \\frac{ROA \\cdot b}{1 - ROA \\cdot b}","EFN = \\frac{A}{S}\\Delta S - ...","g \\approx ROE \\cdot b"],
  c:0, e:"SGR — при сохранении D/E через новый долг. IGR — без нового долга вообще."},
 {cat:"form", q:"Нужен темп роста ТОЛЬКО за счёт нераспределённой прибыли, без нового долга и акций. Какая формула?",
  o:["IGR (внутренний рост)","SGR (допускает новый долг)","EFN","b = 1 − DPR"],
  fl:["IGR = \\frac{ROA \\cdot b}{1 - ROA \\cdot b}","SGR = \\frac{ROE \\cdot b}{1 - ROE \\cdot b}","EFN = \\frac{A}{S}\\Delta S - \\frac{L^*}{S}\\Delta S - \\frac{NI}{S}S_1 b","b = 1 - DPR"],
  c:0, e:"IGR использует ROA — доходность активов без рычага. SGR — ROE, что позволяет брать новый долг."},
 {cat:"form", q:"Продажи вырастут на ΔS. Нужно определить, сколько внешнего финансирования потребуется. Какая формула?",

 {cat:"plan", q:"Почему устойчивый темп роста SGR всегда больше внутреннего темпа роста IGR?", o:["SGR считается от чистой прибыли, а IGR от выручки","При SGR допускается выпуск новых акций, а при IGR нет","При SGR можно дополнительно занимать долг, сохраняя целевую долю долга, а IGR опирается только на свою прибыль","SGR учитывает дивиденды, а IGR их игнорирует"], c:2, e:"Устойчивый рост позволяет пропорционально наращивать долг вслед за ростом собственного капитала от прибыли, тогда как внутренний рост обходится вообще без займов, поэтому SGR больше IGR."},
 {cat:"plan", q:"Роль балансирующей статьи (plug) в моделях финансового планирования состоит в том, чтобы:", o:["Прогнозировать объём продаж на следующий период","Закрыть дефицит или избыток средств, чтобы прогнозный баланс сошёлся","Рассчитать коэффициент капиталоёмкости","Определить ставку налога на прибыль"], c:1, e:"Балансирующая статья (резервный клапан) - источник внешнего финансирования, который покрывает дефицит (или поглощает избыток), сводя прогнозный баланс."},
 {cat:"plan", q:"Через какую формулу устойчивый темп роста SGR = ROE*b/(1-ROE*b) раскладывается на драйверы маржи, оборачиваемости и финансового рычага?", o:["Формула Фишера","Модель Гордона","Разложение DuPont для ROE","Уравнение точки безубыточности"], c:2, e:"ROE по DuPont раскладывается на маржу (ЧП/Выручка), оборачиваемость (Выручка/Активы) и финансовый рычаг (Активы/СК), что показывает рычаги ускорения роста без нарушения политики."},
 {cat:"wacc", q:"В формуле WACC = Re*E/V + Rd*(1-T)*D/V что обозначают веса E/V и D/V?", o:["Доли собственного капитала и долга в общей рыночной стоимости капитала компании","Ставки доходности по акциям и облигациям","Темпы роста собственного и заёмного капитала","Налоговые ставки на дивиденды и проценты"], c:0, e:"V = E + D, поэтому E/V и D/V это доли собственного капитала и долга в совокупном капитале, по которым взвешиваются их стоимости."},
 {cat:"wacc", q:"Почему в WACC стоимость долга берут после налога, как Rd*(1-T), а стоимость собственного капитала Re оставляют без множителя?", o:["Дивиденды по акциям выплачиваются до налога, а проценты после","Проценты по долгу уменьшают налогооблагаемую прибыль (налоговый щит), а дивиденды платятся из чистой прибыли","Собственный капитал не облагается налогом вообще","Re и так уже включает налоговую ставку по определению"], c:1, e:"Проценты по долгу вычитаются из прибыли до налога и дают экономию на налоге (щит), поэтому реальная стоимость долга ниже на множитель (1-T). Дивиденды платятся из уже обложенной чистой прибыли, щита нет."},
 {cat:"wacc", q:"Почему заёмный капитал, как правило, дешевле собственного для компании?", o:["Кредиторы получают меньше информации о компании","У кредиторов приоритет выплат и фиксированные платежи, поэтому их риск ниже, плюс работает налоговый щит","Долг не нужно возвращать","Проценты по долгу всегда ниже инфляции"], c:1, e:"Кредитор несёт меньший риск (приоритет при банкротстве, фиксированные обязательные выплаты), поэтому требует меньшую доходность, а налоговый щит дополнительно снижает стоимость долга."},
 {cat:"wacc", q:"Компания разместила облигации с купоном 7 процентов, но из-за роста рыночных ставок они торгуются с дисконтом и YTM равна 10 процентов. Какую ставку нужно взять как стоимость долга Rd в WACC?", o:["Купон 7 процентов, ведь именно его платит компания","YTM 10 процентов, так как это реальная стоимость обслуживания долга","Среднее между купоном и YTM","Безрисковую ставку по ОФЗ"], c:1, e:"Стоимость долга для эмитента это YTM, а не купон: размещение с дисконтом означает, что фактическая цена денег выше купонной ставки."},
 {cat:"wacc", q:"Что произойдёт с WACC, если налоговая ставка T вырастет, при прочих равных (структура капитала и Re, Rd неизменны)?", o:["WACC вырастет, потому что налоги увеличивают затраты","WACC снизится, так как налоговый щит по долгу станет больше","WACC не изменится, налог не влияет на стоимость капитала","WACC станет равной стоимости собственного капитала"], c:1, e:"Член Rd*(1-T) уменьшается при росте T, значит после-налоговая стоимость долга падает и WACC снижается за счёт усиления налогового щита."},
 {cat:"wacc", q:"Для какого денежного потока WACC является корректной ставкой дисконтирования?", o:["Для FCFE (потока только акционерам)","Для FCFF (потока всем инвесторам, и кредиторам, и акционерам)","Для бухгалтерской чистой прибыли","Для номинала облигации при погашении"], c:1, e:"WACC отражает среднюю стоимость капитала всех инвесторов, поэтому дисконтирует FCFF; поток только акционерам (FCFE) дисконтируют по Re."},
 {cat:"dupont", q:"На какие три множителя раскладывается ROE по модели DuPont?", o:["Маржа чистой прибыли, оборачиваемость активов, финансовый рычаг","Текущая ликвидность, быстрая ликвидность, абсолютная ликвидность","Маржа, ставка налога, темп роста выручки","Оборачиваемость запасов, дебиторки, кредиторки"], c:0, e:"По DuPont ROE = (ЧП/Выручка) * (Выручка/Активы) * (Активы/СК), то есть маржа * оборачиваемость активов * финансовый рычаг."},
 {cat:"dupont", q:"Компания удвоила долю заёмных средств, не меняя маржу и оборачиваемость активов. Что произойдёт с ROE по логике DuPont?", o:["Вырастет за счёт увеличения финансового рычага","Снизится, так как рычаг уменьшает рентабельность","Не изменится, рычаг на ROE не влияет","Станет равным рентабельности активов"], c:0, e:"Финансовый рычаг (Активы/СК) - один из трёх множителей ROE, поэтому при прочих равных рост доли долга увеличивает ROE."},
 {cat:"dupont", q:"Что показывает множитель оборачиваемости активов (Выручка/Активы) в модели DuPont?", o:["Сколько выручки генерирует каждый рубль активов","Какую долю прибыли съедают проценты по долгу","Сколько активов профинансировано собственным капиталом","Долю переменных затрат в выручке"], c:0, e:"Оборачиваемость активов = Выручка/Активы измеряет, насколько эффективно активы превращаются в выручку: больше выручки на рубль активов - выше эффективность."},
 {cat:"dupont", q:"Как рассчитывается денежный (финансовый) цикл CCC?", o:["CCC = DSO + DIO - DPO","CCC = DSO + DPO - DIO","CCC = DIO + DPO - DSO","CCC = DSO + DIO + DPO"], c:0, e:"Денежный цикл = период оборота дебиторки (DSO) плюс период оборота запасов (DIO) минус период оборота кредиторки (DPO). Операционный цикл при этом равен только DSO + DIO."},
 {cat:"dupont", q:"Чем коэффициент быстрой ликвидности отличается от коэффициента текущей ликвидности?", o:["Из оборотных активов исключаются запасы","В числитель добавляются основные средства","Используется только денежная наличность","Учитывается весь долгосрочный долг"], c:0, e:"Быстрая ликвидность считается как (оборотные активы - запасы)/краткосрочные обязательства, то есть из ликвидных активов убирают наименее ликвидные запасы."},
 {cat:"dupont", q:"Какие активы учитываются в числителе коэффициента абсолютной ликвидности?", o:["Денежные средства и краткосрочные финансовые вложения","Все оборотные активы, включая запасы","Дебиторская задолженность и запасы","Оборотные активы за вычетом запасов"], c:0, e:"Абсолютная ликвидность - самый строгий показатель: в числителе только денежные средства и краткосрочные финансовые вложения, отнесённые к краткосрочным обязательствам."},

 {cat:"form", q:"Бескупонная облигация: P, N, n известны. Нужна годовая ЭФФЕКТИВНАЯ (сложная) доходность. Какая формула?",

  fl:["r_{eff} = \\left(\\frac{N}{P}\\right)^{1/n} - 1","r_{simple} = \\frac{N-P}{P \\cdot n}","YTM \\approx \\frac{C + (N-P)/n}{(N+P)/2}","EAY = (1 + r/m)^m - 1"],

 {cat:"form", q:"Нужно найти цену бескупонной облигации при известных N, n, r. Какая формула?",

 {cat:"form", q:"С момента последней выплаты купона прошло t дней. Нужен накопленный купонный доход. Какая формула?",

 {cat:"form", q:"Облигация куплена и продана до погашения. Получен купон C и прирост цены. Нужна доходность за период владения. Какая формула?",

  c:0, e:"HPR = (P₁−P₀+C)/P₀ — доходность за любой период владения. Реализованная — при держании до погашения."},
 {cat:"form", q:"Держали облигацию до погашения, купоны реинвестировали по ставке rреинв ≠ YTM. Нужна фактическая годовая доходность. Какая формула?",

 {cat:"form", q:"Купонная облигация с полугодовыми выплатами (m=2). Найдена полугодовая YTM. Нужна годовая эффективная доходность. Какая формула?",

 {cat:"form", q:"Облигация с квартальными купонами (m=4), номинальная ставка rном. Нужна годовая эффективная доходность. Какая формула?",

 {cat:"form", q:"Нужно оценить долю купона в рыночной цене (быстрая снапшот-доходность без расчёта YTM). Какая формула?",

 {cat:"form", q:"Нужно оценить изменение цены облигации при сдвиге YTM на Δy. Какая формула?",

 {cat:"form", q:"Нужна взвешенная по PV мера срочности облигации — «центр тяжести» потоков. Какая формула?",

 {cat:"form", q:"Две облигации с одинаковой YTM, но разными сроками. У которой цена сильнее реагирует на изменение ставок?",

 {cat:"form", q:"Нужна ставка дисконтирования, отражающая стоимость всех источников капитала с учётом налогового щита. Какая формула?",

/* ============================== ЛОГИКА ============================== */
function load(){
  try{return JSON.parse(localStorage.getItem('fmtrain')||'{}')}catch(e){return {}}
}
function save(){localStorage.setItem('fmtrain', JSON.stringify(progress))}
let progress = load();

/* --- запоминание места: вид (тема+режим) и позиция прокрутки --- */
let scrollMem = (()=>{try{return JSON.parse(localStorage.getItem('fmtrain_scroll')||'{}')}catch(e){return {}}})();
const savedView = (()=>{try{return JSON.parse(localStorage.getItem('fmtrain_view')||'{}')}catch(e){return {}}})();
let state = {
  topic: ['t4','t5'].includes(savedView.topic) ? savedView.topic : 't4',
  mode:  ['theory','quiz','cheat'].includes(savedView.mode) ? savedView.mode : 'theory',
  quizFilter: '__rand',   // '__rand' (случайная выборка), '__all' (весь банк) или ключ подтемы
  quizOrder: null         // массив индексов вопросов, показываемых сейчас
};
const RAND_N = 10;        // размер случайной выборки в базовом режиме
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));const t=a[i];a[i]=a[j];a[j]=t;}return a;}
function loadQuizState(){try{return JSON.parse(localStorage.getItem('fmtrain_quiz')||'{}')}catch(e){return {}}}
function saveQuizState(){const m=loadQuizState();m[state.topic]={filter:state.quizFilter,order:state.quizOrder};localStorage.setItem('fmtrain_quiz',JSON.stringify(m));}
function buildQuizOrder(){
  const quiz=DATA[state.topic].quiz;
  let idx=quiz.map((q,i)=>i);
  if(state.quizFilter!=='__rand' && state.quizFilter!=='__all') idx=idx.filter(i=>quiz[i].cat===state.quizFilter);
  idx=shuffle(idx);
  if(state.quizFilter==='__rand') idx=idx.slice(0,RAND_N);
  state.quizOrder=idx; saveQuizState();
}
function restoreQuizOrder(){
  const quiz=DATA[state.topic].quiz, m=loadQuizState()[state.topic];
  if(m && Array.isArray(m.order) && m.order.length && m.order.every(i=>i<quiz.length)){ state.quizFilter=m.filter||'__rand'; state.quizOrder=m.order; }
  else { state.quizFilter='__rand'; buildQuizOrder(); }
}
function setQuizFilter(k){state.quizFilter=k;buildQuizOrder();scrollMem[viewKey()]=0;render();track('quiz_filter',{topic:state.topic,filter:k});}
function reshuffleQuiz(){buildQuizOrder();scrollMem[viewKey()]=0;render();track('quiz_reshuffle',{topic:state.topic});}
function viewKey(){return state.topic+'_'+state.mode;}
function saveView(){localStorage.setItem('fmtrain_view', JSON.stringify({topic:state.topic, mode:state.mode}));}
function saveScroll(){scrollMem[viewKey()]=window.scrollY; localStorage.setItem('fmtrain_scroll', JSON.stringify(scrollMem));}
function restoreScroll(){const y=scrollMem[viewKey()]||0; window.scrollTo(0,y); setTimeout(()=>window.scrollTo(0,y),50);}
let _scrollT; window.addEventListener('scroll', ()=>{clearTimeout(_scrollT); _scrollT=setTimeout(saveScroll,200);});
function pkey(){return state.topic}
function ensure(){
  if(!progress[state.topic]) progress[state.topic]={quiz:{}};
  return progress[state.topic];
}

const MODES=[['theory','Теория'],['quiz','Тест'],['cheat','Шпаргалка']];

function renderTopics(){
  document.getElementById('topicbar').innerHTML = TOPICS.map(t=>
    `<button class="${t.id===state.topic?'active':''}" onclick="setTopic('${t.id}')">
       <span class="t">${t.t}</span><span class="d">${t.d}</span></button>`).join('');
  document.getElementById('modes').innerHTML = MODES.map(m=>
    `<button class="${m[0]===state.mode?'active':''}" onclick="setMode('${m[0]}')">${m[1]}</button>`).join('');
}
function setTopic(id){aFlushTime();saveScroll();state.topic=id;state.quizOrder=null;saveView();renderTopics();render();A_VIEW=viewKey();track('view',{topic:state.topic,mode:state.mode});}
function setMode(m){aFlushTime();saveScroll();state.mode=m;saveView();renderTopics();render();A_VIEW=viewKey();track('view',{topic:state.topic,mode:state.mode});}

function render(){
  const d = DATA[state.topic];
  const c = document.getElementById('content');
  let html = `<div class="intro">${d.intro}</div>`;
  if(state.mode==='theory'){
    html += `<div class="toolbar"><button class="btn sec" onclick="toggleAll(true)">Развернуть всё</button>
             <button class="btn sec" onclick="toggleAll(false)">Свернуть всё</button>${xlBtn()}</div>`;
    html += d.theory.map((t,i)=>`
      <div class="card" id="card${i}">
        <div class="head" onclick="toggleCard(${i})">
          <span class="ttl">${i+1}. ${t.ttl}</span><span class="arrow">▶</span></div>
        <div class="body">${injectCharts(t.body)}</div>
      </div>`).join('');
  }
  else if(state.mode==='quiz'){
    if(!state.quizOrder) restoreQuizOrder();
    html += quizControls();
    html += state.quizOrder.map((i,pos)=>quizHTML(d.quiz[i],i,pos)).join('');
    if(!state.quizOrder.length) html += `<div class="qhint">В этой подтеме пока нет вопросов.</div>`;
  }
  else if(state.mode==='cheat'){
    html += cheatHTML(state.topic);
  }
  c.innerHTML = html;
  xlApply();
  updateScore();
  restoreScroll();
}

function toggleCard(i){
  const el=document.getElementById('card'+i);
  const willOpen=!el.classList.contains('open');
  el.classList.toggle('open');
  if(willOpen) track('theory_card',{topic:state.topic, card:i+1});
}
function toggleAll(open){
  document.querySelectorAll('.card').forEach(c=>c.classList.toggle('open',open));
  track('theory_expand_all',{topic:state.topic, open:!!open});
}

/* ---- Тест: фильтры по подтемам и выборка ---- */
function quizControls(){
  const quiz=DATA[state.topic].quiz;
  const present=CATORDER[state.topic].filter(c=>quiz.some(q=>q.cat===c));
  const chip=(key,label)=>`<button class="chip ${state.quizFilter===key?'on':''}" onclick="setQuizFilter('${key}')">${label}</button>`;
  const chips=chip('__rand','Случайные '+RAND_N)+chip('__all','Весь банк ('+quiz.length+')')+present.map(c=>chip(c,CATLABEL[c])).join('');
  const shown=state.quizOrder?state.quizOrder.length:0;
  const isRand = state.quizFilter==='__rand';
  const note = isRand
    ? `Случайная выборка: ${shown} вопрос(ов) из ${quiz.length}.`
    : (state.quizFilter==='__all' ? `Весь банк темы: ${shown} вопрос(ов).` : `Подтема «${CATLABEL[state.quizFilter]}»: ${shown} вопрос(ов).`);
  const btn = isRand ? `<button class="btn sec" onclick="reshuffleQuiz()">Другой набор</button>` : '';
  return `<div class="filterbar">${chips}</div>
    <div class="qhint">${note} ${btn}</div>`;
}
/* ---- Тест: один вопрос ---- */
function quizHTML(q,i,pos){
  const st = ensure().quiz[i];
  const opts = q.o.map((o,j)=>{
    let cls='opt';
    if(st!==undefined){ cls+=' disabled'; if(j===q.c) cls+=' correct'; else if(j===st && st!==q.c) cls+=' wrong'; }
    const fmla = (q.fl && q.fl[j]) ? `<div class="qfmla">${tex2mml(q.fl[j])}</div>` : '';
    return `<button class="${cls}" ${st!==undefined?'':`onclick="answer(${i},${j})"`}>${fmla}<div class="qlabel">${o}</div></button>`;
  }).join('');
  const badge = q.cat?`<span class="catbadge">${CATLABEL[q.cat]||q.cat}</span>`:'';
  return `<div class="q" id="q${i}">
    <div class="qt"><span class="num">${(pos!=null?pos:i)+1}.</span>${q.q} ${badge}</div>
    ${opts}
    <div class="explain ${st!==undefined?'show':''}" id="ex${i}">Пояснение: ${q.e}</div>
  </div>`;
}
function answer(i,j){
  const q=DATA[state.topic].quiz[i];
  ensure().quiz[i]=j; save(); render();
  track('quiz_answer',{topic:state.topic, cat:q.cat||'', correct:(j===q.c)});
}

/* ====================== ГРАФИКИ (SVG, без библиотек) ====================== */
function npv(cfs,r){let s=0;for(let t=0;t<cfs.length;t++)s+=cfs[t]/Math.pow(1+r,t);return s;}
function bondPrice(face,coupon,n,y){let p=0;for(let t=1;t<=n;t++)p+=coupon/Math.pow(1+y,t);return p+face/Math.pow(1+y,n);}

// Универсальный линейный график. cfg: {w,h,xmin,xmax,ymin,ymax,xlabel,ylabel,
//   series:[{color,pts:[[x,y]..],dash?}], marks:[{x,y,label,color,dy?}],
//   bands:[{x0,x1,fill,label}], xticks:[..], yticks:[..], xfmt, yfmt, zero:true}
function svgChart(cfg){
  const w=cfg.w||580,h=cfg.h||330,pad={l:58,r:18,t:16,b:42};
  const iw=w-pad.l-pad.r, ih=h-pad.t-pad.b;
  const X=x=>pad.l+(x-cfg.xmin)/(cfg.xmax-cfg.xmin)*iw;
  const Y=y=>{const v=pad.t+(cfg.ymax-y)/(cfg.ymax-cfg.ymin)*ih;return Math.max(pad.t,Math.min(pad.t+ih,v));};
  const xf=cfg.xfmt||(v=>v), yf=cfg.yfmt||(v=>v);
  let s=`<svg viewBox="0 0 ${w} ${h}" width="100%" style="max-width:${w}px">`;
  // bands
  (cfg.bands||[]).forEach(b=>{
    s+=`<rect x="${X(b.x0)}" y="${pad.t}" width="${X(b.x1)-X(b.x0)}" height="${ih}" fill="${b.fill}" opacity="0.55"/>`;
    if(b.label)s+=`<text x="${(X(b.x0)+X(b.x1))/2}" y="${pad.t+12}" fill="#9aa4b2" font-size="10" text-anchor="middle">${b.label}</text>`;
  });
  // grid + ticks
  (cfg.xticks||[]).forEach(t=>{s+=`<line x1="${X(t)}" y1="${pad.t}" x2="${X(t)}" y2="${pad.t+ih}" stroke="#272d3a" stroke-width="1"/>`;
    s+=`<text x="${X(t)}" y="${h-pad.b+16}" fill="#7e8794" font-size="11" text-anchor="middle">${xf(t)}</text>`;});
  (cfg.yticks||[]).forEach(t=>{s+=`<line x1="${pad.l}" y1="${Y(t)}" x2="${pad.l+iw}" y2="${Y(t)}" stroke="#272d3a" stroke-width="1"/>`;
    s+=`<text x="${pad.l-8}" y="${Y(t)+4}" fill="#7e8794" font-size="11" text-anchor="end">${yf(t)}</text>`;});
  // zero line
  if(cfg.zero&&cfg.ymin<0&&cfg.ymax>0)s+=`<line x1="${pad.l}" y1="${Y(0)}" x2="${pad.l+iw}" y2="${Y(0)}" stroke="#566" stroke-width="1.5"/>`;
  // axes
  s+=`<line x1="${pad.l}" y1="${pad.t}" x2="${pad.l}" y2="${pad.t+ih}" stroke="#48505f" stroke-width="1.5"/>`;
  s+=`<line x1="${pad.l}" y1="${pad.t+ih}" x2="${pad.l+iw}" y2="${pad.t+ih}" stroke="#48505f" stroke-width="1.5"/>`;
  // series
  (cfg.series||[]).forEach(se=>{
    const pts=se.pts.map(p=>`${X(p[0]).toFixed(1)},${Y(p[1]).toFixed(1)}`).join(' ');
    s+=`<polyline points="${pts}" fill="none" stroke="${se.color}" stroke-width="2.4" ${se.dash?'stroke-dasharray="6 4"':''}/>`;
  });
  // marks
  (cfg.marks||[]).forEach(m=>{
    s+=`<circle cx="${X(m.x)}" cy="${Y(m.y)}" r="4.5" fill="${m.color||'#ffd166'}"/>`;

/* ====================== ШПАРГАЛКА (формулы рендерятся как MathML) ====================== */
// мини-конвертер подмножества LaTeX → MathML (без внешних библиотек, работает offline)
function tex2mml(src){
  if(!src) return '';
  const s=src; let i=0;
  const CMD={'\\cdot':'·','\\times':'×','\\approx':'≈','\\Delta':'Δ','\\delta':'δ','\\sum':'∑','\\le':'≤','\\ge':'≥','\\leq':'≤','\\geq':'≥','\\pm':'±','\\pi':'π','\\infty':'∞','\\sigma':'σ','\\beta':'β','\\alpha':'α','\\lambda':'λ','\\to':'→','\\neq':'≠','\\ldots':'…','\\Rightarrow':'⇒'};
  const skip=()=>{while(i<s.length&&s[i]===' ')i++;};
  const wrap=a=>{a=a.filter(x=>x);return a.length===1?a[0]:'<mrow>'+a.join('')+'</mrow>';};
  function readCmd(){let n='\\';i++;while(i<s.length&&/[a-zA-Z]/.test(s[i])){n+=s[i];i++;}return n;}
  function group(){i++;const a=[];while(i<s.length&&s[i]!=='}')a.push(atom());i++;return wrap(a);}
  function single(){skip();return s[i]==='{'?group():atom(true);}
  function atom(noScript){
    skip(); if(i>=s.length) return '';
    const ch=s[i]; let base='';
    if(ch==='\\'){const c=readCmd();
      if(c==='\\frac'){skip();const n=group();skip();const d=group();base='<mfrac>'+n+d+'</mfrac>';}
      else if(CMD[c]!==undefined) base='<mo>'+CMD[c]+'</mo>';
      else base='<mi>'+c.slice(1)+'</mi>';}
    else if(ch==='{') base=group();
    else if(/[0-9]/.test(ch)){let n='';while(i<s.length&&/[0-9.,]/.test(s[i])){n+=s[i];i++;}base='<mn>'+n+'</mn>';}
    else if(/[A-Za-zА-Яа-яЁё]/.test(ch)){let id='';while(i<s.length&&/[A-Za-zА-Яа-яЁё]/.test(s[i])){id+=s[i];i++;}base='<mi>'+id+'</mi>';}
    else if(ch==='-'){base='<mo>−</mo>';i++;}
    else if('+=()[]<>|;,/.'.includes(ch)){base='<mo>'+ch+'</mo>';i++;}
    else {i++;return '';}
    if(noScript) return base;
    while(i<s.length&&(s[i]==='^'||s[i]==='_')){const op=s[i];i++;const arg=single();base=op==='^'?'<msup>'+base+arg+'</msup>':'<msub>'+base+arg+'</msub>';}
    return base;
  }
  const out=[];while(i<s.length){const b=i;out.push(atom());if(i===b)i++;}
  return '<math xmlns="http://www.w3.org/1998/Math/MathML">'+wrap(out)+'</math>';
}

    {n:'Амортизация (купон)', f:'C_i=c\\cdot N_{ост}\\cdot \\frac{t_i}{365}', c:'купон от остаточного (убывающего) номинала', v:'<b>c</b> - ставка купона; <b>N<sub>ост</sub></b> - остаточный номинал; <b>t<sub>i</sub></b> - дней в периоде'},
  ]},
  {g:'Доходность', items:[
    {n:'Текущая (CY)', f:'\\frac{C_{год}}{P_{тек}}', c:'', v:'<b>C<sub>год</sub></b> - купон за год; <b>P<sub>тек</sub></b> - текущая цена'},
    {n:'Бескупонной', f:'(\\frac{N}{P})^{1/n}-1', c:'срок &gt; года; при сроке &lt; года: r=(N−P)/P·365/t', v:'<b>N</b> - номинал; <b>P</b> - цена; <b>n</b> - число лет до погашения; <b>t</b> - число дней (для срока &lt; года); при m начислениях в год: r=((N/P)<sup>1/(m·n)</sup>−1)·m'},
    {n:'YTM приближённая', f:'\\frac{C+(N-P)/n}{(N+P)/2}', c:'', v:'<b>C</b> - годовой купон; <b>N</b> - номинал; <b>P</b> - цена; <b>n</b> - лет до погашения'},
    {n:'YTM точная', f:'r_1+(r_2-r_1)\\frac{P_1-P_0}{P_1-P_2}', c:'= IRR потока {−P; C; …; C+N}', x:'=@IRR@(поток_облигации)', v:'<b>r<sub>1</sub>&lt;r<sub>2</sub></b> - пробные ставки; <b>P<sub>1</sub>,P<sub>2</sub></b> - цены при них; <b>P<sub>0</sub></b> - рыночная цена'},
    {n:'EAY', f:'(1+\\frac{r}{m})^m-1', c:'эффективная годовая', x:'=@EFFECT@(r; m)', v:'<b>r</b> - номинальная годовая ставка; <b>m</b> - число начислений в году'},
    {n:'Реализованная', f:'(\\frac{FV}{P})^{1/n}-1', c:'FV = купоны (реинвест) + номинал', v:'<b>FV</b> - все будущие выплаты; <b>P</b> - цена покупки; <b>n</b> - число периодов'},
    {n:'Сумма купонов (реинвест)', f:'\\frac{C}{r}[(1+r)^n-1]', c:'наращенный аннуитет купонов', v:'<b>C</b> - купон; <b>r</b> - ставка реинвестирования; <b>n</b> - число периодов'},
    {n:'За период (HPR)', f:'\\frac{P_1-P_0+C}{P_0}', c:'', v:'<b>P<sub>0</sub></b> - цена покупки; <b>P<sub>1</sub></b> - цена продажи; <b>C</b> - купон за период'},
  ]},
  {g:'Дюрация и риск', items:[
    {n:'Маколея', f:'D=\\frac{\\sum t\\cdot PV_t}{P}', c:'средневзвешенный срок', v:'<b>PV<sub>t</sub></b> - приведённый поток года t; <b>t</b> - срок; <b>P</b> - цена (с НКД)'},
    {n:'Модифицированная', f:'MD=\\frac{D}{1+r/n}', c:'', v:'<b>D</b> - дюрация Маколея; <b>r</b> - YTM; <b>n</b> - число купонов в году'},
    {n:'Изменение цены', f:'\\Delta P\\approx -MD\\cdot \\Delta y\\cdot P', c:'+ поправка на выпуклость', v:'<b>MD</b> - модиф. дюрация; <b>Δy</b> - изменение доходности; <b>P</b> - цена'},
  ]},
  {g:'Стоимость капитала и рост', items:[
    {n:'Стоимость долга', f:'R_d(1-T)', c:'в WACC идёт YTM, не купон', v:'<b>R<sub>d</sub></b> - YTM по облигациям; <b>T</b> - ставка налога'},
    {n:'WACC', f:'R_e\\frac{E}{V}+R_d(1-T)\\frac{D}{V}', c:'', v:'<b>R<sub>e</sub></b> - стоимость СК; <b>R<sub>d</sub></b> - стоимость долга; <b>E</b> - собств. капитал; <b>D</b> - долг; <b>V</b>=E+D; <b>T</b> - налог'},
    {n:'EFN', f:'\\Delta Активы-\\Delta Спонт-\\Delta Нераспр', c:'потребность во внешнем финансировании', v:'<b>ΔСпонт</b> - спонтанные обязательства (кредиторка); <b>ΔНераспр</b> - прирост нераспред. прибыли'},
    {n:'Капиталоёмкость', f:'\\frac{Активы}{Выручка}', c:'активов на 1 ед. выручки', v:'обратна оборачиваемости активов'},
    {n:'IGR (внутр. рост)', f:'\\frac{ROA\\cdot b}{1-ROA\\cdot b}', c:'максимум без внешних денег (EFN=0)', v:'<b>ROA</b> - рентабельность активов; <b>b</b> - коэф. удержания = 1−payout'},
    {n:'SGR (устойч. рост)', f:'\\frac{ROE\\cdot b}{1-ROE\\cdot b}', c:'без эмиссии акций, с целевым долгом', v:'<b>ROE</b> - рентабельность СК; <b>b</b> - коэф. удержания'},
    {n:'Коэф. удержания b', f:'b=1-\\frac{Div}{ЧП}', c:'payout = Div/ЧП', v:'<b>Div</b> - дивиденды; <b>ЧП</b> - чистая прибыль'},
    {n:'DuPont (ROE)', f:'\\frac{ЧП}{Выр}\\cdot\\frac{Выр}{Активы}\\cdot\\frac{Активы}{СК}', c:'маржа × оборачиваемость × рычаг', v:'<b>ЧП</b> - чистая прибыль; <b>Выр</b> - выручка; <b>СК</b> - собственный капитал'},
  ]},
 ],
};
function cheatHTML(topic){
  return `<div class="secthead">Ключевые формулы - ${topic==='t4'?'Тема 4':'Тема 5'} (для быстрого повторения перед контрольной)</div>` +
    `<div class="cheattools">${xlBtn()}<span class="hint">«где:» - расшифровка переменных · Excel-функции переключаются РУС ⇄ ENG</span></div>` +
    CHEAT[topic].map(grp=>`
    <div class="card open"><div class="head" style="cursor:default"><span class="ttl">${grp.g}</span></div>
      <div class="body" style="display:block;max-height:none;padding:4px 16px 14px">
        <table class="cheat">${grp.items.map(it=>{
          const f=it.f?`<span class="fmla">${tex2mml(it.f)}</span>`:'';
          const c=it.c?`<span class="cmt">${it.c}</span>`:'';
          const v=it.v?`<div class="vars">где: ${it.v}</div>`:'';
          const x=it.x?`<div class="xlrow">Excel: <span class="kbd xlf" data-xl="${it.x}"></span></div>`:'';
          return `<tr><td class="nm">${it.n}</td><td class="fm">${f}${f&&c?' ':''}${c}${v}${x}</td></tr>`;
        }).join('')}</table>
      </div></div>`).join('');
}

/* ---- Прогресс ---- */
function updateScore(){
  const d=DATA[state.topic], pr=ensure();
  const qTotal=d.quiz.length, qDone=Object.keys(pr.quiz).length;
  const qRight=Object.keys(pr.quiz).filter(k=>pr.quiz[k]===d.quiz[k].c).length;
  const txt=`Тест: ${qRight}/${qTotal} верно (отвечено ${qDone} из ${qTotal})`;
  document.getElementById('scoretxt').textContent=txt;
  document.getElementById('progbar').style.width=(qTotal?100*qRight/qTotal:0)+'%';
}
function resetProgress(){
  if(confirm('Сбросить весь прогресс (все темы)?')){progress={};save();render();track('reset');}
}

/* ====================== АНАЛИТИКА (анонимная, с согласием) ======================
   Все варианты ниже — cookieless и без персональных данных.
   Чтобы включить: впиши provider и ключ ОДНОГО блока (см. инструкцию в чате). */
const ANALYTICS = {
  provider: 'umami',   // 'yandex' | 'umami' | 'plausible' | 'posthog' | '' (выключено)
  yandex:   { counterId:'' },   // Яндекс.Метрика (РФ, бесплатно) - впиши номер счётчика
  umami:    { src:'https://cloud.umami.is/script.js', websiteId:'fd3f5228-7473-42d6-a4d3-6c61afc3434d' },
  plausible:{ src:'https://plausible.io/js/script.manual.js', domain:'' },
  posthog:  { key:'', host:'https://eu.i.posthog.com' },
};
let A_BUF=[], A_READY=false, A_DRAINER=null, A_T0=Date.now(), A_VIEW=viewKey();
function aOptedOut(){return localStorage.getItem('fmtrain_analytics')==='off';}
function aEnabled(){return !!ANALYTICS.provider && !aOptedOut();}
function track(name, props){ if(!aEnabled()) return; A_BUF.push([name, props||{}]); aDrain(); }
function aDrain(){
  if(!A_BUF.length) return;
  const p=ANALYTICS.provider;
  const send = (p==='yandex'   && window.ym)                          ? (n,pr)=>window.ym(ANALYTICS.yandex.counterId,'reachGoal',n,pr)
            : (p==='umami'     && window.umami && window.umami.track) ? (n,pr)=>window.umami.track(n,pr)
            : (p==='plausible' && window.plausible)                   ? (n,pr)=>window.plausible(n,{props:pr})
            : (p==='posthog'   && window.posthog && window.posthog.capture) ? (n,pr)=>window.posthog.capture(n,pr)
            : null;
  if(!send) return;
  A_BUF.forEach(([n,pr])=>{try{send(n,pr);}catch(e){}}); A_BUF=[];
}
function aLoad(){
  if(A_READY || !aEnabled()) return; A_READY=true;
  const p=ANALYTICS.provider;
  if(p==='yandex'){
    (function(m,e,t,r,i,k,a){m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};m[i].l=1*new Date();for(var j=0;j<e.scripts.length;j++){if(e.scripts[j].src===r)return;}k=e.createElement(t),a=e.getElementsByTagName(t)[0],k.async=1,k.src=r,a.parentNode.insertBefore(k,a)})(window,document,'script','https://mc.yandex.ru/metrika/tag.js','ym');
    window.ym(ANALYTICS.yandex.counterId,'init',{clickmap:true,trackLinks:true,accurateTrackBounce:true,webvisor:false});
  }
  else if(p==='umami'){ const s=document.createElement('script'); s.async=true; s.src=ANALYTICS.umami.src; s.setAttribute('data-website-id',ANALYTICS.umami.websiteId); document.head.appendChild(s); }
  else if(p==='plausible'){ const s=document.createElement('script'); s.async=true; s.defer=true; s.src=ANALYTICS.plausible.src; s.setAttribute('data-domain',ANALYTICS.plausible.domain); document.head.appendChild(s); }
  else if(p==='posthog'){ const s=document.createElement('script'); s.async=true; s.src=ANALYTICS.posthog.host+'/static/array.js'; s.onload=()=>{try{window.posthog.init(ANALYTICS.posthog.key,{api_host:ANALYTICS.posthog.host,autocapture:false,capture_pageview:false,persistence:'memory'});}catch(e){}}; document.head.appendChild(s); }
  A_DRAINER=setInterval(aDrain,1500);
}
function aFlushTime(){ const sec=Math.round((Date.now()-A_T0)/1000); if(sec>=3 && sec<3600) track('time',{view:A_VIEW, sec}); A_T0=Date.now(); }
document.addEventListener('visibilitychange', ()=>{ if(document.hidden) aFlushTime(); else A_T0=Date.now(); });
window.addEventListener('pagehide', aFlushTime);
/* Анонимная статистика стартует автоматически (в РФ для обезличенных данных
   согласие не требуется); пользователь может отключить ссылкой в футере. */
function aInit(){
  if(!ANALYTICS.provider){ aStatUI(); return; }
  if(localStorage.getItem('fmtrain_analytics')!=='off'){ aLoad(); track('open',{topic:state.topic,mode:state.mode}); }
  aStatUI();
}
function aToggle(){
  if(localStorage.getItem('fmtrain_analytics')==='off'){ localStorage.setItem('fmtrain_analytics','on'); aLoad(); track('open',{topic:state.topic,mode:state.mode}); }
  else { localStorage.setItem('fmtrain_analytics','off'); }
  aStatUI();
}
function aStatUI(){
  const el=document.getElementById('astat'); if(!el) return;
  if(!ANALYTICS.provider){ el.innerHTML=''; return; }
  const off = localStorage.getItem('fmtrain_analytics')==='off';
  el.innerHTML = `<span title="Собирается анонимная статистика использования, без персональных данных и cookie">анонимная статистика: ${off?'выкл':'вкл'}</span> <a onclick="aToggle()">${off?'включить':'отключить'}</a>`;
}

renderTopics();
render();
aInit();
</script>
