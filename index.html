<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Финансовый менеджмент - Тренажёр (Темы 4-5)</title>
<style>
  :root{
    --bg:#0f1117; --panel:#171a23; --panel2:#1e222e; --line:#2a2f3d;
    --txt:#e6e8ee; --muted:#9aa3b2; --acc:#5b8cff; --acc2:#3a6bf0;
    --ok:#3fbf7f; --okbg:#16341f; --err:#ff6b6b; --errbg:#3a1c1c;
    --warn:#f0b429; --chip:#242a38; --formula:#10131b;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--txt);line-height:1.55;font-size:16px}
  a{color:var(--acc)}
  header{position:sticky;top:0;z-index:30;background:rgba(15,17,23,.92);backdrop-filter:blur(8px);
         border-bottom:1px solid var(--line);padding:14px 18px}
  .wrap{max-width:960px;margin:0 auto;padding:0 16px}
  h1{font-size:18px;margin:0 0 2px}
  .sub{color:var(--muted);font-size:13px}
  .topicbar{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .topicbar button{flex:1;min-width:150px;background:var(--panel);color:var(--txt);border:1px solid var(--line);
       border-radius:10px;padding:10px 12px;cursor:pointer;font-size:14px;text-align:left;transition:.15s}
  .topicbar button .t{font-weight:600;display:block}
  .topicbar button .d{color:var(--muted);font-size:12px}
  .topicbar button.active{border-color:var(--acc);background:linear-gradient(180deg,#1c2435,#171a23);box-shadow:0 0 0 1px var(--acc) inset}
  .modes{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
  .modes button{background:var(--chip);border:1px solid var(--line);color:var(--muted);border-radius:20px;
       padding:7px 14px;cursor:pointer;font-size:13px;transition:.15s}
  .modes button.active{background:var(--acc);border-color:var(--acc);color:#fff;font-weight:600}
  main{padding:22px 0 80px}
  .pill{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;background:var(--chip);
        color:var(--muted);border:1px solid var(--line);margin-left:6px;vertical-align:middle}
  .pill.excel{background:#13301f;color:#6ee2a3;border-color:#1f5036}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;margin:0 0 12px;overflow:hidden}
  .card>.head{padding:14px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px}
  .card>.head:hover{background:var(--panel2)}
  .card>.head .ttl{font-weight:600;font-size:15px}
  .card>.head .arrow{color:var(--muted);transition:.2s;flex-shrink:0}
  .card.open>.head .arrow{transform:rotate(90deg)}
  .card .body{padding:0 16px;max-height:0;overflow:hidden;transition:max-height .3s ease;border-top:0 solid var(--line)}
  .card.open .body{max-height:6000px;padding:4px 16px 18px;border-top:1px solid var(--line)}
  .body p{margin:10px 0}
  .body ul{margin:8px 0;padding-left:20px}
  .body li{margin:4px 0}
  .fx{background:var(--formula);border:1px solid var(--line);border-left:3px solid var(--acc);border-radius:8px;
      padding:10px 13px;margin:10px 0;font-size:15px;overflow-x:auto;white-space:nowrap}
  .fx .lbl{color:var(--muted);font-size:12px;white-space:normal}
  .note{background:#1b2030;border-radius:8px;padding:9px 12px;font-size:13.5px;color:#c6cfde;margin:10px 0;border-left:3px solid var(--warn)}
  .note.tip{border-left-color:var(--ok)}
  table.cmp{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px}
  table.cmp th,table.cmp td{border:1px solid var(--line);padding:7px 9px;text-align:left;vertical-align:top}
  table.cmp th{background:var(--panel2);color:#cfd6e4}
  sup,sub{font-size:.72em}
  .muted{color:var(--muted)}
  .kbd{font-family:ui-monospace,Menlo,Consolas,monospace;background:#0c0e14;border:1px solid var(--line);
       border-radius:5px;padding:1px 6px;font-size:13px}
  /* charts (встроены в теорию) */
  .fig{margin:16px 0;background:#0f1219;border:1px solid var(--line);border-radius:10px;padding:12px;overflow-x:auto}
  .fig .cap{font-size:13px;color:#cdd5e3;margin-top:8px;line-height:1.5}
  .fig .cap b{color:#fff}
  /* шпаргалка */
  .cheat{width:100%;border-collapse:collapse}
  .cheat td{padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:middle;font-size:13.5px}
  .cheat tr:last-child td{border-bottom:0}
  .cheat .nm{width:30%;font-weight:600;color:#cfd6e4}
  .cheat .fm{color:#e8edf5}
  .cheat .fmla math{font-size:1.25em;color:#eaf0f8}
  .cheat .cmt{color:#9aa4b2;font-size:12.5px;font-style:italic;margin-left:8px}
  .cheat .cmt b{color:var(--ok);font-style:normal}
  .cheat .vars{display:block;color:#9aa4b2;font-size:12px;margin-top:5px;line-height:1.55}
  .cheat .vars b{color:#c6cfde;font-weight:600}
  .cheat .xlrow{margin-top:5px;font-size:12px;color:#7e8794}
  .cheattools{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:2px 0 12px}
  .cheattools .hint{font-size:12px;color:var(--muted)}
  /* фильтры теста */
  .filterbar{display:flex;flex-wrap:wrap;gap:8px;margin:4px 0 10px}
  .chip{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:20px;padding:6px 13px;cursor:pointer;font-size:13px;transition:.12s}
  .chip:hover{border-color:var(--acc)}
  .chip.on{background:linear-gradient(180deg,#1c2435,#171a23);border-color:var(--acc);color:#fff;box-shadow:0 0 0 1px var(--acc) inset}
  .qhint{color:var(--muted);font-size:13px;margin:0 0 14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .catbadge{display:inline-block;background:var(--chip);color:var(--muted);border:1px solid var(--line);border-radius:6px;padding:1px 8px;font-size:11px;font-weight:500;white-space:nowrap;vertical-align:middle}
  /* quiz */
  .q{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:12px}
  .q .qt{font-weight:600;margin-bottom:12px}
  .q .qt .num{color:var(--acc);margin-right:6px}
  .qfmla{display:block;overflow-x:auto;margin-bottom:3px;color:var(--acc);font-size:13px}
  .qfmla math{display:inline}
  .qlabel{font-size:13px;color:var(--muted);line-height:1.3}
  .opt:has(.qfmla) .qlabel{font-size:12px}
  .opt{display:block;width:100%;text-align:left;background:var(--panel2);border:1px solid var(--line);color:var(--txt);
       border-radius:10px;padding:11px 13px;margin:7px 0;cursor:pointer;font-size:14px;transition:.12s}
  .opt:hover{border-color:var(--acc)}
  .opt.correct{background:var(--okbg);border-color:var(--ok)}
  .opt.wrong{background:var(--errbg);border-color:var(--err)}
  .opt.disabled{cursor:default;opacity:.85}
  .explain{margin-top:10px;font-size:13.5px;background:var(--formula);border-radius:9px;padding:10px 13px;
           border-left:3px solid var(--ok);display:none}
  .explain.show{display:block}
  .btn{background:var(--acc);color:#fff;border:none;border-radius:9px;padding:9px 16px;cursor:pointer;font-size:14px;font-weight:600;margin:6px 8px 0 0}
  .btn.sec{background:var(--chip);color:var(--txt);border:1px solid var(--line);font-weight:500}
  .scorebar{position:sticky;bottom:0;background:rgba(23,26,35,.96);border-top:1px solid var(--line);
            padding:10px 16px;font-size:13px;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
  .progress{height:6px;background:var(--chip);border-radius:6px;overflow:hidden;flex:1;margin:0 14px;max-width:300px}
  .progress>i{display:block;height:100%;background:linear-gradient(90deg,var(--acc),var(--ok));width:0;transition:.4s}
  .intro{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:16px;color:#cfd6e4;font-size:14px}
  .intro b{color:var(--txt)}
  .secthead{font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:18px 0 8px;font-weight:600}
  .toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  @media(max-width:600px){
    .inrow label{min-width:100%}
    .fx{font-size:13.5px}
    /* Шпаргалка: на телефоне строки в столбик, формула скроллится в своей рамке */
    .cheat,.cheat tbody,.cheat tr,.cheat td{display:block;width:auto}
    .cheat tr{padding:9px 2px;border-bottom:1px solid var(--line)}
    .cheat tr:last-child{border-bottom:0}
    .cheat td{border-bottom:0;padding:1px 0}
    .cheat td.nm{color:var(--acc);font-size:14px;margin-bottom:2px}
    .cheat .fmla{display:block;overflow-x:auto;max-width:100%;padding-bottom:3px}
    .cheat .cmt{display:block;margin-left:0}
    .cheat .vars,.cheat .xlrow{overflow-wrap:anywhere}
  }
</style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>Финансовый менеджмент - Тренажёр</h1>
    <div class="sub">Темы 4-5 · Теория (с графиками) → Тест · задачи решаем в Excel-файле</div>
    <div class="topicbar" id="topicbar"></div>
    <div class="modes" id="modes"></div>
  </div>
</header>
<main><div class="wrap" id="content"></div></main>
<div class="scorebar">
  <span id="scoretxt">-</span>
  <div class="progress"><i id="progbar"></i></div>
  <button class="btn sec" onclick="resetProgress()" style="margin:0">Сбросить прогресс</button>
</div>

<script>
/* ============================== ДАННЫЕ ============================== */

const TOPICS = [
  {id:'t4', t:'Тема 4', d:'Инвестиции в реальные активы'},
  {id:'t5', t:'Тема 5', d:'Заёмный капитал · Облигации'},
];

/* ---- Вспомогательное оформление формул ---- */
const fx = (f,l)=>`<div class="fx">${f}${l?`<div class="lbl">${l}</div>`:''}</div>`;

/* =================================================================== */
/* ТЕМА 4 - ИНВЕСТИЦИИ В РЕАЛЬНЫЕ АКТИВЫ                                */
/* =================================================================== */
const T4 = {
intro:`<b>Цель темы.</b> Научиться оценивать инвестиционный проект: построить денежный поток (FCFF), посчитать показатели эффективности (NPV, IRR, MIRR, PI, PB/DPB), правильно сравнивать проекты и учитывать оборотный капитал, амортизацию, инфляцию и риск. <b>Главный критерий - NPV.</b>`,

theory:[
 {ttl:'Инвестиции, проект, расчётный период', body:`
  <p><b>Инвестиции</b> - долгосрочное вложение ресурсов ради чистой прибыли в будущем, превышающей вложенный капитал.</p>
  <p><b>Суть:</b> вы отдаёте деньги <i>сейчас</i> (это точно и больно) ради потока денег <i>потом</i> (он неопределён и растянут во времени). Вся тема 4 - про то, как честно сравнить «сейчас» и «потом»: для этого будущие деньги <b>приводят</b> к сегодняшнему дню (дисконтируют). Отсюда вырастают все показатели - NPV, IRR, PI и т.д.</p>
  <ul>
   <li><b>Реальные</b> - в физические активы (капвложения, CAPEX). Это наш основной случай в теме.</li>
   <li><b>Финансовые (портфельные)</b> - ценные бумаги (это уже темы 5-6).</li>
   <li><b>В нематериальные активы</b> - лицензии, патенты, ПО.</li>
  </ul>
  <p><b>Тип потока решает, каким инструментом пользоваться:</b></p>
  <ul><li><b>Ординарный</b> (− затем сплошные +): работают все показатели, включая IRR.</li>
  <li><b>Неординарный</b> (знак меняется несколько раз): IRR ломается → нужен MIRR (см. далее).</li></ul>
  <p><b>По зависимости:</b> независимые (берём все с NPV&gt;0), <b>альтернативные/взаимоисключающие</b> (выбираем один - тут и возникает конфликт NPV/IRR), взаимодополняющие (считаем поток вместе).</p>
  <p><b>Связь:</b> «расчётный период» = горизонт, на котором мы строим поток. Если проект по сути бесконечный - горизонт обрезают и хвост сворачивают в <b>Terminal Value</b> (см. карточку про бесконечные проекты).</p>`},

 {ttl:'Классификация инвестиций и проектов', body:`
  <p><b>Понятие (по закону).</b> Инвестиции (ФЗ «Об инвестиционной деятельности в РФ») - денежные средства, ценные бумаги, имущество и имущественные права, иные права с денежной оценкой, вкладываемые в объекты деятельности ради прибыли и/или иного полезного эффекта.</p>
  <p><b>Субъекты</b> инвестиционной деятельности: <b>инвесторы</b> (со свободными ресурсами), <b>потребители</b> ресурсов (предприятия), <b>посредники</b> (фонды, финансовые институты). <b>Объекты</b>: денежные средства, ценные бумаги, движимое/недвижимое имущество, имущественные права, права пользования ресурсами.</p>
  <p><b>Классификация инвестиций</b> - по признакам: объект, период, направленность, характер участия, форма собственности, регион.</p>
  <ul>
   <li><b>По периоду:</b> краткосрочные (&lt;1 года, обычно финансовые) и долгосрочные (&gt;1 года, реальный сектор; детализация: до 2 / 2-3 / 3-5 / свыше 5 лет).</li>
   <li><b>По направленности</b> (и связи риска с нормой прибыли):
    <table class="cmp"><tr><th>Класс проекта</th><th>Норма прибыли</th></tr>
    <tr><td>1. Замещение оборудования (рынок определён, технология освоена) - <b>нетто/реинвестиции</b></td><td>10-12%</td></tr>
    <tr><td>2. Расширение действующего предприятия</td><td>12-15%</td></tr>
    <tr><td>3. Новое предприятие / выход на новый рынок</td><td>15-25%</td></tr></table>
    Чем выше новизна и риск - тем выше требуемая норма прибыли (та же логика «риск ↔ доходность», что в ставке дисконтирования).</li>
   <li><b>По форме собственности:</b> государственные, частные, иностранные, совместные. <b>По характеру участия:</b> прямые (в проект) и косвенные (через фонды/институты).</li>
  </ul>
  <p><b>Инвестиционный проект</b> (№39-ФЗ от 25.02.1999) - обоснование экономической целесообразности, объёма и сроков капвложений; проектная документация; практические действия (бизнес-план). <b>Ключевые характеристики:</b> сроки реализации, объём капзатрат, показатели эффективности, риски. <i>(Профильные законы: №39-ФЗ, №160-ФЗ об иностранных инвестициях, №69-ФЗ 2020 о защите капвложений (СЗПК), №225-ФЗ о СРП, «Методические рекомендации по оценке эффективности».)</i></p>
  <p><b>Классификация проектов:</b></p>
  <ul><li>по срокам: кратко- / средне- (1-3-5 лет) / долгосрочные;</li>
  <li>по начальным условиям: <b>Greenfield</b> (с нуля) / <b>Brownfield</b> (на базе существующего предприятия);</li>
  <li>по степени зависимости: взаимодополняющие, независимые, взаимозамещающие, альтернативные;</li>
  <li>по типу потоков: <b>ординарные (классические)</b>, заёмного типа, смешанные.</li></ul>
  <p><b>Расчётный период.</b> <b>Начало:</b> момент начала инвестиций / первого действия по проекту / начала операционной деятельности. <b>Окончание:</b> прекращение спроса (или запрет), износ основных средств, исчерпание месторождения сырья, реализация имущества на сторону.</p>
  <p><b>Связь:</b> тип потока (ординарный/неординарный) определяет применимость IRR; Greenfield/Brownfield и зависимость проектов всплывут в конфликте NPV/IRR и в портфеле.</p>`},

 {ttl:'Жизненный цикл инвестиционного проекта', body:`
  <p><b>Зачем:</b> проект живёт во времени, и деньги по фазам ведут себя по-разному - сначала только тратим, потом возвращаем. Это объясняет форму денежного потока и где максимальный риск.</p>
  <p><b>Четыре фазы:</b></p>
  <ul>
   <li><b>1. Предынвестиционная</b> - идея, исследование рынка, ТЭО, бизнес-план, переговоры и контракты. Затраты небольшие, и это <b>sunk costs</b> (на решение «делать ли проект» уже не влияют).</li>
   <li><b>2. Инвестиционная</b> - капвложения (оборудование, стройка, пуско-наладка). Идёт <b>отток денег, поступлений ещё нет</b> → накопленный поток уходит в минус, <b>риск максимален</b>.</li>
   <li><b>3. Эксплуатационная</b> - выпуск и продажи. Появляются притоки, проект <b>возвращает вложенный капитал</b> и выходит в плюс (точка окупаемости).</li>
   <li><b>4. Ликвидационная</b> - завершение: продажа активов, возврат оборотного капитала. Необязательная (постпрогнозная) фаза.</li>
  </ul>
  <p><b>S-образная кривая накопленного потока:</b> провал в инвестфазе → самая нижняя точка = <b>максимальная потребность в финансировании</b> → подъём в эксплуатации → пересечение нуля = срок окупаемости.</p>
  {{chart:lifecycle}}
  <p><b>Связь:</b> расчётный период строится на весь ЖЦ; Terminal Value закрывает «хвост» после прогнозного горизонта; именно из-за инвестфазы NPV первых лет отрицателен.</p>`},

 {ttl:'Принципы оценки эффективности', body:`
  <p>Это «правила игры» - почему мы вообще считаем именно денежные потоки, а не прибыль. Каждый принцип закрывает типичную ошибку:</p>
  <ul>
   <li><b>Временна́я стоимость денег</b> → дисконтирование. Рубль сегодня дороже рубля через год (его можно вложить). Поэтому будущие CF делим на (1+r)ᵗ.</li>
   <li><b>Неуправляемость прошлого</b> → учитываем только <b>предстоящие</b> деньги. Уже потраченное (sunk cost) на решение не влияет - его не вернуть в любом случае.</li>
   <li><b>Денежные потоки, а не прибыль.</b> Прибыль - бухгалтерская абстракция (амортизация уменьшает прибыль, но это не отток денег). Решения принимают по реальному движению денег.</li>
   <li><b>Сравнение «с проектом» и «без проекта».</b> Важно не сколько денег у фирмы с проектом, а <i>насколько проект изменил</i> ситуацию → дифференциальный поток.</li>
   <li>Учёт оборотного капитала, инфляции, риска - отдельные карточки ниже.</li>
  </ul>
  <p><b>Эффект</b> = результат − затраты. <b>Эффективность</b> = соответствие результатов целям и интересам участников.</p>
  <p><i>Полный перечень из «Методических рекомендаций» - 12+ принципов:</i> рассмотрение на протяжении всего ЖЦ; моделирование ДП; сопоставимость условий; положительность и максимум эффекта; учёт фактора времени; учёт только предстоящих затрат/поступлений; «с проектом / без проекта»; учёт существенных последствий; учёт разных участников; многоэтапность; учёт потребности в оборотном капитале; учёт инфляции; учёт неопределённости и риска.</p>
  <p><b>Связь:</b> эти принципы - фундамент под расчёт FCF проекта и под все «ловушки» (sunk/opportunity costs, ΔNWC, инфляция), которые разбираются дальше.</p>`},

 {ttl:'Схема оценки · виды эффективности · денежный поток проекта', body:`
  <p><b>Зачем схема:</b> прежде чем считать NPV, проект проходит «фильтры» - сначала смотрят, нужен ли он обществу, потом коммерчески ли он выгоден, и только потом - выгоден ли каждому конкретному участнику.</p>
  <p><b>Схема оценки (этапы):</b></p>
  <ul><li><b>Этап 1.</b> Оценка <b>проекта в целом</b>: общественная значимость → социально-экономическая + коммерческая эффективность.</li>
  <li><b>Этап 2.</b> Определение состава участников, выработка схемы финансирования и организационно-экономического механизма.</li>
  <li><b>Этап 3.</b> Оценка <b>эффективности участия</b> для каждого участника (реализуем ли проект и заинтересованы ли все).</li></ul>
  <p><b>Два уровня эффективности:</b></p>
  <table class="cmp"><tr><th>Эффективность проекта в целом</th><th>Эффективность участия</th></tr>
  <tr><td>социально-экономическая + коммерческая</td><td>участия предприятий; эффективность инвестирования; региональная / отраслевая / бюджетная</td></tr></table>
  <p><b>Денежный поток проекта</b> (определение): зависимость от времени денежных поступлений и платежей за весь расчётный период. На каждом шаге: <b>приток</b> (поступления), <b>отток</b> (платежи), <b>сальдо</b> = приток − отток (эффект). ДП состоит из потоков трёх видов деятельности:</p>
  <ul><li><b>Инвестиционная</b> - CAPEX, оборотный капитал, ликвидационная стоимость;</li>
  <li><b>Операционная</b> - выручка, затраты, налоги;</li>
  <li><b>Финансовая</b> - кредиты, проценты, погашение (учитывается только в FCFE).</li></ul>
  <p>Оценка <b>в целом</b> - на основе <b>FCFF</b> (проект целиком за счёт собственных средств); оценка <b>участия</b> - на основе <b>FCFE</b> (с учётом схемы финансирования). Нулевая точка на оси - начало инвестиций; шаг - обычно 1 год.</p>
  <p><b>Связь:</b> деление на 3 вида деятельности - это «каскад» финансовой модели; FCFF/FCFE подробно - в отдельной карточке.</p>`},

 {ttl:'NPV - чистая приведённая стоимость', body:`
  <p><b>Что это по смыслу:</b> NPV отвечает на вопрос «<b>на сколько богаче станет компания</b>, если запустит проект, - в сегодняшних деньгах». Берём все будущие потоки, приводим к сегодня и вычитаем то, что вложили. Положительный остаток = чистое создание стоимости.</p>
  ${fx('NPV = CF<sub>0</sub> + CF<sub>1</sub>/(1+r) + CF<sub>2</sub>/(1+r)<sup>2</sup> + … + CF<sub>n</sub>/(1+r)<sup>n</sup>','CF₀ обычно отрицателен (инвестиции); r - ставка дисконтирования (требуемая доходность)')}
  <p><b>Откуда берётся ставка r:</b> это <b>альтернативная стоимость капитала</b> - доходность, которую инвестор мог бы получить в проекте такого же риска. Дисконтируя по r, мы сравниваем проект с этой альтернативой. Отсюда правило:</p>
  <ul>
   <li><b>NPV &gt; 0</b> → проект <i>обыгрывает</i> альтернативу → принимаем.</li>
   <li><b>NPV = 0</b> → даёт ровно требуемую доходность r, не лучше и не хуже.</li>
   <li><b>NPV &lt; 0</b> → проигрывает альтернативе → отклоняем.</li>
  </ul>
  <p><b>Связь со всем остальным:</b> NPV - это «материнский» показатель. <b>IRR</b> = ставка, при которой NPV=0. <b>PI</b> = NPV/IC + 1. <b>Точка безубыточности (NPV=0)</b>, <b>точка Фишера</b>, <b>EAA</b> - все определяются через NPV. Поэтому при любом конфликте критериев верят NPV.</p>
  <div class="note tip">В Excel: <span class="kbd xlf" data-xl="=@NPV@(ставка; CF1:CFn) + CF0"></span>. Функция NPV дисконтирует начиная с 1-го периода, поэтому CF₀ (вложение в момент 0) прибавляют отдельно - частая ошибка.</div>`},

 {ttl:'IRR - внутренняя норма доходности', body:`
  <p><b>Интуиция:</b> IRR - это «собственная» доходность проекта в % годовых. Формально - ставка, при которой все приведённые доходы ровно покрывают вложения, т.е. <b>NPV обнуляется</b>. Если построить график NPV(r), IRR - точка пересечения с осью X.</p>
  ${fx('0 = CF<sub>0</sub> + CF<sub>1</sub>/(1+IRR) + … + CF<sub>n</sub>/(1+IRR)<sup>n</sup>')}
  <p><b>Правило:</b> IRR &gt; r → принимаем (доходность выше стоимости денег); IRR &lt; r → отклоняем.</p>
  <p><b>Три смысла одного числа:</b> 1) «потолок» стоимости капитала - до какой ставки проект ещё не убыточен; 2) фактическая доходность; 3) <b>запас прочности</b> - насколько r может вырасти, прежде чем проект станет невыгодным (актуально при высоких/нестабильных ставках).</p>
  <table class="cmp"><tr><th>Достоинства</th><th>Недостатки (важно понимать почему!)</th></tr>
  <tr><td>Не зависит от ставки; интуитивный смысл (% годовых) - легко доложить руководству</td><td>• Только ординарные потоки (иначе несколько IRR).<br>• Неявно предполагает реинвестирование под саму IRR → <b>завышает</b> доходность.<br>• Не видит масштаб (100% от 1 млн &lt; 20% от 1 млрд).<br>• Может конфликтовать с NPV.</td></tr></table>
  <p><b>Частные случаи (считаются устно):</b> единичный платёж P через n лет: IRR = ⁿ√(P/I) − 1. Аннуитет: IRR = P/I. Растущий перпетуитет: IRR = P/I + g.</p>
  <p><b>Связь:</b> недостатки IRR ровно и создают <b>конфликт NPV/IRR</b> (следующие карточки) и порождают <b>MIRR</b> как «починку».</p>
  <div class="note">Excel: <span class="kbd xlf" data-xl="=@IRR@(CF0:CFn)"></span></div>`},

 {ttl:'MIRR - модифицированная IRR', body:`
  <p><b>Зачем нужна:</b> у обычной IRR две болезни. (1) При <b>неординарном потоке</b> (знак меняется несколько раз) уравнение имеет несколько корней → несколько значений IRR, и непонятно, какое «настоящее». (2) IRR молча предполагает, что доходы реинвестируются под саму IRR - это нереалистично завышает оценку.</p>
  <p><b>Идея лечения:</b> разнести потоки по разным реалистичным ставкам и «схлопнуть» всё в одно число:</p>
  ${fx('MIRR = ⁿ√( FV(притоки) / PV(оттоки) ) − 1','FV притоков - наращены на конец проекта по ставке реинвестирования i; PV оттоков - приведены к началу по ставке финансирования r')}
  <ul><li><b>i</b> - ставка реинвестирования доходов (реалистичная: депозит/WACC), а не сама IRR;</li>
  <li><b>r</b> - безрисковая/финансовая ставка для дисконтирования оттоков.</li></ul>
  <p>Так все притоки превращаются в одну сумму FV на конце, все оттоки - в одну сумму PV в начале, между ними - обычная доходность. Множественность исчезает.</p>
  <p><b>Три способа расчёта (из лекции):</b></p>
  <ul><li><b>Метод 1 - дисконтирование:</b> все отрицательные потоки приводим к настоящему по требуемой норме, суммируем с CF₀.</li>
  <li><b>Метод 2 - реинвестирование:</b> все потоки (кроме первого) наращиваем на конец проекта, считаем доходность.</li>
  <li><b>Метод 3 - комбинированный (основной):</b> оттоки дисконтируем по r, притоки наращиваем по i - формула выше.</li></ul>
  <p><b>Связь:</b> если ставку реинвестирования взять = WACC, MIRR и NPV всегда укажут на один лучший проект (см. таблицу в «Конфликт NPV/IRR»). MIRR - главный инструмент при неординарных потоках.</p>
  <div class="note">Excel: <span class="kbd xlf" data-xl="=@MIRR@(CF0:CFn; ставка_финанс; ставка_реинвест)"></span></div>`},

 {ttl:'PB, DPB - сроки окупаемости', body:`
  <p><b>Смысл:</b> «через сколько лет проект вернёт вложенное». Это мера <b>ликвидности и риска</b> (быстро вернул → меньше неопределённости), а не доходности.</p>
  <ul><li><b>PB</b> (простой) - по непродисконтированному накопленному потоку.</li>
  <li><b>DPB</b> (дисконтированный) - по дисконтированному; <b>DPB всегда ≥ PB</b>, потому что дисконтированные деньги «меньше» → копятся дольше.</li></ul>
  ${fx('PB = m + (непокрытый остаток) / (поток года m+1)','m - последний год, где накопленный поток ещё отрицателен')}
  <p>При равномерных поступлениях: PB = Инвестиции / годовой поток.</p>
  <p><b>Ограничение:</b> срок окупаемости <b>игнорирует</b> всё, что после точки окупаемости, и не говорит, выгоден ли проект. Поэтому это <i>вспомогательный</i> критерий - окончательное решение всё равно по NPV.</p>`},

 {ttl:'PI - индекс доходности', body:`
  <p><b>Смысл:</b> «сколько приведённого дохода приходится на каждый вложенный рубль». Это <b>относительная</b> версия NPV - отдача на единицу вложений (эффективность капитала).</p>
  ${fx('PI = PV(доходы) / IC = 1 + NPV/IC')}
  <ul><li>PI &gt; 1 → доходы превышают вложения (то же, что NPV&gt;0) → принять;</li>
  <li>PI = 1 → ноль (NPV=0); PI &lt; 1 → отклонить.</li></ul>
  <p><b>Ключевая связь:</b> NPV меряет <i>сколько денег</i> создаёт проект, PI - <i>насколько эффективно</i> используется капитал. Когда денег хватает на всё - решает NPV. Когда <b>бюджет ограничен</b> и приходится выбирать - ранжируют по <b>PI</b>, чтобы выжать максимум суммарного NPV из лимита (см. «Портфель при ограниченном капитале»).</p>`},

 {ttl:'Набор показателей · МОН · когда NPV ≫ 0', body:`
  <p>Каждый «простой» показатель имеет дисконтированный аналог (DCF):</p>
  <table class="cmp"><tr><th>Простой показатель</th><th>DCF-аналог</th></tr>
  <tr><td>Совокупная прибыль (все доходы − все затраты)</td><td><b>NPV</b></td></tr>
  <tr><td>Средняя годовая доходность инвестиций</td><td><b>IRR</b></td></tr>
  <tr><td>Доходность (доля прибыли в инвестициях)</td><td><b>PI</b> (рентабельность)</td></tr>
  <tr><td>Период окупаемости (PB)</td><td><b>DPB</b></td></tr></table>
  <p><b>МОН - максимальная отрицательная наличность</b> : самое глубокое отрицательное значение <i>накопленного</i> денежного потока - то есть <b>пиковая потребность в финансировании</b> проекта. Показывает, сколько денег максимум придётся «держать в проекте» до выхода в плюс. Дополнительный показатель, который иногда задают компании.</p>
  <p><b>Когда возможен NPV ≫ 0 на конкурентном рынке?</b> Только если есть реальное конкурентное преимущество:</p>
  <ul><li>инновационный продукт или технология его производства;</li>
  <li>уникальная возможность продаж;</li>
  <li>Brownfield-проект на базе существующего предприятия/предыдущего проекта.</li></ul>
  <p>Если чёткого объяснения нет - на большой положительный NPV рассчитывать не стоит: на конкурентном рынке NPV стремится к нулю (это и есть проверка правдоподобия модели).</p>
  <p><b>Связь:</b> «высокий NPV без видимых причин» - одна из типичных ошибок финмодели (см. карточку про финмодель).</p>`},

 {ttl:'Конфликт NPV/IRR · точка Фишера', body:`
  <p><b>Почему вообще возникает конфликт:</b> для <b>взаимоисключающих</b> проектов NPV и IRR могут указывать на <i>разных</i> победителей. Причины: проекты разного <b>масштаба</b> (IRR не видит размер), разного <b>профиля потоков</b> (ранние vs поздние доходы) или разных <b>сроков</b>. IRR - процент, NPV - рубли; при выборе одного проекта важны рубли. <b>Спор всегда решает NPV.</b></p>
  <p><b>Точка Фишера</b> - ставка r, при которой NPV двух проектов <i>равны</i> (кривые NPV пересекаются). Она показывает, где меняется предпочтение:</p>
  <ul><li>r &lt; точки Фишера → выигрывает проект, у которого NPV растёт сильнее при низкой ставке (обычно с поздними/крупными доходами);</li>
  <li>r &gt; точки Фишера → предпочтение переворачивается;</li>
  <li>r = точке Фишера → NPV равны, выбор по нефинансовым критериям.</li></ul>
  <p><b>Приростной (инкрементальный) метод</b> - как формально проверить, стоит ли доплата за более дорогой проект: строим поток (A − B), находим его IRR. Если IRR<sub>Δ</sub> &gt; r, то «лишние» вложения в A окупаются → берём A. <i>(IRR приростного потока в точности равна точке Фишера.)</i></p>
  <table class="cmp"><tr><th>Ситуация</th><th>Каким критерием пользоваться</th></tr>
  <tr><td>Разный масштаб / сроки / неординарный поток</td><td><b>NPV</b> (главный), MIRR - для проверки</td></tr>
  <tr><td>Ограниченный бюджет</td><td><b>PI</b> → max суммарный NPV</td></tr>
  <tr><td>«Запас прочности» по ставке</td><td><b>IRR</b></td></tr></table>
  {{chart:fisher}}
  <p><b>Связь:</b> это прямое следствие недостатков IRR (предыдущая карточка). Для проектов <b>разной длительности</b> «в лоб» сравнивать нельзя даже по NPV - нужен EAA (см. ниже).</p>`},

 {ttl:'Бесконечные проекты · Terminal Value', body:`
  <p><b>Проблема:</b> бизнес обычно не «заканчивается» через 5 лет - он работает дальше. Но прогнозировать поток на 50 лет вперёд бессмысленно. Решение: прогнозируем детально на n лет, а весь «хвост» после - сворачиваем в одно число (<b>Terminal / продлённую стоимость</b>) по формуле перпетуитета.</p>
  <p>Если поток после прогноза постоянный: NPV = NCF/d. С постоянным ростом g - <b>модель Гордона</b> (та же, что для акций в теме 6!):</p>
  ${fx('NPV = NCF/(d − g)','NCF = чистая прибыль + амортизация; g - темп роста; работает при d > g')}
  <p>Прогноз на n лет + терминальная стоимость:</p>
  ${fx('NPV<sub>полн</sub> = NPV<sub>1..n</sub> + TV<sub>n</sub>/(1+d)<sup>n</sup>,&nbsp;&nbsp; TV<sub>n</sub> = CF<sub>n+1</sub>/(d − g)')}
  <p><b>Экономический смысл TV:</b> как будто на последний день горизонта мы продали бизнес по справедливой цене, равной приведённой стоимости всех будущих доходов нового владельца.</p>
  <p><b>Тонкость:</b> на вечном горизонте оборудование надо постоянно заменять, поэтому амортизацию нельзя «возвращать» как в коротком проекте - вместо NCF берут <b>NOPLAT = EBIT×(1−T)</b>.</p>
  <p><b>Связь:</b> TV часто даёт бо́льшую часть стоимости проекта - поэтому к выбору g и d относятся осторожно. Это тот же приём, что в DCF-оценке акций (тема 6).</p>`},

 {ttl:'FCFF vs FCFE - какой поток и какая ставка', body:`
  <p><b>Главная идея:</b> «для кого считаем деньги, тем и должна быть ставка». Деньги для <i>всех</i> инвесторов (и кредиторов, и акционеров) дисконтируем по средней их стоимости (WACC). Деньги <i>только акционерам</i> - по их требуемой доходности (rₑ).</p>
  <table class="cmp"><tr><th></th><th>FCFF (весь проект)</th><th>FCFE (для акционеров)</th></tr>
  <tr><td>Чей это поток</td><td>Всех инвесторов</td><td>Только акционеров (после кредиторов)</td></tr>
  <tr><td>Учитывает долг?</td><td>Нет - долг «спрятан» в ставке</td><td>Да (проценты, погашение, новые кредиты)</td></tr>
  <tr><td>Ставка</td><td><b>WACC</b></td><td><b>Cost of Equity (rₑ)</b></td></tr>
  <tr><td>Результат</td><td>Enterprise Value (вся фирма)</td><td>Equity Value (доля акционеров)</td></tr></table>
  ${fx('FCFF = EBIT×(1−T) + Амортизация − CAPEX − ΔNWC')}
  <p>Разбор формулы: берём операционную прибыль после налога, <b>возвращаем амортизацию</b> (она не отток денег), <b>вычитаем CAPEX</b> (реальные вложения) и <b>вычитаем ΔNWC</b> (деньги, замороженные в обороте).</p>
  <div class="note">Типичная ошибка: вычитать проценты по кредиту в FCFF. Эффект долга уже сидит в WACC - двойной учёт. Проценты появляются только в FCFE.</div>
  <p><b>Связь:</b> WACC = Rₑ·доля СК + R_d·(1−T)·доля долга - связывает темы 4, 5 (R_d = YTM облигаций) и 6 (Rₑ из DDM/CAPM).</p>`},

 {ttl:'Финансовая модель проекта · типичные ошибки', body:`
  <p><b>Финмодель</b> - это «конструктор» проекта: на входе предпосылки, на выходе - денежные потоки, показатели и анализ рисков. Логика прозрачна и каждый блок связан с другими.</p>
  <p><b>Входные параметры:</b> параметры проекта (горизонт, выручка, CAPEX), компании (доля рынка, стоимость капитала), окружения (налоги, темп роста отрасли, инфляция). <b>Выход:</b> FCFF/FCFE, показатели (NPV, IRR…), анализ рисков.</p>
  <p><b>Сквозная логика (каскад):</b></p>
  ${fx('Предпосылки → Операц. прибыль → +Амортизация → −CAPEX → −ΔNWC → Долг и проценты → FCFF/FCFE → NPV/IRR → Анализ рисков')}
  <p><b>Разделы модели:</b> 1) входные данные; 2) операционный блок (P&L → EBITDA, EBIT, ЧП); 3) оборотный капитал (ΔNWC); 4) инвестиции (CAPEX, ликвидационная стоимость); 5) финансирование (долг, проценты, налоговый щит); 6) денежные потоки (FCFF/FCFE); 7) показатели (NPV, IRR, MIRR, PI, DPP); 8) риски (чувствительность, сценарии, BEP); 9) баланс и проверки.</p>
  <p><b>7 типичных ошибок финмоделей</b> :</p>
  <ol><li>Не учтена потребность в оборотном капитале при росте выручки.</li>
  <li>Потоки в реальных ценах, а ставка - номинальная (или наоборот).</li>
  <li>Использование заёмных средств для искусственного снижения стоимости собственного капитала.</li>
  <li>Встроенные формулы Excel без учёта длины шага планирования.</li>
  <li>Высокое значение NPV без видимых причин.</li>
  <li>Некорректное использование оценки для остаточного потока FCFE.</li>
  <li>Учёт процентов по заёмным средствам в потоке проекта FCFF.</li></ol>
  <p><b>Связь:</b> ошибки 1, 2, 7 - это ровно карточки про ΔNWC, инфляцию и FCFF; ошибка 5 - карточка «когда NPV≫0».</p>`},

 {ttl:'Дифференциальный поток · sunk & opportunity costs', body:`
  <p><b>Принцип:</b> проект оценивают по тому, <b>что он меняет</b>, а не по абсолютным цифрам компании. Считаем разницу двух миров:</p>
  ${fx('ΔCF = CF «с проектом» − CF «без проекта»')}
  <table class="cmp"><tr><th>Включаем (проект это меняет)</th><th>НЕ включаем (от решения не зависит)</th></tr>
  <tr><td>Доп. выручка, экономия на затратах, доп. затраты проекта, ΔNWC, налоговые эффекты, <b>альтернативные издержки</b></td>
  <td><b>Sunk costs</b> (уже потрачено), распределение общих накладных, проценты по кредитам (они в ставке)</td></tr></table>
  <p><b>Sunk cost</b> (безвозвратные): напр. оплаченное маркетинг-исследование. Деньги ушли в любом случае → на решение «делать/не делать» не влияют → в поток <b>не входят</b>. Психологически тянет «отбить» эти траты - это и есть ловушка.</p>
  <p><b>Opportunity cost</b> (упущенная выгода): ресурс, который мог приносить доход иначе. Пример: своё здание заняли под проект, хотя могли сдать в аренду → упущенная аренда (после налога) - <b>реальная затрата проекта</b>, её включаем, хотя «живых» денег не платим.</p>
  <p><b>Связь:</b> прямое применение принципа «учёт только предстоящих затрат» и «с проектом / без проекта». В задачах темы это самые частые подвохи.</p>`},

 {ttl:'Влияние оборотного капитала (NWC) на NPV', body:`
  <p><b>Почему оборотный капитал вообще влияет:</b> чтобы продавать, нужно держать запасы и давать отсрочку покупателям (дебиторка) - в этом «замораживаются» деньги <i>до</i> того, как придёт выручка. Это такие же реальные вложения, как покупка станка, просто временные.</p>
  <p>В потоке отражается <b>изменение</b> ΔNWC за период, а не сама величина:</p>
  <ul><li>Рост NWC (↑запасы, ↑дебиторка) → деньги ушли в оборот → <b>отток</b> (− в FCF);</li>
  <li>Снижение NWC → деньги высвободились → <b>приток</b>;</li>
  <li>Кредиторка (нам дали отсрочку) <b>уменьшает</b> потребность в деньгах;</li>
  <li>В <b>последний год</b> проект закрывается → запасы распродаются, дебиторка собирается → вся NWC <b>высвобождается</b> (большой +).</li></ul>
  ${fx('FCF = EBIT×(1−T) + Аморт − CAPEX − ΔNWC')}
  <p><b>Вывод:</b> чем меньше NWC нужно проекту, тем выше NPV - меньше денег «заморожено». Рост выручки почти всегда тянет за собой рост NWC - это типичная забытая статья.</p>
  <p><b>Связь:</b> ΔNWC - обязательный элемент FCFF (предыдущая карточка) и одна из главных «типичных ошибок финмодели».</p>`},

 {ttl:'Амортизация · налоговый щит', body:`
  <p><b>Парадокс:</b> амортизация - <i>не</i> отток денег (деньги за станок ушли при покупке, в CAPEX). Это бухгалтерское «размазывание» стоимости по годам. Но она реально приносит деньги - через <b>экономию на налоге</b>.</p>
  ${fx('Налоговый щит = Амортизация × ставка налога')}
  <p><b>Механика:</b> амортизация уменьшает налогооблагаемую прибыль → налог меньше → у компании остаётся больше денег. Поэтому в FCF мы сначала считаем прибыль <i>после</i> вычета амортизации (чтобы учесть щит), а потом <b>прибавляем амортизацию обратно</b> (раз это не реальный отток).</p>
  <ul><li><b>Ускоренная амортизация выгоднее:</b> щит приходит раньше, а ранние деньги дороже (дисконтирование).</li>
  <li><b>Инфляция «съедает» выгоду:</b> щит считается от исторической стоимости актива и не индексируется.</li></ul>
  <p><b>Связь:</b> щит - причина, по которой долг (тема 5) и амортизация удешевляют капитал. Та же логика налогового щита работает в стоимости долга: R_d·(1−T) в WACC.</p>`},

 {ttl:'Инфляция: реальные и номинальные цены', body:`
  <p><b>Суть проблемы:</b> можно считать проект в «сегодняшних» (реальных) ценах или в «ценах каждого будущего года» (номинальных). Оба способа верны - но смешивать нельзя, иначе инфляция учтётся либо дважды, либо ни разу.</p>
  <p><b>Главное правило:</b> поток и ставка - в одной «валюте»: <b>оба номинальные ИЛИ оба реальные.</b></p>
  ${fx('Формула Фишера:&nbsp; r<sub>реал</sub> = (1 + r<sub>ном</sub>)/(1 + α) − 1','α - инфляция. Точная формула, НЕ просто r−α')}
  ${fx('(1 + r<sub>ном</sub>) = (1 + r<sub>реал</sub>)·(1 + α)')}
  <p>Почему результат один: номинальный поток растёт с инфляцией <i>и</i> дисконтируется по номинальной (большей) ставке; реальный поток без инфляции дисконтируется по реальной (меньшей) ставке. Эффекты сокращаются → <b>NPV одинаков</b>.</p>
  <p>Нельзя: реальный поток + номинальная ставка (занизит NPV) или наоборот (завысит). Это «ошибка №2» из списка типичных ошибок финмодели.</p>
  <p><b>Связь:</b> для расчёта потребности в финансировании и ΔNWC нужны именно <b>номинальные</b> цены; в реальных ценах нельзя оценить финансовую реализуемость.</p>`},

 {ttl:'Прогнозирование прибыли проекта', body:`
  <p>Чтобы построить денежный поток, сначала нужно спрогнозировать прибыль. Два подхода:</p>
  <table class="cmp"><tr><th>Модель с натуральными показателями</th><th>Агрегированная модель</th></tr>
  <tr><td>Продажи в натуральном и стоимостном выражении; переменные затраты через удельные нормативы на единицу; постоянные затраты меняются ступенчато; нужен расчёт запасов</td><td>Продажи только в стоимостном выражении; затраты - через показатель затратоёмкости; ΔNWC - через длительность финансового цикла</td></tr></table>
  <p><b>Агрегированная модель</b> (рабочая формула операционной прибыли):</p>
  ${fx('EBIT = S − COGS − SG&A = S − VC − FC = S·(1 − z<sub>VC</sub>) − FC')}
  <ul><li><b>z<sub>VC</sub> = VC/S</b> - <b>затратоёмкость</b> по переменным затратам: сколько копеек переменных затрат в каждом рубле выручки;</li>
  <li>грубое приближение: VC ≈ COGS, FC ≈ SG&A;</li>
  <li>разделить VC и FC можно линейной регрессией выручки на объёмы.</li></ul>
  <p><b>Связь:</b> z<sub>VC</sub> напрямую входит в формулу точки безубыточности по выручке S* = FC/(1 − z<sub>VC</sub>) - следующая карточка.</p>`},

 {ttl:'Точка безубыточности · операционный рычаг (DOL)', body:`
  <p><b>Идея:</b> сколько надо продать, чтобы «не уйти в минус». Но «минус» бывает трёх глубин - отсюда три уровня безубыточности:</p>
  <table class="cmp"><tr><th>Уровень</th><th>Что покрывает</th></tr>
  <tr><td>1. Операционная BEP</td><td>текущие расходы (прибыль = 0)</td></tr>
  <tr><td>2. Финансовая (cash) BEP</td><td>+ возврат вложенных инвестиций</td></tr>
  <tr><td>3. NPV-безубыточность</td><td>+ требуемую доходность капитала (NPV = 0)</td></tr></table>
  ${fx('Q<sub>BEP</sub> = FC / (p − c)&nbsp;&nbsp;&nbsp;или&nbsp;&nbsp; S* = FC / (1 − z<sub>VC</sub>)','(p−c) - маржинальная прибыль на единицу; z_VC = VC/S - доля переменных затрат в выручке')}
  <p>Логика: каждая проданная единица приносит маржу (p−c); делим постоянные затраты FC на эту маржу - столько единиц нужно, чтобы «отбить» FC.</p>
  ${fx('DOL = 1 + FC/Прибыль','операционный рычаг = % изменения прибыли / % изменения выручки')}
  <p><b>DOL</b> показывает <b>чувствительность прибыли к выручке</b>: чем больше доля постоянных затрат, тем сильнее прибыль скачет при колебаниях продаж = выше операционный риск.</p>
  <p><b>Связь:</b> NPV-безубыточность напрямую использует NPV(Q)=0; DOL связан с анализом чувствительности (карточка про риски).</p>`},

 {ttl:'Портфель при ограниченном капитале', body:`
  <p><b>Когда это нужно:</b> в идеале берут <i>все</i> проекты с NPV&gt;0. Но если денег на год не хватает, приходится отказывать даже хорошим проектам - это <b>рационирование капитала</b>. Цель меняется: не «каждый проект отдельно», а «выжать <b>максимум суммарного NPV</b> из лимита бюджета».</p>
  <p><b>Пространственная оптимизация (на 1 год):</b></p>
  <ul><li><b>Проекты делимы</b> (можно профинансировать частично): ранжируем по <b>PI ↓</b> (отдача на рубль!), берём целиком сверху вниз, последний добиваем остатком бюджета; NPV последнего берём <i>пропорционально</i> доле инвестиций.</li>
  <li><b>Неделимы</b> (только целиком): перебираем все комбинации, влезающие в бюджет → выбираем с max ∑NPV. Бюджет - это потолок, а не обязательная к трате сумма.</li></ul>
  <p><b>Временна́я оптимизация:</b> что реализовать сейчас, а что отложить на год. Считаем «цену отсрочки»:</p>
  ${fx('I<sub>потерь</sub> = (NPV<sub>1</sub> − NPV<sub>2</sub>) / I','NPV₁ - если начать сейчас, NPV₂ - если отложить на год')}
  <p>Чем выше индекс - тем дороже откладывать. <b>Сейчас</b> реализуем проекты с <b>наибольшим</b> индексом потерь, остальные переносим.</p>
  <p><b>Связь:</b> здесь PI становится главным критерием вместо NPV - ровно тот случай из таблицы «Конфликт NPV/IRR».</p>`},

 {ttl:'Проекты разной продолжительности', body:`
  <p><b>Почему «в лоб» нельзя:</b> проект на 5 лет создаёт стоимость дольше, чем проект на 2 года. Сравнивая их NPV напрямую, мы наказываем короткий проект за то, что он раньше освобождает деньги (а их можно вложить снова). Нужно привести к <b>сопоставимому горизонту</b>.</p>
  <ul><li><b>Цепной повтор:</b> повторяем каждый проект до НОК сроков (напр. 2 и 3 года → до 6 лет), тогда NPV сравнимы.</li>
  <li><b>Бесконечный цепной повтор</b> (если повторять можно вечно):</li></ul>
  ${fx('NPV<sub>∞</sub> = NPV<sub>k</sub> × (1+r)<sup>k</sup> / ((1+r)<sup>k</sup> − 1)','k - срок одного цикла проекта')}
  <ul><li><b>Эквивалентный аннуитет (EAA)</b> - самый удобный: переводим NPV проекта в «среднегодовой эквивалент» (как если бы он давал одинаковую сумму каждый год):</li></ul>
  ${fx('EAA = NPV / B(n;r),&nbsp;&nbsp; B(n;r) = (1/r)·(1 − 1/(1+r)<sup>n</sup>)','B - коэффициент аннуитета за n лет')}
  <p><b>Критерий:</b> чем больше EAA (или NPV∞), тем лучше - независимо от срока. EAA и бесконечный повтор всегда дают одинаковый выбор.</p>
  <p><b>Связь:</b> B(n;r) - тот же коэффициент аннуитета, что используется для цены облигаций (тема 5) и DDM (тема 6). EAA = «обратная» операция к дисконтированию аннуитета.</p>`},

 {ttl:'Управление рисками проекта', body:`
  <p><b>Риск инвестпроекта</b> - возможность возникновения неблагоприятных условий его реализации.</p>
  <p><b>Группы рисков:</b> технологические, экономические, финансовые, организационные, экологические, политические.</p>
  <p><b>Процессы управления рисками:</b> идентификация (составление <b>реестра рисков</b>) → анализ → разработка рекомендаций по снижению → корректировка проекта → мониторинг. Используют <b>матрицу рисков</b> (вероятность × влияние на проект).</p>
  <p><b>Обеспечение устойчивости</b> проекта (устойчивость = сохранение эффективности при изменении условий):</p>
  <ul><li>резервирование; страхование; диверсификация;</li>
  <li>ликвидационные процедуры; учёт последующей информации; получение дополнительной информации.</li></ul>
  <p><b>Математическая модель:</b> параметры финмодели - случайные величины, поэтому и итоговый NPV - случайная величина (≈ нормальное распределение). Степень риска = вероятность NPV&lt;0 или разброс (σ). Критерий: принять, если E[NPV] ≥ 0.</p>
  <p><b>Связь:</b> ведёт к методам количественной оценки риска (следующая карточка) и к теме 8 (σ как мера риска).</p>`},

 {ttl:'Риски: чувствительность, сценарии, дерево, Монте-Карло', body:`
  <p><b>Зачем:</b> NPV - это <i>одно</i> число при <i>одном</i> наборе предположений. Но входы (цена, объём, затраты) неизвестны точно. Анализ риска показывает, <b>насколько NPV устойчив</b> и какова вероятность провала. Методы - по нарастанию сложности:</p>
  <p><b>1. Анализ чувствительности</b> (однофакторный) - меняем <i>один</i> параметр на ±% и смотрим, как реагирует NPV. Находим, к чему проект чувствителен больше всего (обычно к цене/объёму).</p>
  ${fx('Коэф. чувствительности = ΔNPV(%) / ΔX(%)','эластичность NPV по параметру X; если по CAPEX = −2, то +10% инвестиций → −20% NPV')}
  <p><b>2. Сценарный анализ</b> - меняем сразу группу параметров согласованно (опт./норм./пессим.) с вероятностями. Сценарий = набор условий реализации проекта:</p>
  ${fx('E[NPV] = Σ NPV<sub>i</sub>·P<sub>i</sub>,&nbsp;&nbsp; σ² = Σ (NPV<sub>i</sub> − E[NPV])²·P<sub>i</sub>')}
  <p>E[NPV] - ожидаемая стоимость, σ - мера разброса (риска). Принимаем при E[NPV] ≥ 0.</p>
  <p><b>3. Дерево решений</b> - когда решения принимаются <i>поэтапно</i>: позволяет оперировать <b>условными вероятностями</b> (значения зависят от предыдущего шага) и учитывать <b>реальные опционы</b> - управленческую гибкость (выйти из проекта при плохих новостях). <i>Пример из лекции:</i> покупка земли сейчас → строительство ТЦ через год, только если построят дорогу → доходы.</p>
  <p><b>4. Метод Монте-Карло</b> - входы как случайные величины с заданными распределениями (нормальное, логнормальное, бета, треугольное); датчик случайных чисел генерирует сценарий → считаем показатели → повторяем сотни раз → получаем распределение NPV. Минусы: чувствителен к входам, не учитывает связи между параметрами и действия менеджера.</p>
  <p><b>Связь:</b> чувствительность опирается на DOL и структуру затрат; сценарный анализ - мостик к теме 8 (риск и доходность, σ как мера риска).</p>`},

 {ttl:'Оценка предпринимательских (венчурных) проектов', body:`
  <p>Для стартапа до выхода на IPO стоимость складывается из прогноза на 1-3 года и терминальной стоимости с учётом <b>вероятности успеха/провала</b>:</p>
  ${fx('NPV = −Inv + p·V<sub>IPO</sub>/(1+r<sub>1</sub>)<sup>n</sup> + (1−p)·V<sub>D</sub>/(1+r<sub>2</sub>)<sup>n</sup>','p - вероятность успешного выхода (IPO); V_IPO - стоимость при IPO; V_D - при провале/ликвидации')}
  <p>Ключевые цели до IPO: быстрый устойчивый рост выручки и достижение прибыльности к моменту выхода. Ставка дисконтирования до IPO = норма доходности венчурного капитала, обычно <b>30-70%</b> (компенсация за очень высокий риск).</p>
  <p><b>Связь:</b> та же логика «прогноз + терминальная стоимость», что в TV, но взвешенная на вероятность - мостик к дереву решений и к DCF-оценке акций (тема 6).</p>`},
],

const T5 = {
intro:`<b>Цель темы.</b> Понять финансовое планирование и пределы роста компании, а затем - облигации как инструмент привлечения заёмного капитала: цена, доходность (текущая, YTM), бескупонные облигации, НКД, дюрация и связь YTM с WACC.`,

theory:[
 {ttl:'Зачем финансовое планирование и рост', body:`
  <p><b>Главная мысль:</b> рост - не бесплатен. Чтобы продавать больше, нужны новые активы (оборудование, запасы, дебиторка), а их надо <b>чем-то профинансировать</b>. Финансовое планирование отвечает: «как быстро мы можем расти, не упёршись в нехватку денег?»</p>
  <p>Четыре рычага финансовой политики (их и «крутят» в моделях):</p>
  <ul><li><b>Инвестиции в активы</b> - это бюджетирование (вся тема 4!);</li>
  <li><b>Уровень долга</b> - структура капитала (тема 5-7);</li>
  <li><b>Дивиденды</b> - сколько прибыли отдать, сколько оставить на рост (тема 6);</li>
  <li><b>Оборотный капитал / ликвидность</b> - тема 3.</li></ul>
  <p>Горизонт 2-5 лет, сценарии (худший/нормальный/лучший). Цель - не рост ради роста, а <b>рост рыночной стоимости собственного капитала</b>.</p>
  <p><b>Связь:</b> отсюда два «потолка роста» (внутренний и устойчивый) и понятие EFN - потребность во внешних деньгах.</p>`},

 {ttl:'Потребность во внешнем финансировании (EFN)', body:`
  <p><b>Логика «% от продаж»:</b> многие статьи (активы, часть обязательств, затраты) растут <i>пропорционально</i> выручке. Спрогнозировав продажи, можно прикинуть, сколько активов потребуется - и хватит ли на них собственных денег.</p>
  <p>При росте продаж активы растут на ΔАктивы. Часть финансируется «сама собой»: нераспределённой прибылью и спонтанными обязательствами (кредиторка растёт вместе с закупками). Чего не хватает - это <b>EFN</b>:</p>
  ${fx('EFN = ΔАктивы − ΔСпонтанные обязательства − ΔНераспр. прибыль')}
  <p><b>Чем закрыть дефицит</b> (это и есть «резервный клапан» баланса): краткосрочный долг, долгосрочный долг или выпуск новых акций. Выбор - это и есть решение о структуре капитала.</p>
  <p>Коэффициент капиталоёмкости = Активы/Выручка - сколько активов нужно на рубль выручки (обратная величина к оборачиваемости).</p>
  {{chart:efn}}
  <p><b>Связь:</b> если EFN можно сделать = 0 за счёт только внутренних денег - получаем <b>внутренний темп роста</b> (следующая карточка).</p>`},

 {ttl:'Модели финансового планирования: составляющие', body:`
  <p><b>Что даёт планирование:</b> изучение взаимосвязей, исследование альтернатив, избавление от неожиданностей, обеспечение выполнимости и внутренней согласованности.</p>
  <p><b>Составляющие модели:</b></p>
  <ul><li><b>Прогноз продаж</b> - отправная точка. Два варианта: задать конкретный объём продаж или <b>темп роста</b> выручки.</li>
  <li><b>Отчёты pro forma</b> - прогнозные (формальные) баланс, P&L и отчёт о движении денежных средств.</li>
  <li><b>Потребности в активах</b> - прогноз CAPEX и изменения основных средств и NWC.</li>
  <li><b>Финансовые потребности</b> - политика в области дивидендов и заёмных средств.</li>
  <li><b>«Резервный клапан»</b> - источник внешнего финансирования, закрывающий дефицит (или избыток), чтобы баланс сошёлся.</li></ul>
  <p><b>Ключевые коэффициенты:</b></p>
  ${fx('Коэф. дивидендных выплат (payout) = Дивиденды / Чистая прибыль')}
  ${fx('Коэф. удержания (b, plowback/reinvestment) = 1 − payout')}
  ${fx('Коэф. капиталоёмкости = Совокупные активы / Выручка','сколько активов нужно на 1 ед. выручки (обратно оборачиваемости)')}
  <p>Допущение «% от продаж»: издержки - фиксированный процент от выручки → норма прибыли постоянна; активы растут пропорционально продажам.</p>
  <p><b>Связь:</b> b и payout - те же, что в формулах темпов роста (далее) и в g = ROE·b дивидендной модели (тема 6).</p>`},

 {ttl:'Темпы внутреннего и устойчивого роста', body:`
  <p><b>Два потолка роста</b> - насколько быстро фирма может расти, не нарушая свою финансовую политику:</p>
  ${fx('Внутренний рост = (ROA·b)/(1 − ROA·b)','максимум БЕЗ всякого внешнего финансирования (EFN = 0)')}
  ${fx('Устойчивый рост SGR = (ROE·b)/(1 − ROE·b)','без выпуска новых акций, но с сохранением целевой доли долга')}
  <p><b>Разница между ними:</b> внутренний - только на свою прибыль (вообще без займов). Устойчивый - можно <i>добирать долг</i>, чтобы держать прежнее соотношение долг/СК (ведь рост собственного капитала за счёт прибыли позволяет занять ещё пропорционально). Поэтому SGR &gt; внутреннего.</p>
  <p><b>b</b> - коэффициент удержания (reinvestment/plowback) = 1 − payout (доля прибыли, оставленная в бизнесе).</p>
  <p><b>Откуда «растёт» SGR - через DuPont</b> (ROE раскладывается на 3 драйвера):</p>
  ${fx('ROE = (ЧП/Выручка)·(Выручка/Активы)·(Активы/СК) = маржа × оборачиваемость × фин. рычаг')}
  <p>Чтобы расти быстрее, не нарушая политику: ↑маржа, ↑оборачиваемость, ↑долг или ↓дивиденды (↑b). Если хочется расти ещё быстрее - придётся либо выпускать акции, либо менять политику.</p>
  <p><b>Связь:</b> g = ROE·b - та же формула темпа роста, что в дивидендной модели Гордона (тема 6)! Рост дивидендов финансируется реинвестированной прибылью.</p>`},

 {ttl:'Финансовые рынки и инструменты', body:`
  <p><b>Контекст:</b> компания привлекает внешний капитал двумя путями - <b>кредиты</b> и <b>выпуск долговых ценных бумаг</b> (облигаций). Чтобы понять облигации, нужно увидеть, где они обращаются.</p>
  <p><b>Финансовый рынок</b> - структура, создающая возможность заимствований, купли-продажи ценных бумаг и инвестиционных товаров. Включает: <b>фондовый</b> рынок (размещение ценных бумаг), <b>рынок деривативов</b> (цена риска), <b>денежный</b> рынок (ликвидность), валютный (Forex), страховой.</p>
  <p><b>Формы рынков:</b> организованные (биржевые, с клирингом и депозитарием), межорганизационные (межбанковский), розничные.</p>
  <p><b>Участники:</b> заёмщики, кредиторы, посредники (+ регулирующие органы; в РФ - ЦБ).</p>
  <p><b>Финансовый инструмент</b> - любой договор, в результате которого у одной стороны возникает финансовый актив, а у другой - финансовое обязательство или долевой инструмент. Главный признак - <b>стандартизированность</b>.</p>
  <table class="cmp"><tr><th>Первичные</th><th>Производные (деривативы)</th></tr>
  <tr><td>акции, облигации, векселя, кредиты - предусматривают поставку/получение актива</td><td>опционы, фьючерсы, форварды, свопы - право/обязательство в будущем; стоимость зависит от базового актива</td></tr></table>
  <p><b>Связь:</b> облигация - <b>долговая</b> ценная бумага (заём), акция (тема 6) - <b>долевая</b> (доля собственности). Конвертируемая облигация - гибрид (дериватив-подобный).</p>`},

 {ttl:'Облигация: определение и характеристики', body:`
  <p><b>Облигация</b> - срочная долговая ценная бумага, удостоверяющая заём между владельцем (кредитором) и эмитентом (заёмщиком).</p>
  <p><b>Чем отличается от акции:</b> облигация - это <i>долг</i> (фиксированные обязательные выплаты, нет права собственности, приоритет при банкротстве), акция - <i>доля</i> (доход не гарантирован, есть право голоса). Поэтому облигация менее рискованна для инвестора и дешевле для эмитента.</p>
  <ul><li><b>Номинал</b> (Face/Par value) - сумма, возвращаемая при погашении (от него считается купон).</li>
  <li><b>Купон</b> и <b>ставка купона</b> - регулярная выплата, % от номинала.</li>
  <li><b>YTM</b> - доходность к погашению (главное число для оценки).</li>
  <li><b>Срок обращения</b>, дата погашения, цена выпуска.</li></ul>
  <p>Цена котируется в % к номиналу: &gt;100 - <b>премия</b>; =100 - <b>по номиналу (Par)</b>; &lt;100 - <b>дисконт</b>. Что определяет, где окажется цена - следующие карточки (это зависит от соотношения купона и рыночной доходности).</p>`},

 {ttl:'Классификация облигаций', body:`
  <p>Зачем знать виды: от них зависит, <b>как считать доходность</b> и <b>какие риски</b> несёт бумага.</p>
  <table class="cmp"><tr><th>Признак</th><th>Виды</th></tr>
  <tr><td>Купон</td><td>Фиксированный · переменный/плавающий (ОФЗ-ПК ~ RUONIA) · индексируемый по инфляции (ОФЗ-ИН) · бескупонный (дисконтный)</td></tr>
  <tr><td>Эмитент</td><td>Государственные (ОФЗ, казначейские, муниципальные) · корпоративные</td></tr>
  <tr><td>Обеспечение</td><td>Обеспеченная (закладная) · необеспеченная</td></tr>
  <tr><td>Конвертируемость</td><td>Отзывная (call) · возвратная (put) · конвертируемая · обмениваемая</td></tr></table>
  <p><b>Оферта</b> - встроенный опцион досрочного погашения: <b>put</b> (право <i>инвестора</i> продать по номиналу - защищает инвестора) / <b>call</b> (право <i>эмитента</i> досрочно погасить - выгодно эмитенту при падении ставок). При оферте доходность считают <b>к дате оферты</b>, а не погашения.</p>
  <p><b>Логика связи купона и риска:</b> <b>мусорные (High Yield)</b> облигации (рейтинг ниже BBB-/Baa3) платят высокий купон именно как <i>компенсацию за риск дефолта</i> - чем выше риск, тем выше требуемая доходность. Та же идея «риск ↔ доходность» пронизывает всю тему 8.</p>`},

 {ttl:'Размещение и специальные виды облигаций', body:`
  <p><b>Этапы размещения:</b> подготовка (анализ рынка, структурирование выпуска, эмиссионные документы) → <b>премаркетинг</b> (оценка ожидаемой доходности и спроса, ориентир по ставке купона) → <b>маркетинг</b> (презентации инвесторам, кредитный research-обзор эмитента).</p>
  <p><b>Отзывная (call) облигация</b> - эмитент вправе досрочно погасить. Со встроенным опционом <b>европейского</b> типа (в заранее установленные даты) или <b>американского</b> (в течение периода; есть <b>lock-up</b> - период, когда отзыв запрещён). Выгодна эмитенту при падении ставок.</p>
  <p><b>Возвратная (put) облигация</b> - досрочное погашение инициирует инвестор, эмитент обязан выкупить по номиналу в дату оферты. Снижает риск инвестора.</p>
  <p><b>Конвертируемая облигация</b> - даёт купоны как обычная, но при погашении инвестор может получить не деньги, а <b>обыкновенные акции</b> эмитента:</p>
  <ul><li><b>Курс (коэффициент) конвертации</b> - сколько акций даёт одна облигация;</li>
  <li><b>Конверсионная стоимость</b> = номинал / коэффициент конвертации;</li>
  <li><b>Конверсионная премия</b> - разница между конверсионной стоимостью и текущей котировкой акции.</li></ul>
  <p><b>Обмениваемая</b> - конвертируется в акции <i>другого</i> эмитента. Цель выпуска конвертируемых - привлечь инвесторов, которым обычная облигация неинтересна (даёт «апсайд» акции при защите долга).</p>
  <p><b>Связь:</b> опционы call/put - те же встроенные опционы, что в оферте (предыдущая карточка); конвертация связывает облигации (тема 5) с акциями (тема 6).</p>`},

 {ttl:'Цена купонной облигации (DCF)', body:`
  <p><b>Ключевая идея:</b> цена облигации - это <b>PV всех её будущих выплат</b>. Никакой магии: те же дисконтированные денежные потоки, что и в NPV (тема 4). Поток облигации = серия купонов (аннуитет) + возврат номинала в конце.</p>
  ${fx('P = Σ C<sub>t</sub>/(1+r)<sup>t</sup> + N/(1+r)<sup>T</sup>','C - купон, N - номинал, r - требуемая рыночная доходность (YTM), T - лет до погашения')}
  <p><b>Что такое r здесь:</b> это рыночная доходность <i>аналогичных</i> облигаций - альтернативная стоимость денег для инвестора. Купон фиксирован выпуском, а r «дышит» вместе с рынком → меняется цена.</p>
  <p>Если купон m раз в год (стандартная формула): ставка за период = r/m, число периодов = T·m, купон за период = C/m:</p>
  ${fx('P = Σ (C/m)/(1+r/m)<sup>k</sup> + N/(1+r/m)<sup>T·m</sup>')}
  <p><b>Вариант MOEX / Дамодарана</b> - дисконтируем не по номеру периода, а по <i>фактическому времени</i> до выплаты (в долях года):</p>
  ${fx('P = Σ (C<sub>i</sub>/m)/(1+r)<sup>t<sub>i</sub></sup> + N/(1+r)<sup>t<sub>n</sub></sup>','t<sub>i</sub> - время до i-й выплаты в долях года: для полугодовых купонов 0,5; 1; 1,5 … Так точнее учитывается реальное число дней.')}
  <div class="note tip">Главное соотношение: YTM = купону → цена = номиналу (Par). YTM &gt; купона → <b>дисконт</b> (инвестор требует больше, чем даёт купон, → платит меньше). YTM &lt; купона → <b>премия</b>.</div>`},

 {ttl:'Бескупонная (дисконтная) облигация', body:`
  <p><b>Суть:</b> купонов нет вообще. Весь доход инвестора - это разница между ценой покупки (дешёвой) и номиналом при погашении. Это <i>частный случай</i> купонной облигации с C=0 → в формуле остаётся только последнее слагаемое.</p>
  ${fx('P = N/(1+r)<sup>n</sup>','цена; n - лет до погашения')}
  <p>Если до погашения <b>дробный</b> срок (целые годы n + t дней): P = N/((1+r)<sup>v</sup>·(1+r)<sup>n</sup>), где v = t/365.</p>
  ${fx('r = ⁿ√(N/P) − 1','доходность к погашению (срок > года)')}
  <p>Срок &lt; года: r = (N−P)/P · 365/t · 100%. При <b>m начислениях</b> процентов в год: r = (<sup>m·n</sup>√(N/P) − 1)·m.</p>
  <p><b>Поэтому бескупонная облигация всегда торгуется с дисконтом</b> (цена &lt; номинала): иначе у инвестора не было бы никакого дохода. Чем дальше погашение / выше ставка - тем глубже дисконт.</p>`},

 {ttl:'Доходности облигации', body:`
  <p><b>Зачем три разные «доходности»:</b> инвестор зарабатывает на двух вещах - на <i>купонах</i> и на <i>разнице цен</i> (купил с дисконтом - погасили по номиналу). Разные показатели учитывают разные части этого дохода.</p>
  <p><b>Текущая доходность (CY)</b> - только купонный доход относительно цены (грубая, не учитывает прибыль/убыток от погашения):</p>
  ${fx('CY = C<sub>год</sub> / P<sub>тек</sub>','купон за год / текущая цена')}
  <p><b>YTM</b> - <i>полная</i> доходность: учитывает и купоны, и разницу цены с номиналом. Это ставка, при которой PV всех выплат = рыночной цене (по сути - IRR облигации!). Приближённая формула:</p>
  ${fx('YTM ≈ [C + (N − P)/n] / [(N + P)/2]','числитель: купон + средний годовой выигрыш от погашения; знаменатель: средняя цена')}
  <p><b>Точный YTM</b> - через IRR потока или линейную интерполяцию между двумя ставками:</p>
  ${fx('r = r<sub>1</sub> + (r<sub>2</sub> − r<sub>1</sub>)·(P<sub>1</sub> − P<sub>0</sub>)/(P<sub>1</sub> − P<sub>2</sub>)')}
  <p><b>Доходность за период</b> (если продали раньше погашения): RR = (P₁ − P₀ + C)/P₀.</p>
  <p><b>Сумма купонов с учётом реинвестирования</b> - если инвестор вкладывает полученные купоны под ставку r (наращенный аннуитет):</p>
  ${fx('C<sub>P</sub> = (C/r)·[(1+r)<sup>n</sup> − 1]','C - купон, n - число периодов, r - ставка реинвестирования купонов')}
  <p>Итоговая доходность с реинвестированием: r = (B/S)<sup>1/n</sup> − 1, где B - все будущие выплаты, S - цена покупки. Учитывает, что купоны не лежат «мёртвым грузом», а сами приносят доход.</p>
  <p><b>Связь:</b> YTM = IRR облигации (тема 4) и одновременно = стоимость долга R_d для эмитента (последняя карточка темы → WACC). Реинвестирование купонов - та же идея, что в MIRR (наращение притоков).</p>`},

 {ttl:'Связь цены и доходности · 5 правил', body:`
  <p><b>Откуда обратная связь:</b> купон фиксирован. Если рыночная доходность <i>выросла</i>, инвесторы хотят больше - старая облигация с маленьким купоном им интересна только <i>дешевле</i> → цена падает. И наоборот. Цена и доходность всегда «качели».</p>
  <ol><li>Цена и доходность движутся <b>в противоположных</b> направлениях.</li>
  <li>YTM &gt; купона → цена &lt; номинала (дисконт); YTM &lt; купона → премия.</li>
  <li>При приближении к погашению цена → номинал (всё равно вернут номинал).</li>
  <li><b>Длинные облигации чувствительнее</b> к ставкам: их денежные потоки дальше в будущем, дисконтирование бьёт сильнее.</li>
  <li>Чувствительность зависит не только от срока, но и от <i>распределения</i> потоков - это и измеряет <b>дюрация</b>.</li></ol>
  <p><b>Выпуклость:</b> цена растёт сильнее при снижении ставки, чем падает при таком же росте - асимметрия в пользу инвестора.</p>
  <p><b>Связь:</b> правило 4-5 ведёт прямо к дюрации (следующая карточка); при ожидании роста ставки ЦБ выгоднее короткие облигации (меньше риск).</p>`},

 {ttl:'Гособлигации (ОФЗ) и кредитный риск', body:`
  <p><b>Кредитный риск</b> - риск невыполнения эмитентом обязательств: неуплата купонов, неуплата номинала или и то и другое. <b>Дефолт</b> - невыполнение долговых обязательств (бывает и у государств: РФ, 1998 г.). Механизмы защиты инвестора: более высокий купон и <b>ковенанты</b> (ограничительные условия). Уровень риска отражает <b>кредитный рейтинг</b> (S&P, Moody's, Fitch).</p>
  <p><b>Виды ОФЗ</b> (федеральные облигации Минфина):</p>
  <ul><li><b>ОФЗ-ПД</b> - постоянный купон (известен и неизменен до погашения; самый популярный);</li>
  <li><b>ОФЗ-ФД / ОФЗ-АД</b> - фиксированный, но разный по годам купон; часто с амортизацией номинала;</li>
  <li><b>ОФЗ-ПК</b> - переменный купон, привязан к RUONIA;</li>
  <li><b>ОФЗ-ИН</b> - индексируемый по инфляции номинал (аналог TIPS; считают реальную доходность);</li>
  <li><b>ОФЗ-н</b> - «народные», не торгуются на бирже.</li></ul>
  ${fx('Купон ОФЗ-ИН = N<sub>ср</sub>/2 · c','N<sub>ср</sub> - средний номинал за купонный период (~6 мес), ежедневно переиндексируется по ИПЦ; c - ставка купона; деление на 2 - полугодовой купон')}
  <p><b>Особенности ОФЗ:</b> низкий кредитный риск (надёжность), высокая ликвидность, большой выбор выпусков, приемлемая доходность (≈ депозит крупного банка).</p>
  <p><b>Связь:</b> доходность ОФЗ ≈ безрисковая ставка r_f - фундамент для CAPM (тема 8) и ставок дисконтирования.</p>`},

 {ttl:'НКД и облигация с амортизацией', body:`
  <p><b>Зачем НКД:</b> купон платят раз в полгода/год, но владел облигацией ты, например, 90 дней до выплаты. Несправедливо терять накопленную часть купона при продаже. Поэтому покупатель <b>доплачивает продавцу</b> накопленный купонный доход за дни владения.</p>
  ${fx('НКД = C · t/365','t - дней с последней выплаты купона')}
  <p>(Полную выплату купона получит тот, кто владеет бумагой в дату фиксации реестра, поэтому он компенсирует прежнему держателю его часть.)</p>
  <p><b>Облигация с амортизацией:</b> номинал гасится <i>частями</i> в даты купонов (а не весь в конце). Важное следствие: купон считается от <b>остаточного</b> (уменьшающегося) номинала, поэтому купонные выплаты со временем падают.</p>
  ${fx('Купон периода: C<sub>i</sub> = c · N<sub>ост</sub> · t<sub>i</sub>/365','c - ставка купона; N<sub>ост</sub> - остаточный номинал на период; t<sub>i</sub> - число дней в периоде')}
  <p><b>Связь:</b> амортизация номинала уменьшает дюрацию (деньги возвращаются раньше) → снижает процентный риск.</p>`},

 {ttl:'Дюрация Маколея и модифицированная', body:`
  <p><b>Две роли дюрации:</b> (1) средний срок возврата вложений - «когда в среднем по времени я получу свои деньги назад» (с учётом дисконтирования); (2) мера процентного риска - насколько цена дёрнется при изменении ставок.</p>
  <p><b>Дюрация Маколея</b> (в годах) - это средневзвешенный срок, где веса = доли каждого платежа в цене:</p>
  ${fx('D = Σ [ t·CF<sub>t</sub>/(1+r)<sup>t</sup> ] / P','P - текущая цена (= сумма PV всех потоков)')}
  <p>Чем больше купоны и чем раньше они приходят - тем <b>меньше</b> дюрация (деньги вернутся быстрее). У бескупонной облигации дюрация = сроку до погашения (все деньги в конце).</p>
  <p><b>Модифицированная дюрация</b> переводит это в «процент изменения цены на 1% ставки»:</p>
  ${fx('MD = D / (1 + r/n)','n - число купонов в году')}
  <p>Если MD = 4,22, то рост ставки на 1% → цена ≈ −4,22% (и наоборот). Чем выше дюрация - тем выше процентный риск.</p>
  {{chart:bondytm}}
  <p><b>Связь:</b> формализует правила 4-5 предыдущей карточки. На практике: ждёшь роста ставки ЦБ → выбирай короткие облигации (низкая дюрация).</p>`},

 {ttl:'YTM, стоимость долга и WACC', body:`
  <p><b>Ключевое прозрение:</b> стоимость долга для эмитента - это <b>YTM, а не купонная ставка</b>. Почему: если облигацию разместили с дисконтом (получили 950 за номинал 1000), компания реально «переплачивает» - её фактическая стоимость обслуживания долга выше купона. Именно YTM отражает эту реальную цену денег.</p>
  ${fx('WACC = R<sub>e</sub>·E/(E+D) + R<sub>d</sub>·(1−T)·D/(E+D)','E - собственный капитал, D - долг, T - ставка налога')}
  <p><b>Налоговый щит (1−T):</b> проценты по долгу уменьшают налогооблагаемую прибыль → реальная стоимость долга ниже. Это та же логика щита, что у амортизации (тема 4).</p>
  <div class="note">Пример: купон 8%, размещение с дисконтом → YTM = 9,3%. После налога (T=20%): 9,3%·0,8 = <b>7,44%</b> - именно это идёт в WACC, а не купон 8%.</div>
  <p><b>Связь:</b> WACC - это та самая ставка дисконтирования r для FCFF (тема 4). R_d берём отсюда (тема 5), R_e - из DDM/CAPM (тема 6). Так три темы сходятся в одной формуле.</p>`},
],

 {cat:"infl", q:"Что произойдёт с оценкой NPV, если реальный (без инфляции) денежный поток дисконтировать по номинальной ставке?", o:["NPV будет занижен","NPV будет завышен","NPV не изменится","NPV станет равен нулю"], c:0, e:"Реальный поток не растёт с инфляцией, а номинальная ставка её уже содержит, поэтому знаменатель завышен и NPV занижается."},
