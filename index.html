/* ---------- вычислитель Excel-формул (рус/англ) ---------- */
function evalFormula(input) {
  if (input == null) return NaN;
  let s = String(input).trim();
  if (s === '') return NaN;
  if (s[0] === '=') s = s.slice(1).trim();
  const hasLetters = /[A-Za-zА-Яа-я]/.test(s);
  if (!hasLetters) {
    s = s.replace(/,/g, '.');                 // чистая арифметика: запятая = десятичная
  } else if (s.indexOf(';') >= 0) {
    s = s.replace(/,/g, '.').replace(/;/g, ','); // рус: ; - аргументы, , - десятичная
  }                                           // иначе англ: , - аргументы, . - десятичная
  s = s.replace(/\^/g, '**');
  s = s.replace(/([0-9.]+)\s*%/g, '($1/100)');   // 10% -> (10/100)
  const MAP = { 'СТЕПЕНЬ': 'POWER', 'КОРЕНЬ': 'SQRT', 'ЭКСП': 'EXP', 'EXP': 'EXP', 'LN': 'LN', 'ABS': 'ABS', 'МОДУЛЬ': 'ABS',
    'СУММ': 'SUM', 'СРЗНАЧ': 'AVERAGE', 'МАКС': 'MAX', 'МИН': 'MIN', 'ОКРУГЛ': 'ROUND', 'ОКРВВЕРХ': 'ROUNDUP', 'ОКРВНИЗ': 'ROUNDDOWN',
    'ЧПС': 'NPV', 'ВСД': 'IRR', 'ПС': 'PV', 'БС': 'FV', 'ЭФФЕКТ': 'EFFECT' };
  s = s.replace(/[A-Za-zА-Яа-я]+/g, w => { const u = w.toUpperCase(); return MAP[u] || u; });
  const FN = ['POWER', 'SQRT', 'EXP', 'LN', 'ABS', 'SUM', 'AVERAGE', 'MAX', 'MIN', 'ROUND', 'ROUNDUP', 'ROUNDDOWN', 'NPV', 'IRR', 'PV', 'FV', 'EFFECT'];
  let probe = s; FN.forEach(fn => { probe = probe.split(fn).join(''); });
  if (/[A-Za-zА-Яа-я]/.test(probe)) return NaN;                       // неизвестная функция
  if (/[^0-9.,()+\-*/ ]/.test(probe.replace(/\*\*/g, ''))) return NaN; // запрещённые символы
  const POWER = Math.pow, SQRT = Math.sqrt, EXP = Math.exp, LN = Math.log, ABS = Math.abs, MAX = Math.max, MIN = Math.min,
    ROUND = (x, d) => { const k = Math.pow(10, d || 0); return Math.round(x * k) / k; },
    ROUNDUP = (x, d) => { const k = Math.pow(10, d || 0); return Math.ceil(x * k) / k; },
    ROUNDDOWN = (x, d) => { const k = Math.pow(10, d || 0); return Math.floor(x * k) / k; },
    SUM = (...a) => a.reduce((x, y) => x + y, 0), AVERAGE = (...a) => a.reduce((x, y) => x + y, 0) / a.length,
    EFFECT = (r, m) => Math.pow(1 + r / m, m) - 1,
    NPV = (rate, ...v) => v.reduce((acc, c, i) => acc + c / Math.pow(1 + rate, i + 1), 0),
    IRR = (...v) => irr(v),
    PV = (rate, nper, pmt, fv, type) => { fv = fv || 0; type = type || 0; if (rate === 0) return -(pmt * nper + fv); const a = Math.pow(1 + rate, nper); return -(pmt * (1 + rate * type) * (a - 1) / rate + fv) / a; },
    FV = (rate, nper, pmt, pv, type) => { pv = pv || 0; type = type || 0; if (rate === 0) return -(pv + pmt * nper); const a = Math.pow(1 + rate, nper); return -(pv * a + pmt * (1 + rate * type) * (a - 1) / rate); };
  try {
    const val = Function('POWER', 'SQRT', 'EXP', 'LN', 'ABS', 'MAX', 'MIN', 'ROUND', 'ROUNDUP', 'ROUNDDOWN', 'SUM', 'AVERAGE', 'EFFECT', 'NPV', 'IRR', 'PV', 'FV', '"use strict";return (' + s + ');')(POWER, SQRT, EXP, LN, ABS, MAX, MIN, ROUND, ROUNDUP, ROUNDDOWN, SUM, AVERAGE, EFFECT, NPV, IRR, PV, FV);
    return (typeof val === 'number' && isFinite(val)) ? val : NaN;
  } catch (e) { return NaN; }
}

/* ---------- проверка ответа пользователя ---------- */
function checkField(fld, user) {
  if (user == null || user === '' || isNaN(user)) return false;
  const u = Number(user), v = fld.val;
  const tol = fld.tol != null ? fld.tol : Math.max(Math.abs(v) * 0.005, 0.5 * Math.pow(10, -fld.dec) * 1.5);
  if (Math.abs(u - v) <= tol + 1e-9) return true;
  // знак-нейтральные поля (величина расхода EAA): принимаем и положительную, и отрицательную (как отток) запись
  if (fld.signTol && Math.abs(Math.abs(u) - Math.abs(v)) <= tol + 1e-9) return true;
  // процентные поля: принимаем и долю (0,1441), и процент (14,41)
  if (fld.unit === '%' && Math.abs(u * 100 - v) <= Math.max(Math.abs(v) * 0.005, 0.5) + 1e-9) return true;
  // масштаб единиц: ответ в «млн»/«тыс» принимаем и в полных рублях (и наоборот), допуск 0,5%
  const close = (a, b) => Math.abs(a - b) <= Math.max(Math.abs(b) * 0.005, 0.5) + 1e-9;
  const unit = fld.unit || '';
  if (/млн/.test(unit) && (close(u, v * 1e6) || close(u, v / 1e6))) return true;
  if (/тыс/.test(unit) && (close(u, v * 1e3) || close(u, v / 1e3))) return true;
  return false;
}

  let ymin=Math.min.apply(null,ys.concat(o.includeZero?[0]:[])), ymax=Math.max.apply(null,ys.concat(o.includeZero?[0]:[]));
  const py=(ymax-ymin)*0.08||1; ymin-=py; ymax+=py;
  const px=(xmax-xmin)*0.02||1; xmin-=px; xmax+=px;
  const X=x=>pad.l+(x-xmin)/(xmax-xmin||1)*(w-pad.l-pad.r);
  const Y=y=>h-pad.b-(y-ymin)/(ymax-ymin||1)*(h-pad.t-pad.b);
  const xf=o.xfmt||(v=>(''+Math.round(v*100)/100)), yf=o.yfmt||(v=>(''+Math.round(v)));
  let s='<svg viewBox="0 0 '+w+' '+h+'" class="chart">';
  s+='<rect x="'+pad.l+'" y="'+pad.t+'" width="'+(w-pad.l-pad.r)+'" height="'+(h-pad.t-pad.b)+'" fill="none" stroke="'+C.line+'"/>';
  // ось y=0
  if(ymin<0&&ymax>0){ s+='<line x1="'+pad.l+'" y1="'+Y(0)+'" x2="'+(w-pad.r)+'" y2="'+Y(0)+'" stroke="'+C.mut+'" stroke-dasharray="3 3"/>'; s+='<text x="'+(pad.l-6)+'" y="'+(Y(0)+3)+'" fill="'+C.mut+'" font-size="10" text-anchor="end">0</text>'; }
  // тики x
  [xmin+px,(xmin+xmax)/2,xmax-px].forEach(xv=>{ s+='<text x="'+X(xv)+'" y="'+(h-pad.b+15)+'" fill="'+C.mut+'" font-size="10" text-anchor="middle">'+xf(xv)+'</text>'; });
  // тики y (верх/низ)
  s+='<text x="'+(pad.l-6)+'" y="'+(Y(ymax-py)+3)+'" fill="'+C.mut+'" font-size="10" text-anchor="end">'+yf(ymax-py)+'</text>';
  s+='<text x="'+(pad.l-6)+'" y="'+(Y(ymin+py)+3)+'" fill="'+C.mut+'" font-size="10" text-anchor="end">'+yf(ymin+py)+'</text>';
  // подписи осей
  if(o.xlabel) s+='<text x="'+((w)/2)+'" y="'+(h-2)+'" fill="'+C.mut+'" font-size="11" text-anchor="middle">'+o.xlabel+'</text>';
  if(o.ylabel) s+='<text x="12" y="'+((h-pad.b+pad.t)/2)+'" fill="'+C.mut+'" font-size="11" text-anchor="middle" transform="rotate(-90 12 '+((h-pad.b+pad.t)/2)+')">'+o.ylabel+'</text>';
  // вертикальные линии
  (o.vlines||[]).forEach(v=>{ s+='<line x1="'+X(v.x)+'" y1="'+pad.t+'" x2="'+X(v.x)+'" y2="'+(h-pad.b)+'" stroke="'+(v.color||C.warn)+'" stroke-dasharray="4 3"/>'; if(v.label) s+='<text x="'+(X(v.x)+3)+'" y="'+(pad.t+11)+'" fill="'+(v.color||C.warn)+'" font-size="10">'+v.label+'</text>'; });
  // серии
  (o.series||[]).forEach((ser,i)=>{ const d=ser.pts.map((p,j)=>(j?'L':'M')+X(p[0]).toFixed(1)+' '+Y(p[1]).toFixed(1)).join(' '); s+='<path d="'+d+'" fill="none" stroke="'+(ser.color||C.acc)+'" stroke-width="2"/>'; if(ser.label) s+='<text x="'+(pad.l+8)+'" y="'+(pad.t+14+i*15)+'" fill="'+(ser.color||C.acc)+'" font-size="11">'+ser.label+'</text>'; });
  // точки
  (o.points||[]).forEach(p=>{ s+='<circle cx="'+X(p.x)+'" cy="'+Y(p.y)+'" r="4" fill="'+(p.color||C.ok)+'"/>'; if(p.label) s+='<text x="'+(X(p.x)+7)+'" y="'+(Y(p.y)+3)+'" fill="'+(p.color||C.ok)+'" font-size="10">'+p.label+'</text>'; });
  s+='</svg>';
  return '<div class="chartbox">'+s+(o.cap?'<div class="chart-cap">'+o.cap+'</div>':'')+'</div>';
}
const pctX=v=>(Math.round(v*1000)/10)+'%';
function npvAt(cf,r){let s=0;for(let i=0;i<cf.length;i++)s+=cf[i]/Math.pow(1+r,i);return s;}
function afv(r,n){return (1-Math.pow(1+r,-n))/r;}
const CHARTS = {
  npv_irr_pi:p=>{ const cf=[-p.I];for(let i=0;i<p.n;i++)cf.push(p.CF); const ir=FM.irr(cf); const rmax=Math.max(0.4,ir*1.7); const pts=[];for(let r=0.001;r<=rmax;r+=rmax/50)pts.push([r,npvAt(cf,r)]);
    return plot({series:[{pts,color:C.acc,label:'NPV(r)'}],vlines:[{x:p.r,color:C.ok,label:'r'},{x:ir,color:C.warn,label:'IRR'}],includeZero:true,xfmt:pctX,xlabel:'ставка r',ylabel:'NPV',cap:'NPV падает с ростом ставки. Точка пересечения с нулём - IRR. Слева от r (зелёная) проект прибыльный.'}); },
  npv_uneven:p=>{ const cf=[-p.I].concat(p.cfs); const ir=FM.irr(cf); const rmax=Math.max(0.4,(isFinite(ir)&&ir>0?ir:0.3)*1.7); const pts=[];for(let r=0.001;r<=rmax;r+=rmax/50)pts.push([r,npvAt(cf,r)]); return plot({series:[{pts,color:C.acc,label:'NPV(r)'}],vlines:[{x:p.r,color:C.ok,label:'r'}].concat(ir>0&&ir<rmax?[{x:ir,color:C.warn,label:'IRR'}]:[]),includeZero:true,xfmt:pctX,xlabel:'ставка r',ylabel:'NPV',cap:'NPV неравномерного потока падает с ростом ставки; пересечение нуля - IRR.'}); },
  mirr:p=>CHARTS.npv_irr_pi(p),
  compare_AB:p=>{ const rmax=0.4; const a=[],b=[];for(let r=0.001;r<=rmax;r+=rmax/50){a.push([r,-p.IA+p.CA*afv(r,p.n)]);b.push([r,-p.IB+p.CB*afv(r,p.n)]);}
    return plot({series:[{pts:a,color:C.acc,label:'NPV A'},{pts:b,color:C.ok,label:'NPV Б'}],vlines:[{x:p.r,color:C.warn,label:'r'}],includeZero:true,xfmt:pctX,xlabel:'ставка r',ylabel:'NPV',cap:'Две кривые NPV. Их пересечение - точка Фишера: левее неё выигрывает один проект, правее - другой. Выбор делаем при текущей r.'}); },
  pb_dpb:p=>{ const u=[[0,-p.I]],d=[[0,-p.I]];let cu=-p.I,cd=-p.I;for(let y=1;y<=p.n;y++){cu+=p.CF;cd+=p.CF/Math.pow(1+p.r,y);u.push([y,cu]);d.push([y,cd]);}
    return plot({series:[{pts:u,color:C.acc,label:'накопл. (без диск.)'},{pts:d,color:C.warn,label:'накопл. (диск.)'}],includeZero:true,xfmt:v=>Math.round(v),xlabel:'год',ylabel:'накопл. поток',cap:'Окупаемость - момент пересечения нуля. Дисконтированная кривая (жёлтая) идёт ниже → DPB всегда больше PB.'}); },
  bond_change:p=>{ const cpn=p.N*p.c; const pts=[];for(let y=0.01;y<=0.14;y+=0.005)pts.push([y,cpn*afv(y,p.n)+p.N/Math.pow(1+y,p.n)]);

  zero_coupon:p=>{ const pts=[];for(let y=0.02;y<=0.18;y+=0.005)pts.push([y,p.N/Math.pow(1+y,p.n)]);
    return plot({series:[{pts,color:C.acc,label:'P(YTM)'}],vlines:[{x:p.ytm,color:C.warn,label:'YTM'}],xfmt:pctX,xlabel:'YTM',ylabel:'цена',cap:'Чем выше YTM, тем дешевле бескупонная облигация (выпуклая убывающая кривая).'}); },
  bond_semi:p=>{ const cpn=p.N*p.c/p.m; const pts=[];for(let y=0.01;y<=0.12;y+=0.004)pts.push([y,cpn*afv(y/p.m,p.n*p.m)+p.N/Math.pow(1+y/p.m,p.n*p.m)]);

  gordon_stock:p=>{ const pts=[];const D=p.D0;for(let t=0;t<=8;t++)pts.push([t,D*Math.pow(1+p.g,t)]);
    return plot({series:[{pts,color:C.acc,label:'дивиденд D_t'}],includeZero:true,xfmt:v=>Math.round(v),xlabel:'год',ylabel:'дивиденд',cap:'Дивиденды растут на g% в год бесконечно; цена = приведённая стоимость всего этого потока.'}); },
};

function makeInstance(g){ const R=RNG(); const p=g.rand(R); const prob=g.build(p);
  if(PHRASINGS[g.id]) prob.q=PHRASINGS[g.id][Math.floor(Math.random()*PHRASINGS[g.id].length)];
  return {g,p,prob,checked:false}; }
function saveCards(){ try{ localStorage.setItem('fm_cards_'+state.topic, JSON.stringify(state.cards.map(c=>({id:c.g.id,p:c.p,q:c.prob.q,answers:c.answers||[],checked:!!c.checked})))); }catch(e){} }

function loadCards(topic,gs){ try{ const raw=localStorage.getItem('fm_cards_'+topic);
  const arr = raw ? JSON.parse(raw) : []; const byId={};
  if(Array.isArray(arr)) arr.forEach(s=>{ if(s&&s.id) byId[s.id]=s; });
  // восстанавливаем ПО id: сохранённые задачи остаются с ответами, новые/изменённые генерируются заново.
  // Так добавление/удаление типов задач НЕ сбрасывает прогресс по остальным.
  return gs.map(g=>{ const s=byId[g.id];
    if(s){ try{ const prob=g.build(s.p); if(s.q) prob.q=s.q; return {g,p:s.p,prob,answers:s.answers||[],checked:!!s.checked}; }catch(e){} }
    return makeInstance(g); });
}catch(e){ return null; } }
function applyMarks(i){ const c=state.cards[i],prob=c.prob; const fmtN=v=>Number(v).toLocaleString('ru-RU',{maximumFractionDigits:4});
  if(prob.recog){ const inp=document.getElementById('inp'+i+'_0'); if(!inp) return; const raw=(inp.value||'').trim();
    const vd=document.getElementById('vd'+i+'_0'); inp.classList.remove('ok','bad'); if(vd){vd.classList.remove('ok','bad');vd.textContent='';}
    if(raw==='') return; const ok=FM.checkRecog(prob,raw); inp.classList.add(ok?'ok':'bad'); if(vd){vd.classList.add(ok?'ok':'bad'); vd.textContent=ok?'✓ верно':'✗ не то';} return; }
  prob.fields.forEach((fl,j)=>{ const inp=document.getElementById('inp'+i+'_'+j); if(!inp) return; const raw=(inp.value||'').trim();
    const vd=document.getElementById('vd'+i+'_'+j); inp.classList.remove('ok','bad'); if(vd){vd.classList.remove('ok','bad');vd.textContent='';}
    if(raw==='') return; const val=FM.evalFormula(raw); const ok=!isNaN(val)&&FM.checkField(fl,val); const isF=/[=^()A-Za-zА-Яа-я%]/.test(raw);
    inp.classList.add(ok?'ok':'bad'); if(vd){ vd.classList.add(ok?'ok':'bad'); vd.textContent= isNaN(val)?'✗ формула не распознана': ok?('✓'+(isF?' = '+fmtN(val):' верно')):(isF?('✗ = '+fmtN(val)+' - неверно'):'✗ неверно'); } }); }
function buildCards(){ const gs=gensFor(state.topic); gs.sort((a,b)=>((a.exam?1:0)-(b.exam?1:0))); const restored=loadCards(state.topic,gs);
  state.cards = restored || gs.map(makeInstance); saveCards();

function xlSigFor(code){ const out=[],seen={};

  return out; }

/* Теоретические формулы (символьные, без подставленных чисел) + расшифровка обозначений - для кнопки «Показать формулу» */

function fnSig(val){ if(!val) return ''; const st=[];
  for(let k=0;k<val.length;k++){ const c=val[k]; if(c==='(')st.push(k); else if(c===')')st.pop(); }
  let w=''; if(st.length){ const m=val.slice(0,st[st.length-1]).match(/([A-Za-zА-Яа-я]+)$/); if(m)w=m[1]; }
  else { const m=val.match(/([A-Za-zА-Яа-я]+)$/); if(m)w=m[1]; }
  return w? (SIG[w.toUpperCase()]||'') : '';
}
function activeArg(val){ const open=[]; for(let k=0;k<val.length;k++){ if(val[k]==='(')open.push(k); else if(val[k]===')')open.pop(); }
  if(!open.length) return -1; const seg=val.slice(open[open.length-1]+1);
  // ';' → рус-разделитель (',' десятичная); иначе ',' разделитель только если есть '.'-десятичная; иначе ',' = десятичная (рус), разделителей пока нет
  const sep = val.indexOf(';')>=0 ? ';' : (val.indexOf('.')>=0 ? ',' : '\x00');
  let d=0,s=0;
  for(const ch of seg){ if(ch==='(')d++; else if(ch===')')d--; else if(ch===sep&&d===0)s++; } return s; }
function sigHtml(val){ const sig=fnSig(val); if(!sig) return ''; const oi=sig.indexOf('('); if(oi<0) return sig;
  const head=sig.slice(0,oi); const body=sig.slice(oi+1).replace(/\)\s*$/,''); const args=body.split(/;\s*/);
  const ai=activeArg(val); const inside=ai>=0;
  return head+'('+args.map((a,k)=>(inside&&k===ai)?'<b>'+a+'</b>':a).join('; ')+')'; }

function ansKey(e,i,j){
  if(e.key==='Enter'){ if(!e.shiftKey) doCheck(i); return; }
  if(e.key==='ArrowDown'){ const nx=document.getElementById('inp'+i+'_'+(j+1)); if(nx){ e.preventDefault(); nx.focus(); try{nx.select();}catch(_){} } return; }

function doCheck(i){ const c=state.cards[i],prob=c.prob; let allOk=true,answered=false;
  if(prob.recog){ const inp=document.getElementById('inp'+i+'_0'); const raw=(inp.value||'').trim();
    const vd=document.getElementById('vd'+i+'_0'); inp.classList.remove('ok','bad'); vd.classList.remove('ok','bad'); vd.textContent='';
    if(raw==='') return false; const ok=FM.checkRecog(prob,raw);
    inp.classList.add(ok?'ok':'bad'); vd.classList.add(ok?'ok':'bad'); vd.textContent= ok?'✓ верно':'✗ не то - подумай ещё или открой ответ';
    if(!c.checked){ state.score.n++; if(ok)state.score.ok++; c.checked=true; }
    c.answers=[inp.value]; saveCards(); updateScore(); if(ok && !c.celebrated){ c.celebrated=true; celebrate(i); } return ok; }
  const fmtN=v=>Number(v).toLocaleString('ru-RU',{maximumFractionDigits:4});
  prob.fields.forEach((fl,j)=>{ const inp=document.getElementById('inp'+i+'_'+j);
    const raw=inp.value.trim();
    const vd=document.getElementById('vd'+i+'_'+j); inp.classList.remove('ok','bad'); vd.classList.remove('ok','bad'); vd.textContent='';
    if(raw===''){allOk=false;return;} answered=true;
    const val=FM.evalFormula(raw); const ok=!isNaN(val)&&FM.checkField(fl,val);
    inp.classList.add(ok?'ok':'bad'); vd.classList.add(ok?'ok':'bad');
    const isF=/[=^()A-Za-zА-Яа-я%]/.test(raw);
    vd.textContent = isNaN(val) ? '✗ формула не распознана' : ok ? ('✓'+(isF?' = '+fmtN(val):' верно')) : (isF ? ('✗ = '+fmtN(val)+' - неверно') : '✗ неверно');
    if(!ok)allOk=false; });
  if(!answered) return false;
  if(!c.checked){ state.score.n++; if(allOk)state.score.ok++; c.checked=true; }
  c.answers=prob.fields.map((fl,j)=>{ const el=document.getElementById('inp'+i+'_'+j); return el?el.value:''; });
  saveCards(); updateScore();
  if(allOk && !c.celebrated){ c.celebrated=true; celebrate(i); }
  return allOk;
}

const PAD_NAV={ArrowUp:[-1,0],ArrowDown:[1,0],ArrowLeft:[0,-1],ArrowRight:[0,1]};
function padKeydown(e,el,i){
  if(e.key==='Enter'){ if(e.shiftKey) return; e.preventDefault(); el.blur(); padMove(el,i,1,0); return; }

  if(!el.readOnly) return;                                         // уже редактируем — печатаем как обычно
  if(PAD_NAV[e.key]){ e.preventDefault(); padMove(el,i,PAD_NAV[e.key][0],PAD_NAV[e.key][1]); return; }
  if(e.key==='Backspace'||e.key==='Delete'){ e.preventDefault(); padStartEdit(el,''); return; }

document.addEventListener('copy', e=>{ const el=document.querySelector('.pad input.sel'); if(el && document.activeElement===el){ padClearAnts(); el.classList.remove('sel'); el.classList.add('copying'); const full=(el.dataset.full!=null&&el.dataset.full!=='')?el.dataset.full:el.value; try{ e.clipboardData.setData('text/plain', full); e.preventDefault(); }catch(err){} } });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') padClearAnts(); });
function savePad(i){ try{ const all=JSON.parse(localStorage.getItem(padKey())||'{}'); const m={}; PAD_COLS.forEach(c=>{ for(let r=1;r<=PAD_ROWS;r++){ const el=document.getElementById('c'+i+'_'+c+r); if(el&&el.dataset.raw) m[c+r]=el.dataset.raw; } }); all[i]=m; localStorage.setItem(padKey(),JSON.stringify(all)); }catch(e){} }
function loadPad(i){ try{ const all=JSON.parse(localStorage.getItem(padKey())||'{}'); const m=all[i]; if(m&&typeof m==='object'&&!Array.isArray(m)){ Object.keys(m).forEach(coord=>{ const el=document.getElementById('c'+i+'_'+coord); if(el) el.dataset.raw=m[coord]; }); padRecompute(i); } }catch(e){} }
function clearPad(i){ try{ const all=JSON.parse(localStorage.getItem(padKey())||'{}'); delete all[i]; localStorage.setItem(padKey(),JSON.stringify(all)); }catch(e){} }
renderTopics(); renderCheat(); buildCards();
</script>
</body>
</html>
